<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Neural network nodes -->
  <g opacity="0.5">
    <!-- Layer 1 -->
    <circle cx="750" cy="120" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="750" cy="220" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="750" cy="320" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="750" cy="420" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="750" cy="520" r="18" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Layer 2 -->
    <circle cx="900" cy="170" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="900" cy="270" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="900" cy="370" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="900" cy="470" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Layer 3 - Memory -->
    <circle cx="1050" cy="220" r="25" fill="#7c3aed" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="1050" cy="320" r="25" fill="#7c3aed" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="1050" cy="420" r="25" fill="#7c3aed" fill-opacity="0.3" stroke="#a78bfa" stroke-width="2"/>
  </g>
  <!-- Connections -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.3">
    <line x1="768" y1="120" x2="882" y2="170"/><line x1="768" y1="120" x2="882" y2="270"/>
    <line x1="768" y1="220" x2="882" y2="170"/><line x1="768" y1="220" x2="882" y2="270"/>
    <line x1="768" y1="320" x2="882" y2="270"/><line x1="768" y1="320" x2="882" y2="370"/>
    <line x1="768" y1="420" x2="882" y2="370"/><line x1="768" y1="420" x2="882" y2="470"/>
    <line x1="768" y1="520" x2="882" y2="470"/>
    <line x1="918" y1="170" x2="1025" y2="220"/><line x1="918" y1="270" x2="1025" y2="320"/>
    <line x1="918" y1="370" x2="1025" y2="320"/><line x1="918" y1="470" x2="1025" y2="420"/>
  </g>
  <!-- Memory label -->
  <text x="1050" y="540" font-family="Arial" font-size="12" fill="#a78bfa" text-anchor="middle" opacity="0.6">MEMORY</text>
  <!-- Title -->
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">智能体记忆架构</text>
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="32" fill="#a78bfa">与隐性技术债务</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Memanto · 自我纠正 · 多Agent协作 · 生产级挑战</text>
  <rect x="80" y="195" width="100" height="4" fill="#7c3aed" rx="2"/>
</svg>