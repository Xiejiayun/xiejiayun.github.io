<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1222"/>
      <stop offset="100%" style="stop-color:#1a1a0a"/>
    </linearGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Network nodes -->
  <g filter="url(#glow2)">
    <circle cx="600" cy="200" r="40" fill="#ff8c00" opacity="0.9"/>
    <circle cx="350" cy="300" r="30" fill="#ff6600" opacity="0.8"/>
    <circle cx="850" cy="300" r="30" fill="#ff6600" opacity="0.8"/>
    <circle cx="250" cy="420" r="22" fill="#cc5500" opacity="0.7"/>
    <circle cx="450" cy="420" r="22" fill="#cc5500" opacity="0.7"/>
    <circle cx="750" cy="420" r="22" fill="#cc5500" opacity="0.7"/>
    <circle cx="950" cy="420" r="22" fill="#cc5500" opacity="0.7"/>
  </g>
  <!-- Connections -->
  <g stroke="#ff8c00" stroke-width="1.5" opacity="0.4">
    <line x1="600" y1="240" x2="350" y2="270"/>
    <line x1="600" y1="240" x2="850" y2="270"/>
    <line x1="350" y1="330" x2="250" y2="398"/>
    <line x1="350" y1="330" x2="450" y2="398"/>
    <line x1="850" y1="330" x2="750" y2="398"/>
    <line x1="850" y1="330" x2="950" y2="398"/>
  </g>
  <!-- Data flow dots -->
  <g fill="#ffd700" opacity="0.8">
    <circle cx="480" cy="255" r="3"><animate attributeName="cx" values="600;350" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="255" r="3"><animate attributeName="cx" values="600;850" dur="2s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Labels -->
  <text x="600" y="205" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">AGENT</text>
  <text x="350" y="305" text-anchor="middle" fill="white" font-family="monospace" font-size="11">ORCH</text>
  <text x="850" y="305" text-anchor="middle" fill="white" font-family="monospace" font-size="11">RUNTIME</text>
  <text x="250" y="425" text-anchor="middle" fill="white" font-family="monospace" font-size="9">MODEL</text>
  <text x="450" y="425" text-anchor="middle" fill="white" font-family="monospace" font-size="9">DATA</text>
  <text x="750" y="425" text-anchor="middle" fill="white" font-family="monospace" font-size="9">EDGE</text>
  <text x="950" y="425" text-anchor="middle" fill="white" font-family="monospace" font-size="9">GPU</text>
  <!-- Title -->
  <text x="600" y="550" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="bold">代理云战场</text>
  <text x="600" y="585" text-anchor="middle" fill="#ff8c00" font-family="Arial, sans-serif" font-size="18">AGENT CLOUD · TOKEN FACTORY · 2026</text>
</svg>