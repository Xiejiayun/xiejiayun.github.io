<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Central Agent node -->
  <circle cx="600" cy="315" r="60" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="600" cy="315" r="80" fill="none" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="600" y="310" fill="#fbbf24" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">AI</text>
  <text x="600" y="330" fill="#fbbf24" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">Agent</text>
  <!-- Surrounding infrastructure nodes -->
  <!-- Chip layer (top-left) -->
  <rect x="100" y="180" width="160" height="60" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="180" y="215" fill="#a78bfa" font-family="monospace" font-size="14" text-anchor="middle">GPU / TPU 8</text>
  <line x1="260" y1="210" x2="540" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <!-- Cloud (top-right) -->
  <rect x="940" y="180" width="160" height="60" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1020" y="215" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle">Cloud Platform</text>
  <line x1="940" y1="210" x2="660" y2="290" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <!-- Network (left) -->
  <rect x="80" y="360" width="160" height="60" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="160" y="395" fill="#34d399" font-family="monospace" font-size="14" text-anchor="middle">Cloudflare CDN</text>
  <line x1="240" y1="390" x2="540" y2="330" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <!-- Edge/Device (right) -->
  <rect x="960" y="360" width="160" height="60" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1040" y="395" fill="#34d399" font-family="monospace" font-size="14" text-anchor="middle">Edge / Gemma 4</text>
  <line x1="960" y1="390" x2="660" y2="330" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <!-- Security (bottom-left) -->
  <rect x="200" y="480" width="160" height="60" rx="8" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="280" y="515" fill="#fb7185" font-family="monospace" font-size="14" text-anchor="middle">Security Layer</text>
  <line x1="360" y1="500" x2="560" y2="370" stroke="#fb7185" stroke-width="1" opacity="0.5" stroke-dasharray="4,4"/>
  <!-- Robotics (bottom-right) -->
  <rect x="840" y="480" width="160" height="60" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="920" y="508" fill="#fbbf24" font-family="monospace" font-size="12" text-anchor="middle">Robotics-ER 1.6</text>
  <text x="920" y="525" fill="#fbbf24" font-family="monospace" font-size="12" text-anchor="middle">Physical AI</text>
  <line x1="840" y1="500" x2="640" y2="370" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <!-- Model layer (top-center) -->
  <rect x="450" y="160" width="300" height="45" rx="6" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="600" y="188" fill="#a78bfa" font-family="monospace" font-size="13" text-anchor="middle">GPT-5.5 · DeepSeek V4 · Gemini</text>
  <!-- Title -->
  <text x="600" y="70" fill="white" font-family="monospace" font-size="42" font-weight="bold" text-anchor="middle">Agentic AI Infrastructure</text>
  <text x="600" y="110" fill="#94a3b8" font-family="monospace" font-size="20" text-anchor="middle">The Trillion-Dollar Rebuild</text>
  <!-- Pulse rings -->
  <circle cx="600" cy="315" r="100" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.2"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="#fbbf24" stroke-width="0.3" opacity="0.1"/>
</svg>
