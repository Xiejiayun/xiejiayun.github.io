<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg5)"/>
  <!-- Neural network nodes -->
  <circle cx="200" cy="140" r="12" fill="#6366f1" opacity="0.8"/>
  <circle cx="200" cy="200" r="12" fill="#6366f1" opacity="0.8"/>
  <circle cx="200" cy="260" r="12" fill="#6366f1" opacity="0.8"/>
  <circle cx="400" cy="160" r="15" fill="#f59e0b" opacity="0.9"/>
  <circle cx="400" cy="240" r="15" fill="#f59e0b" opacity="0.9"/>
  <circle cx="600" cy="200" r="12" fill="#10b981" opacity="0.8"/>
  <!-- Connections -->
  <line x1="212" y1="140" x2="385" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="212" y1="200" x2="385" y2="160" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="212" y1="260" x2="385" y2="240" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="212" y1="200" x2="385" y2="240" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  <line x1="415" y1="160" x2="588" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="415" y1="240" x2="588" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <!-- Latent glow -->
  <circle cx="400" cy="200" r="50" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4" opacity="0.3"/>
  <text x="400" y="205" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">LATENT</text>
  <!-- Labels -->
  <text x="200" y="300" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Input</text>
  <text x="600" y="240" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Output</text>
  <text x="400" y="330" text-anchor="middle" fill="#fff" font-family="monospace" font-size="22" font-weight="bold">REASONING IS LATENT</text>
  <text x="400" y="355" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">Not the Chain of Thought</text>
</svg>