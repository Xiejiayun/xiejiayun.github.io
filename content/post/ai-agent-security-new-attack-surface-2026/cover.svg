  <text x="200" y="365" fill="#fb7185" font-family="monospace" font-size="10">Supply Chain</text>
  <line x1="1000" y1="200" x2="720" y2="260" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,3" stroke-opacity="0.6"/>
  <text x="930" y="190" fill="#fb7185" font-family="monospace" font-size="10">Privilege Abuse</text>
  <line x1="1000" y1="350" x2="720" y2="310" stroke="#fb7185" stroke-width="1" stroke-dasharray="6,3" stroke-opacity="0.6"/>
  <text x="930" y="365" fill="#fb7185" font-family="monospace" font-size="10">Side Channel</text>
