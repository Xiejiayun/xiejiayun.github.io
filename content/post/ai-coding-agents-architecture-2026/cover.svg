<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#0a2e1a"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <text x="300" y="200" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.6">def plan(task):</text>
  <text x="300" y="225" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.5">    steps = reason(task)</text>
  <text x="300" y="250" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.4">    for s in steps:</text>
  <text x="300" y="275" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.3">        execute(s)</text>
  <rect x="700" y="170" width="200" height="40" rx="5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <text x="800" y="195" text-anchor="middle" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.6">LLM Core</text>
  <rect x="700" y="230" width="200" height="40" rx="5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <text x="800" y="255" text-anchor="middle" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.5">Tool Executor</text>
  <rect x="700" y="290" width="200" height="40" rx="5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <text x="800" y="315" text-anchor="middle" fill="#00ff88" font-size="14" font-family="monospace" opacity="0.4">Sandbox</text>
  <text x="600" y="480" text-anchor="middle" fill="#ffffff" font-size="36" font-family="sans-serif" font-weight="bold">AI编码智能体解剖</text>
  <text x="600" y="520" text-anchor="middle" fill="#888888" font-size="18" font-family="sans-serif">从架构设计到企业落地的真实挑战</text>
</svg>