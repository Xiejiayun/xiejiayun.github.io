<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
  </g>
  <!-- Balance scale base -->
  <line x1="600" y1="420" x2="600" y2="200" stroke="#94a3b8" stroke-width="3"/>
  <polygon points="570,420 630,420 620,440 580,440" fill="#334155"/>
  <!-- Left beam (tokens/money) - tilted down -->
  <line x1="350" y1="230" x2="600" y2="200" stroke="#fbbf24" stroke-width="2.5"/>
  <!-- Right beam (developers) - tilted up -->
  <line x1="600" y1="200" x2="850" y2="260" stroke="#fb7185" stroke-width="2.5"/>
  <!-- Left pan - tokens -->
  <path d="M 300 230 Q 350 250 400 230" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <line x1="300" y1="230" x2="310" y2="210" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="390" y2="210" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Token symbols -->
  <text x="330" y="220" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="28">$$$</text>
  <text x="350" y="190" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11">$113K/mo</text>
  <rect x="310" y="145" width="80" height="30" rx="4" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="350" y="165" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">TOKENS</text>
  <!-- Right pan - developers -->
  <path d="M 800 260 Q 850 280 900 260" fill="none" stroke="#fb7185" stroke-width="2"/>
  <line x1="800" y1="260" x2="810" y2="240" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="900" y1="260" x2="890" y2="240" stroke="#fb7185" stroke-width="1.5"/>
  <!-- Developer icons -->
  <circle cx="835" cy="235" r="8" fill="none" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="835" y1="243" x2="835" y2="255" stroke="#fb7185" stroke-width="1.5"/>
  <circle cx="865" cy="235" r="8" fill="none" stroke="#fb7185" stroke-width="1.5"/>
  <line x1="865" y1="243" x2="865" y2="255" stroke="#fb7185" stroke-width="1.5"/>
  <rect x="810" y="200" width="80" height="25" rx="4" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="850" y="217" text-anchor="middle" fill="#fb7185" font-family="monospace" font-size="10">ENGINEERS</text>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="36" font-weight="bold">AI编码Agent经济学</text>
  <text x="600" y="540" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="18">Token Bills vs Engineer Salaries</text>
  <!-- Corner labels -->
  <text x="60" y="50" fill="#fbbf24" font-family="monospace" font-size="12">Tokenmaxxing Era</text>
  <text x="1140" y="50" text-anchor="end" fill="#fb7185" font-family="monospace" font-size="12">Usage-Based Billing</text>
  <!-- Rising cost arrow -->
  <line x1="100" y1="400" x2="250" y2="300" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  <polygon points="245,295 260,295 250,280" fill="#fbbf24" opacity="0.5"/>
  <text x="130" y="420" fill="#fbbf24" font-family="monospace" font-size="10" opacity="0.7">Cost ↑</text>
</svg>