<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Speedometer arc -->
  <path d="M 250 280 A 130 130 0 0 1 550 280" fill="none" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
  <path d="M 250 280 A 130 130 0 0 1 400 150" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
  <path d="M 400 150 A 130 130 0 0 1 550 280" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round"/>
  <!-- Needle pointing ambiguously in the middle -->
  <line x1="400" y1="270" x2="360" y2="180" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <circle cx="400" cy="270" r="8" fill="#f97316"/>
  <!-- Labels -->
  <text x="240" y="305" fill="#22d3ee" font-family="sans-serif" font-size="14" text-anchor="middle">减速</text>
  <text x="560" y="305" fill="#34d399" font-family="sans-serif" font-size="14" text-anchor="middle">加速</text>
  <text x="400" y="135" fill="#94a3b8" font-family="sans-serif" font-size="13" text-anchor="middle">?</text>
  <!-- Binary/code rain effect -->
  <text x="80" y="60" fill="#22d3ee" opacity="0.15" font-family="monospace" font-size="12">01101 func() { AI.gen() }</text>
  <text x="500" y="80" fill="#34d399" opacity="0.15" font-family="monospace" font-size="12">review(pr) → token++ → ???</text>
  <text x="120" y="350" fill="#22d3ee" opacity="0.12" font-family="monospace" font-size="11">git push → AI → git revert</text>
  <text x="520" y="360" fill="#34d399" opacity="0.12" font-family="monospace" font-size="11">tokenmaxxing.go:42</text>
  <!-- Title -->
  <text x="400" y="50" fill="#e2e8f0" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle">AI编程代理的生产力悖论</text>
  <text x="400" y="78" fill="#94a3b8" font-family="sans-serif" font-size="15" text-anchor="middle">加速还是减速？</text>
</svg>