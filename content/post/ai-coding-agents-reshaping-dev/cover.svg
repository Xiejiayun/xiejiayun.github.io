<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#0f172a"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Code window -->
  <rect x="150" y="90" width="220" height="220" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="170" cy="110" r="5" fill="#fb7185"/>
  <circle cx="185" cy="110" r="5" fill="#fbbf24"/>
  <circle cx="200" cy="110" r="5" fill="#34d399"/>
  <text x="170" y="140" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.8">def solve():</text>
  <text x="170" y="158" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.6">  plan = analyze()</text>
  <text x="170" y="176" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.6">  code = generate()</text>
  <text x="170" y="194" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.6">  test = verify()</text>
  <text x="170" y="212" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.6">  fix = iterate()</text>
  <text x="170" y="230" font-family="monospace" font-size="10" fill="#34d399" opacity="0.8">  return deploy()</text>
  <!-- AI Agent -->
  <rect x="450" y="120" width="200" height="160" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="150" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#34d399">AI AGENT</text>
  <text x="470" y="175" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">+ Read Codebase</text>
  <text x="470" y="195" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">+ Run Tests</text>
  <text x="470" y="215" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">+ Fix Errors</text>
  <text x="470" y="235" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">+ Deploy Code</text>
  <!-- Arrow -->
  <line x1="375" y1="200" x2="445" y2="200" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">AI编程Agent重塑软件工程</text>
  <text x="400" y="360" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">从代码补全到自主开发</text>
</svg>