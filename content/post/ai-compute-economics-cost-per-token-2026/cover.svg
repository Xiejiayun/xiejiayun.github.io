<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Cost curve -->
  <polyline points="150,500 300,480 450,420 600,350 750,200 900,120 1050,80" fill="none" stroke="#34d399" stroke-width="3"/>
  <text x="1060" y="75" font-family="monospace" font-size="12" fill="#34d399">$/Token</text>
  <!-- Threshold line -->
  <line x1="150" y1="250" x2="1050" y2="250" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="1060" y="255" font-family="monospace" font-size="11" fill="#fbbf24">临界点</text>
  <!-- Demand curve -->
  <polyline points="150,450 300,440 450,430 600,400 750,300 900,150 1050,50" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="1060" y="45" font-family="monospace" font-size="12" fill="#f472b6">需求量</text>
  <!-- Axes -->
  <line x1="150" y1="520" x2="1050" y2="520" stroke="#475569" stroke-width="1"/>
  <line x1="150" y1="50" x2="150" y2="520" stroke="#475569" stroke-width="1"/>
  <text x="550" y="560" font-family="monospace" font-size="13" fill="#475569">2024 → 2028</text>
  <!-- Title -->
  <text x="200" y="80" font-family="sans-serif" font-size="28" fill="white" font-weight="bold">AI计算经济学的临界点</text>
  <text x="200" y="115" font-family="sans-serif" font-size="16" fill="#94a3b8">Cost-per-Token: The Only Metric That Matters</text>
  <text x="100" y="600" font-family="monospace" font-size="12" fill="#475569">2026-04-27 · 前沿科技深度分析</text>
</svg>