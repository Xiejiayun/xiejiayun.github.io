<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <!-- Code lines background -->
  <g fill="#21262d" opacity="0.5">
    <rect x="80" y="80" width="500" height="16" rx="3"/>
    <rect x="80" y="106" width="380" height="16" rx="3"/>
    <rect x="80" y="132" width="450" height="16" rx="3"/>
    <rect x="80" y="158" width="320" height="16" rx="3"/>
    <rect x="80" y="184" width="400" height="16" rx="3"/>
    <rect x="80" y="210" width="480" height="16" rx="3"/>
    <rect x="80" y="236" width="350" height="16" rx="3"/>
    <rect x="80" y="262" width="420" height="16" rx="3"/>
  </g>
  <!-- Arrow -->
  <g stroke="#f85149" stroke-width="3" fill="none" opacity="0.8">
    <path d="M 550 180 Q 600 180 600 230 Q 600 280 650 280"/>
    <polygon points="650,272 665,280 650,288" fill="#f85149"/>
  </g>
  <!-- AI brain icon -->
  <circle cx="600" cy="180" r="20" fill="none" stroke="#f85149" stroke-width="2" opacity="0.6"/>
  <text x="600" y="186" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="14">AI</text>
  <!-- "Clean" code lines -->
  <g fill="#1f6feb" opacity="0.4">
    <rect x="670" y="180" width="440" height="16" rx="3"/>
    <rect x="670" y="206" width="360" height="16" rx="3"/>
    <rect x="670" y="232" width="410" height="16" rx="3"/>
    <rect x="670" y="258" width="300" height="16" rx="3"/>
    <rect x="670" y="284" width="380" height="16" rx="3"/>
    <rect x="670" y="310" width="430" height="16" rx="3"/>
    <rect x="670" y="336" width="340" height="16" rx="3"/>
    <rect x="670" y="362" width="390" height="16" rx="3"/>
  </g>
  <!-- License labels -->
  <rect x="80" y="300" width="100" height="30" rx="5" fill="#f85149" opacity="0.8"/>
  <text x="130" y="320" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">GPL v3</text>
  <rect x="670" y="400" width="100" height="30" rx="5" fill="#3fb950" opacity="0.8"/>
  <text x="720" y="420" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">MIT</text>
  <!-- Strike through GPL -->
  <line x1="75" y1="315" x2="185" y2="315" stroke="#f85149" stroke-width="2" opacity="0.6"/>
  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" opacity="0.9">AI 版权洗白与开源危机</text>
  <text x="600" y="555" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="14" opacity="0.7">WHEN AI LAUNDERS CODE, COPYLEFT DIES</text>
</svg>