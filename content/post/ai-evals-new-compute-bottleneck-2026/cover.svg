<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1226"/>
      <stop offset="1" stop-color="#1f0a26"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,120)">
    <text fill="#fbbf24" font-family="ui-sans-serif" font-size="60" font-weight="900">评测 &gt; 训练</text>
    <text y="60" fill="#7dd3fc" font-family="ui-sans-serif" font-size="34" font-weight="700">AI 算力的新黑洞</text>
    <text y="130" fill="#cbd5e1" font-family="ui-sans-serif" font-size="22">在前沿实验室里，评测已消耗 45% 的算力预算</text>
  </g>
  <g transform="translate(80,330)" font-family="monospace">
    <rect x="0" y="0" width="60" height="180" fill="#3b82f6"/>
    <text x="30" y="200" text-anchor="middle" fill="#94a3b8" font-size="14">预训练</text>
    <text x="30" y="218" text-anchor="middle" fill="#fbbf24" font-size="14">38%</text>
    
    <rect x="100" y="60" width="60" height="120" fill="#22c55e"/>
    <text x="130" y="200" text-anchor="middle" fill="#94a3b8" font-size="14">SFT+RL</text>
    <text x="130" y="218" text-anchor="middle" fill="#fbbf24" font-size="14">11%</text>
    
    <rect x="200" y="-40" width="60" height="220" fill="#ef4444"/>
    <text x="230" y="200" text-anchor="middle" fill="#94a3b8" font-size="14">评测</text>
    <text x="230" y="218" text-anchor="middle" fill="#fbbf24" font-size="14">45%</text>
    
    <rect x="300" y="100" width="60" height="80" fill="#a855f7"/>
    <text x="330" y="200" text-anchor="middle" fill="#94a3b8" font-size="14">合规</text>
    <text x="330" y="218" text-anchor="middle" fill="#fbbf24" font-size="14">6%</text>
  </g>
  <g transform="translate(580,330)" font-family="monospace" font-size="18" fill="#cbd5e1">
    <text y="0">▸ Agent 评测平均 30 步/任务</text>
    <text y="32">▸ Judge 模型必须强 → 难降本</text>
    <text y="64">▸ pass@k 重复采样 → 平方级</text>
    <text y="96">▸ 监管强制周期性审计</text>
  </g>
  <text x="80" y="600" fill="#64748b" font-family="monospace" font-size="14">2026 · AI 基础设施洞察</text>
</svg>
