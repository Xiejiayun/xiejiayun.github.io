<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Shield -->
  <g transform="translate(600, 240)">
    <path d="M0 -120 L100 -80 L100 40 Q100 120 0 150 Q-100 120 -100 40 L-100 -80 Z" fill="none" stroke="#f43f5e" stroke-width="2.5" opacity="0.6"/>
    <path d="M0 -90 L70 -60 L70 20 Q70 80 0 105 Q-70 80 -70 20 L-70 -60 Z" fill="#f43f5e" opacity="0.08"/>
    <!-- Crack lines -->
    <line x1="-30" y1="-40" x2="10" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
    <line x1="10" y1="0" x2="-15" y2="40" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
    <line x1="-15" y1="40" x2="20" y2="80" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <!-- Warning icon -->
    <polygon points="0,-30 25,15 -25,15" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="24" font-weight="bold">!</text>
  </g>
  <!-- Orbiting threats -->
  <g opacity="0.4">
    <circle cx="350" cy="180" r="40" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="350" y="185" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="10">Agent</text>
    <circle cx="850" cy="180" r="40" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="850" y="185" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="10">TEE</text>
    <circle cx="350" cy="380" r="40" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="350" y="385" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">Quantum</text>
    <circle cx="850" cy="380" r="40" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="850" y="385" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">APT</text>
  </g>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="32" font-weight="bold">AI安全的三重威胁</text>
  <text x="600" y="545" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="18">Agent漏洞 · TEE危机 · 量子攻防</text>
  <rect x="50" y="40" width="120" height="32" rx="16" fill="#f43f5e" opacity="0.2"/>
  <text x="110" y="61" text-anchor="middle" fill="#f43f5e" font-family="monospace" font-size="14">网络安全</text>
</svg>