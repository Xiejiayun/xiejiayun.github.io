<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0506"/>
      <stop offset="0.5" stop-color="#1a0a14"/>
      <stop offset="1" stop-color="#06030a"/>
    </linearGradient>
    <linearGradient id="capex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5c4a"/>
      <stop offset="1" stop-color="#9a2a30"/>
    </linearGradient>
    <linearGradient id="elec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5be4e8"/>
      <stop offset="1" stop-color="#1f6a7a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ebg)"/>

  <!-- title -->
  <text x="60" y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff">美国万亿美元 AI 豪赌 vs 80 GW 电力缺口</text>
  <text x="60" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#ffaaa0">"Electricity is eating compute." — 2026</text>

  <!-- Two axes - capex (red) and capacity (cyan) -->
  <g transform="translate(110,160)">
    <!-- Y axis labels -->
    <text x="-90" y="20" font-family="Arial" font-size="13" fill="#ff9080">AI capex ($B)</text>
    <text x="1080" y="20" font-family="Arial" font-size="13" fill="#5be4e8" text-anchor="end">Net new grid (GW)</text>

    <!-- baseline -->
    <line x1="0" y1="320" x2="1000" y2="320" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="320" stroke="#666" stroke-width="1"/>

    <!-- capex bars -->
    <g>
      <rect x="40" y="280" width="80" height="40" fill="url(#capex)"/>
      <text x="80" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#ff9080">$240B</text>

      <rect x="200" y="200" width="80" height="120" fill="url(#capex)"/>
      <text x="240" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#ff9080">$560B</text>

      <rect x="360" y="80" width="80" height="240" fill="url(#capex)"/>
      <text x="400" y="70" text-anchor="middle" font-family="Arial" font-size="13" fill="#ffd0c0" font-weight="700">~$1T</text>

      <rect x="520" y="20" width="80" height="300" fill="url(#capex)" opacity="0.7"/>
      <text x="560" y="10" text-anchor="middle" font-family="Arial" font-size="12" fill="#ff9080">$1.5T (est)</text>

      <rect x="680" y="0" width="80" height="320" fill="url(#capex)" opacity="0.45"/>
      <text x="720" y="-10" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff9080">$1.7T (est)</text>
    </g>

    <!-- electricity line -->
    <polyline points="80,318 240,310 400,298 560,286 720,272 880,256" stroke="#5be4e8" stroke-width="3" fill="none"/>
    <g fill="#5be4e8">
      <circle cx="80" cy="318" r="5"/>
      <circle cx="240" cy="310" r="5"/>
      <circle cx="400" cy="298" r="5"/>
      <circle cx="560" cy="286" r="5"/>
      <circle cx="720" cy="272" r="5"/>
      <circle cx="880" cy="256" r="5"/>
    </g>
    <text x="80" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#aabbcc">2024</text>
    <text x="240" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#aabbcc">2025</text>
    <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffd0c0" font-weight="700">2026</text>
    <text x="560" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#aabbcc">2027</text>
    <text x="720" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#aabbcc">2028</text>
    <text x="880" y="340" text-anchor="middle" font-family="Arial" font-size="13" fill="#aabbcc">2030</text>

    <text x="900" y="260" font-family="Arial" font-size="13" fill="#5be4e8">+27 GW净增</text>
    <text x="900" y="278" font-family="Arial" font-size="11" fill="#7aa8b0">vs 需求 +60-110 GW</text>
  </g>

  <!-- bottom note -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="#ffffff">下一个稀缺资源不是 GPU，是 230 kV 输电线 + 变压器</text>
  <text x="60" y="600" font-family="Arial" font-size="14" fill="#666666">Apricitas Economics · Net Interest · The Diff · PJM · ERCOT · FERC</text>
  <text x="1140" y="600" text-anchor="end" font-family="Arial" font-size="14" fill="#666666">xiejiayun.github.io · 2026-05</text>
</svg>
