<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#4488ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="40" y1="0" x2="40" y2="630" /><line x1="80" y1="0" x2="80" y2="630" /><line x1="120" y1="0" x2="120" y2="630" /><line x1="160" y1="0" x2="160" y2="630" /><line x1="200" y1="0" x2="200" y2="630" /><line x1="240" y1="0" x2="240" y2="630" /><line x1="280" y1="0" x2="280" y2="630" /><line x1="320" y1="0" x2="320" y2="630" /><line x1="360" y1="0" x2="360" y2="630" /><line x1="400" y1="0" x2="400" y2="630" /><line x1="440" y1="0" x2="440" y2="630" /><line x1="480" y1="0" x2="480" y2="630" /><line x1="520" y1="0" x2="520" y2="630" /><line x1="560" y1="0" x2="560" y2="630" /><line x1="600" y1="0" x2="600" y2="630" /><line x1="640" y1="0" x2="640" y2="630" /><line x1="680" y1="0" x2="680" y2="630" /><line x1="720" y1="0" x2="720" y2="630" /><line x1="760" y1="0" x2="760" y2="630" /><line x1="800" y1="0" x2="800" y2="630" /><line x1="840" y1="0" x2="840" y2="630" /><line x1="880" y1="0" x2="880" y2="630" /><line x1="920" y1="0" x2="920" y2="630" /><line x1="960" y1="0" x2="960" y2="630" /><line x1="1000" y1="0" x2="1000" y2="630" /><line x1="1040" y1="0" x2="1040" y2="630" /><line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1120" y1="0" x2="1120" y2="630" /><line x1="1160" y1="0" x2="1160" y2="630" /><line x1="1200" y1="0" x2="1200" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="0" /><line x1="0" y1="40" x2="1200" y2="40" /><line x1="0" y1="80" x2="1200" y2="80" /><line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="160" x2="1200" y2="160" /><line x1="0" y1="200" x2="1200" y2="200" /><line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="280" x2="1200" y2="280" /><line x1="0" y1="320" x2="1200" y2="320" /><line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="400" x2="1200" y2="400" /><line x1="0" y1="440" x2="1200" y2="440" /><line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="520" x2="1200" y2="520" /><line x1="0" y1="560" x2="1200" y2="560" /><line x1="0" y1="600" x2="1200" y2="600" />
  </g>
  <!-- Shield shape (cracked) - left half -->
  <path d="M560,120 L480,155 L480,310 L555,390" fill="url(#shieldGrad)" stroke="#4488ff" stroke-width="2" opacity="0.8"/>
  <!-- Shield - right half (offset to show crack) -->
  <path d="M565,125 L640,155 L640,310 L568,388" fill="url(#shieldGrad)" stroke="#4488ff" stroke-width="2" opacity="0.8"/>
  <!-- Crack line through shield -->
  <path d="M560,120 L555,180 L570,220 L552,270 L565,310 L555,350 L560,390" fill="none" stroke="#ff4444" stroke-width="3" filter="url(#redGlow)" opacity="0.9"/>
  <!-- Smaller cracks branching -->
  <path d="M555,180 L540,200" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.6"/>
  <path d="M570,220 L585,235" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.6"/>
  <path d="M552,270 L535,280" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.6"/>
  <!-- Attack arrows coming FROM shield outward -->
  <g filter="url(#redGlow)">
    <!-- Arrow top-left -->
    <line x1="520,170" y1="170" x2="380" y2="100" stroke="#ff4444" stroke-width="2.5" opacity="0.8"/>
    <polygon points="380,100 395,108 390,95" fill="#ff4444" opacity="0.8"/>
    <!-- Arrow left -->
    <line x1="490" y1="250" x2="330" y2="240" stroke="#ff6644" stroke-width="2.5" opacity="0.7"/>
    <polygon points="330,240 345,248 345,232" fill="#ff6644" opacity="0.7"/>
    <!-- Arrow bottom-left -->
    <line x1="530" y1="350" x2="390" y2="430" stroke="#ff4444" stroke-width="2.5" opacity="0.8"/>
    <polygon points="390,430 405,425 395,415" fill="#ff4444" opacity="0.8"/>
    <!-- Arrow top-right -->
    <line x1="610" y1="170" x2="750" y2="95" stroke="#ff4444" stroke-width="2.5" opacity="0.8"/>
    <polygon points="750,95 735,103 740,90" fill="#ff4444" opacity="0.8"/>
    <!-- Arrow right -->
    <line x1="630" y1="260" x2="790" y2="250" stroke="#ff6644" stroke-width="2.5" opacity="0.7"/>
    <polygon points="790,250 775,258 775,242" fill="#ff6644" opacity="0.7"/>
    <!-- Arrow bottom-right -->
    <line x1="590" y1="355" x2="740" y2="435" stroke="#ff4444" stroke-width="2.5" opacity="0.8"/>
    <polygon points="740,435 725,430 735,420" fill="#ff4444" opacity="0.8"/>
    <!-- Arrow down -->
    <line x1="560" y1="390" x2="560" y2="470" stroke="#ff5544" stroke-width="2.5" opacity="0.7"/>
    <polygon points="560,470 552,455 568,455" fill="#ff5544" opacity="0.7"/>
  </g>
  <!-- Small impact dots at arrow endpoints -->
  <circle cx="380" cy="100" r="4" fill="#ff4444" opacity="0.4"/>
  <circle cx="330" cy="240" r="4" fill="#ff6644" opacity="0.4"/>
  <circle cx="390" cy="430" r="4" fill="#ff4444" opacity="0.4"/>
  <circle cx="750" cy="95" r="4" fill="#ff4444" opacity="0.4"/>
  <circle cx="790" cy="250" r="4" fill="#ff6644" opacity="0.4"/>
  <circle cx="740" cy="435" r="4" fill="#ff4444" opacity="0.4"/>
  <!-- Title text -->
  <text x="600" y="540" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#ffffff" filter="url(#glow)">防御者变攻击者：信任倒置危机</text>
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#8888bb">Anti-DDoS Vendor Attacks Its Own Clients</text>
</svg>