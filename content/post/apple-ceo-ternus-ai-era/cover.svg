<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Apple-like circle -->
  <circle cx="900" cy="300" r="180" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.1"/>
  <circle cx="900" cy="300" r="120" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>
  <circle cx="900" cy="300" r="60" fill="none" stroke="#f8fafc" stroke-width="1.5" opacity="0.2"/>
  <!-- AI neural connections -->
  <g opacity="0.2">
    <circle cx="850" cy="250" r="4" fill="#8b5cf6"/>
    <circle cx="950" cy="260" r="4" fill="#06b6d4"/>
    <circle cx="880" cy="350" r="4" fill="#8b5cf6"/>
    <circle cx="940" cy="330" r="4" fill="#06b6d4"/>
    <line x1="850" y1="250" x2="950" y2="260" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="950" y1="260" x2="940" y2="330" stroke="#06b6d4" stroke-width="0.5"/>
    <line x1="880" y1="350" x2="850" y2="250" stroke="#8b5cf6" stroke-width="0.5"/>
  </g>
  <!-- Arrow transition -->
  <text x="700" y="310" font-family="sans-serif" font-size="60" fill="#94a3b8" opacity="0.3">→</text>
  <!-- Title -->
  <text x="100" y="280" font-family="sans-serif" font-size="42" fill="#f8fafc" font-weight="bold">库克谢幕，特努斯接棒</text>
  <text x="100" y="340" font-family="sans-serif" font-size="28" fill="#94a3b8">苹果AI战略的生死转折</text>
  <rect x="100" y="370" width="180" height="3" fill="#8b5cf6" rx="1"/>
  <rect x="100" y="410" width="80" height="28" rx="14" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="140" y="429" font-family="sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle">Apple</text>
  <rect x="200" y="410" width="100" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
  <text x="250" y="429" font-family="sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">AI战略</text>
</svg>
