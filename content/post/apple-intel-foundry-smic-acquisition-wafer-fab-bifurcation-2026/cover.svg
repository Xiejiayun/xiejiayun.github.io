<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0d18"/>
      <stop offset="1" stop-color="#11172a"/>
    </linearGradient>
    <linearGradient id="usCh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6df0"/>
      <stop offset="1" stop-color="#1b3a8a"/>
    </linearGradient>
    <linearGradient id="cnCh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef5d6a"/>
      <stop offset="1" stop-color="#8a1a26"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- wafer-like circles backgrounds -->
  <g opacity="0.07">
    <circle cx="200" cy="320" r="280" fill="none" stroke="#5cc4ff" stroke-width="2"/>
    <circle cx="200" cy="320" r="220" fill="none" stroke="#5cc4ff" stroke-width="1"/>
    <circle cx="200" cy="320" r="160" fill="none" stroke="#5cc4ff" stroke-width="1"/>
    <circle cx="1000" cy="320" r="280" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="1000" cy="320" r="220" fill="none" stroke="#ff6b6b" stroke-width="1"/>
    <circle cx="1000" cy="320" r="160" fill="none" stroke="#ff6b6b" stroke-width="1"/>
  </g>

  <!-- left: 西方链 -->
  <g transform="translate(200 250)">
    <text x="0" y="-150" text-anchor="middle" fill="#7eb6ff" font-family="Inter, sans-serif" font-size="26" font-weight="800">西方链</text>
    <text x="0" y="-122" text-anchor="middle" fill="#9bbdff" font-family="Inter, sans-serif" font-size="14" opacity="0.8">US + JP + KR + EU</text>
    <!-- player chips -->
    <g font-family="Inter, sans-serif" font-weight="700">
      <rect x="-130" y="-90" width="120" height="50" rx="8" fill="#1b2c52" stroke="#5cc4ff" stroke-width="2"/>
      <text x="-70" y="-58" text-anchor="middle" fill="#fff" font-size="18">TSMC</text>
      <rect x="10" y="-90" width="120" height="50" rx="8" fill="#1b2c52" stroke="#5cc4ff" stroke-width="2"/>
      <text x="70" y="-58" text-anchor="middle" fill="#fff" font-size="18">Intel Foundry</text>
      <rect x="-130" y="-20" width="120" height="50" rx="8" fill="#1b2c52" stroke="#5cc4ff" stroke-width="2"/>
      <text x="-70" y="12" text-anchor="middle" fill="#fff" font-size="18">Samsung</text>
      <rect x="10" y="-20" width="120" height="50" rx="8" fill="#1b2c52" stroke="#5cc4ff" stroke-width="2"/>
      <text x="70" y="12" text-anchor="middle" fill="#fff" font-size="16">Sony-TSMC JP</text>
    </g>
    <!-- arrows: Apple-Intel handshake -->
    <g transform="translate(0 70)">
      <text text-anchor="middle" fill="#ffd166" font-family="Inter, sans-serif" font-size="16" font-weight="700">2026.05 Apple-Intel 协议</text>
      <text y="22" text-anchor="middle" fill="#a0d4f5" font-family="Inter, sans-serif" font-size="13">由政府撮合 · 国家化代工</text>
    </g>
  </g>

  <!-- right: 东方链 -->
  <g transform="translate(1000 250)">
    <text x="0" y="-150" text-anchor="middle" fill="#ff8a8a" font-family="Inter, sans-serif" font-size="26" font-weight="800">东方链</text>
    <text x="0" y="-122" text-anchor="middle" fill="#ffb3b3" font-family="Inter, sans-serif" font-size="14" opacity="0.8">CN 本土循环</text>
    <g font-family="Inter, sans-serif" font-weight="700">
      <rect x="-130" y="-90" width="120" height="50" rx="8" fill="#3a131a" stroke="#ff6b6b" stroke-width="2"/>
      <text x="-70" y="-58" text-anchor="middle" fill="#fff" font-size="18">SMIC</text>
      <rect x="10" y="-90" width="120" height="50" rx="8" fill="#3a131a" stroke="#ff6b6b" stroke-width="2"/>
      <text x="70" y="-58" text-anchor="middle" fill="#fff" font-size="18">Hua Hong</text>
      <rect x="-130" y="-20" width="120" height="50" rx="8" fill="#3a131a" stroke="#ff6b6b" stroke-width="2"/>
      <text x="-70" y="12" text-anchor="middle" fill="#fff" font-size="18">Nexchip</text>
      <rect x="10" y="-20" width="120" height="50" rx="8" fill="#3a131a" stroke="#ff6b6b" stroke-width="2"/>
      <text x="70" y="12" text-anchor="middle" fill="#fff" font-size="16">CXMT / YMTC</text>
    </g>
    <g transform="translate(0 70)">
      <text text-anchor="middle" fill="#ffd166" font-family="Inter, sans-serif" font-size="16" font-weight="700">2026.05 SMIC $5.9B 收购</text>
      <text y="22" text-anchor="middle" fill="#ffb3b3" font-family="Inter, sans-serif" font-size="13">SMIC 北方 100% 控股 · 大基金入主</text>
    </g>
  </g>

  <!-- center: 裂缝 -->
  <g transform="translate(600 320)">
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#ffd166" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="0" y="-200" text-anchor="middle" fill="#ffd166" font-family="Inter, sans-serif" font-size="20" font-weight="800">⚡ 双链分裂</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" fill="#7d8590">
      <text x="0" y="-50" text-anchor="middle">TSMC HPC = 61%</text>
      <text x="0" y="-30" text-anchor="middle">AI 挤兑 → Apple 出走</text>
      <text x="0" y="50" text-anchor="middle">SMIC 北方 整合 ¥406B</text>
      <text x="0" y="70" text-anchor="middle">本土循环闭合</text>
    </g>
  </g>

  <!-- title -->
  <text x="600" y="60" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="32" font-weight="800">全球晶圆代工 · 双链分裂时刻</text>
  <text x="600" y="95" text-anchor="middle" fill="#ffd166" font-family="Inter, sans-serif" font-size="18">Apple-Intel × SMIC $5.9B：4 天，2 件事，1 个时代终结</text>
  <text x="600" y="590" text-anchor="middle" fill="#7d8590" font-family="JetBrains Mono, monospace" font-size="14">2026-05-14 · 半导体 / 地缘政治 / 产业链重构</text>
</svg>
