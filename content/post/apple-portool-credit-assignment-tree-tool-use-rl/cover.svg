<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.08" fill="#c084fc">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>
  <!-- Tree branches -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Root to first split -->
    <line x1="600" y1="180" x2="600" y2="280" stroke="#c084fc" stroke-width="3"/>
    <!-- Split level 1 -->
    <line x1="600" y1="280" x2="420" y2="370" stroke="#00d4aa" stroke-width="2.5"/>
    <line x1="600" y1="280" x2="780" y2="370" stroke="#ff6b9d" stroke-width="2.5"/>
    <!-- Split level 2 left -->
    <line x1="420" y1="370" x2="340" y2="460" stroke="#00d4aa" stroke-width="2"/>
    <line x1="420" y1="370" x2="500" y2="460" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
    <!-- Split level 2 right -->
    <line x1="780" y1="370" x2="700" y2="460" stroke="#ff6b9d" stroke-width="2" opacity="0.5"/>
    <line x1="780" y1="370" x2="860" y2="460" stroke="#ff6b9d" stroke-width="2"/>
    <!-- Level 3 -->
    <line x1="340" y1="460" x2="300" y2="530" stroke="#00d4aa" stroke-width="1.5"/>
    <line x1="340" y1="460" x2="380" y2="530" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="860" y1="460" x2="820" y2="530" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="860" y1="460" x2="900" y2="530" stroke="#ff6b9d" stroke-width="1.5"/>
  </g>
  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Root -->
    <circle cx="600" cy="180" r="18" fill="#0f0f23" stroke="#c084fc" stroke-width="2.5"/>
    <text x="600" y="185" text-anchor="middle" fill="#c084fc" font-size="14" font-family="monospace">Q</text>
    <!-- Prefix node -->
    <circle cx="600" cy="280" r="15" fill="#0f0f23" stroke="#c084fc" stroke-width="2"/>
    <text x="600" y="285" text-anchor="middle" fill="#c084fc" font-size="11" font-family="monospace">π</text>
    <!-- L1 -->
    <circle cx="420" cy="370" r="15" fill="#0f0f23" stroke="#00d4aa" stroke-width="2.5"/>
    <text x="420" y="375" text-anchor="middle" fill="#00d4aa" font-size="10" font-family="monospace">T₁</text>
    <circle cx="780" cy="370" r="15" fill="#0f0f23" stroke="#ff6b9d" stroke-width="2.5"/>
    <text x="780" y="375" text-anchor="middle" fill="#ff6b9d" font-size="10" font-family="monospace">T₂</text>
    <!-- L2 -->
    <circle cx="340" cy="460" r="12" fill="#0f0f23" stroke="#00d4aa" stroke-width="2"/>
    <text x="340" y="464" text-anchor="middle" fill="#00d4aa" font-size="9" font-family="monospace">✓</text>
    <circle cx="500" cy="460" r="12" fill="#0f0f23" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
    <circle cx="700" cy="460" r="12" fill="#0f0f23" stroke="#ff6b9d" stroke-width="1.5" opacity="0.5"/>
    <circle cx="860" cy="460" r="12" fill="#0f0f23" stroke="#ff6b9d" stroke-width="2"/>
    <text x="860" y="464" text-anchor="middle" fill="#ff6b9d" font-size="9" font-family="monospace">✗</text>
    <!-- L3 leaves -->
    <circle cx="300" cy="530" r="8" fill="#00d4aa" opacity="0.7"/>
    <circle cx="380" cy="530" r="8" fill="#c084fc" opacity="0.4"/>
    <circle cx="820" cy="530" r="8" fill="#c084fc" opacity="0.4"/>
    <circle cx="900" cy="530" r="8" fill="#ff6b9d" opacity="0.7"/>
  </g>
  <!-- Labels -->
  <text x="430" y="320" fill="#00d4aa" font-size="11" opacity="0.7" font-family="sans-serif">good branch</text>
  <text x="700" y="320" fill="#ff6b9d" font-size="11" opacity="0.7" font-family="sans-serif">bad branch</text>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold" font-family="sans-serif">Apple PORTool</text>
  <text x="600" y="100" text-anchor="middle" fill="#e0e0e0" font-size="20" font-family="sans-serif">用分叉回滚树解决工具调用的信用分配难题</text>
  <text x="600" y="130" text-anchor="middle" fill="#c084fc" font-size="14" font-family="monospace" opacity="0.7">Rewarded Rollout Tree · Credit Assignment · RL</text>
  <!-- Bottom bar -->
  <rect x="0" y="615" width="1200" height="15" fill="#c084fc" opacity="0.15"/>
  <text x="600" y="610" text-anchor="middle" fill="#888" font-size="12" font-family="sans-serif">ACL 2026 · Apple ML Research</text>
</svg>