<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0020"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- School buildings -->
  <g opacity="0.3">
    <rect x="100" y="200" width="200" height="250" rx="5" fill="#2a1a3a" stroke="#8844aa" stroke-width="1"/>
    <rect x="350" y="180" width="200" height="270" rx="5" fill="#2a1a3a" stroke="#8844aa" stroke-width="1"/>
    <rect x="650" y="200" width="200" height="250" rx="5" fill="#2a1a3a" stroke="#8844aa" stroke-width="1"/>
    <rect x="900" y="180" width="200" height="270" rx="5" fill="#2a1a3a" stroke="#8844aa" stroke-width="1"/>
  </g>
  <!-- Lock icon (broken) -->
  <g transform="translate(550, 100)">
    <path d="M50,80 L50,50 C50,22 78,-5 100,10" stroke="#ff4444" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="20" y="80" width="80" height="60" rx="8" fill="#1a1a2e" stroke="#ff4444" stroke-width="3"/>
    <circle cx="60" cy="105" r="8" fill="#ff4444"/>
    <line x1="60" y1="113" x2="60" y2="125" stroke="#ff4444" stroke-width="3"/>
  </g>
  <!-- Connection lines (broken) -->
  <g stroke="#ff4444" stroke-width="1.5" opacity="0.5" stroke-dasharray="8,4">
    <line x1="200" y1="300" x2="550" y2="180"/>
    <line x1="450" y1="300" x2="580" y2="180"/>
    <line x1="750" y1="300" x2="620" y2="180"/>
    <line x1="1000" y1="300" x2="650" y2="180"/>
  </g>
  <!-- Ransom text -->
  <g font-family="monospace" fill="#ff4444" opacity="0.7">
    <text x="200" y="520" font-size="14">YOUR DATA HAS BEEN EXFILTRATED</text>
    <text x="200" y="545" font-size="14">275,000,000 USERS AFFECTED</text>
    <text x="200" y="570" font-size="14">8,809 INSTITUTIONS COMPROMISED</text>
  </g>
  <!-- Red warning triangles -->
  <g fill="#ff4444" opacity="0.6">
    <polygon points="200,170 190,190 210,190"/>
    <polygon points="450,150 440,170 460,170"/>
    <polygon points="750,170 740,190 760,190"/>
    <polygon points="1000,150 990,170 1010,170"/>
  </g>
</svg>