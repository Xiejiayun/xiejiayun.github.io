    <rect x="540" y="200" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
    <rect x="600" y="200" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#22d3ee" stroke-width="1"/>
    <rect x="660" y="200" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
    <rect x="480" y="260" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
    <rect x="540" y="260" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#22d3ee" stroke-width="1"/>
    <rect x="600" y="260" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
    <rect x="660" y="260" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#22d3ee" stroke-width="1"/>
    <rect x="480" y="320" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#22d3ee" stroke-width="1"/>
    <rect x="540" y="320" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
    <rect x="600" y="320" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#22d3ee" stroke-width="1"/>
    <rect x="660" y="320" width="50" height="50" rx="2" fill="url(#chipGlow)" stroke="#fbbf24" stroke-width="1"/>
