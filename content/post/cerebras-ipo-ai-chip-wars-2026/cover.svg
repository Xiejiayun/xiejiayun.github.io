    </pattern>
    <linearGradient id="chipGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
