  <line x1="200" y1="280" x2="420" y2="280" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="780" y1="280" x2="1000" y2="280" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="520" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">AI CHIP WARS</text>
  <text x="600" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Cerebras IPO · Wafer-Scale · $35B Valuation</text>
