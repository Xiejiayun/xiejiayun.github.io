<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#2a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <!-- Wafer representation -->
  <g transform="translate(800, 100)">
    <circle cx="120" cy="120" r="110" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.5"/>
    <!-- Die grid on wafer -->
    <g opacity="0.3" stroke="#ffaa00" stroke-width="0.5">
      <rect x="30" y="30" width="180" height="180" fill="none"/>
      <line x1="30" y1="60" x2="210" y2="60"/>
      <line x1="30" y1="90" x2="210" y2="90"/>
      <line x1="30" y1="120" x2="210" y2="120"/>
      <line x1="30" y1="150" x2="210" y2="150"/>
      <line x1="30" y1="180" x2="210" y2="180"/>
      <line x1="60" y1="30" x2="60" y2="210"/>
      <line x1="90" y1="30" x2="90" y2="210"/>
      <line x1="120" y1="30" x2="120" y2="210"/>
      <line x1="150" y1="30" x2="150" y2="210"/>
      <line x1="180" y1="30" x2="180" y2="210"/>
    </g>
    <!-- Highlight: entire wafer = one chip -->
    <text x="120" y="260" fill="#ffaa00" font-family="monospace" font-size="13" text-anchor="middle">WAFER = 1 CHIP</text>
  </g>
  <!-- Trend arrow: Training → Inference -->
  <g transform="translate(700, 400)">
    <text x="0" y="0" fill="#666" font-family="monospace" font-size="14">训练 38%</text>
    <line x1="90" y1="-5" x2="150" y2="-5" stroke="#ffaa00" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="160" y="0" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold">推理 53%+</text>
  </g>
  <!-- Title -->
  <text x="60" y="200" fill="#ffffff" font-family="sans-serif" font-size="36" font-weight="bold">Cerebras 上市在即</text>
  <text x="60" y="250" fill="#ffaa00" font-family="sans-serif" font-size="24">晶圆级芯片押注推理经济学</text>
  <rect x="60" y="270" width="350" height="3" fill="#ffaa00"/>
  <text x="60" y="310" fill="#aaaaaa" font-family="sans-serif" font-size="18">AI 算力的价值重心从训练滑向推理</text>
  <text x="60" y="350" fill="#666" font-family="sans-serif" font-size="16">WSE-3 · 44GB 片上 SRAM · 每 token 成本革命</text>
  <!-- Tag -->
  <rect x="60" y="530" width="90" height="30" rx="15" fill="none" stroke="#ffaa00" stroke-width="1"/>
  <text x="105" y="550" fill="#ffaa00" font-family="monospace" font-size="13" text-anchor="middle">科技金融</text>
</svg>