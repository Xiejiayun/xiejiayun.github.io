  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <text x="600" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="#888">日均AI Token消耗量</text>
  <text x="600" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="120" font-weight="bold" fill="url(#bar)">140T</text>
  <text x="600" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#e0e0e0">万亿 Tokens / 天</text>
