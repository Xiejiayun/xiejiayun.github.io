  <text x="500" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#888">Q3</text>
  <text x="640" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#888">Q4</text>
  <text x="780" y="490" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#ff8800">2026 Q1</text>
  <text x="600" y="570" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#555">前沿科技 · 深度分析</text>
