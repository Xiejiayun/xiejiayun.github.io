<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#0f172a"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Three pillars -->
  <rect x="100" y="130" width="160" height="180" rx="8" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="180" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fb7185">人才流失</text>
  <text x="180" y="190" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb7185" opacity="0.7">DeepSeek V4</text>
  <text x="180" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb7185" opacity="0.7">核心研发离职</text>
  <text x="180" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb7185" opacity="0.7">行业人才战</text>
  <rect x="320" y="130" width="160" height="180" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbbf24">资本管制</text>
  <text x="400" y="190" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.7">Manus AI</text>
  <text x="400" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.7">外资被叫停</text>
  <text x="400" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.7">双向铁幕</text>
  <rect x="540" y="130" width="160" height="180" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="620" y="165" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">自主突围</text>
  <text x="620" y="190" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">小米 3nm芯片</text>
  <text x="620" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">出货量破百万</text>
  <text x="620" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" opacity="0.7">开源策略</text>
  <!-- Tension arrows -->
  <line x1="265" y1="220" x2="315" y2="220" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="485" y1="220" x2="535" y2="220" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">中国AI生态的三重张力</text>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">2026年4月 · 深度分析</text>
</svg>