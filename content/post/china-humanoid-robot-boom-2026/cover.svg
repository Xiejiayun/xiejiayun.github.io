<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Running robot silhouette -->
  <!-- Body -->
  <ellipse cx="400" cy="220" rx="25" ry="40" fill="none" stroke="#fbbf24" stroke-width="2.5" transform="rotate(-15 400 220)"/>
  <!-- Head -->
  <circle cx="410" cy="172" r="18" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <rect x="404" y="164" width="12" height="6" rx="2" fill="#22d3ee" opacity="0.6"/>
  <!-- Right arm (forward) -->
  <line x1="415" y1="200" x2="445" y2="175" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="445" y1="175" x2="460" y2="190" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left arm (back) -->
  <line x1="390" y1="205" x2="360" y2="225" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="360" y1="225" x2="345" y2="215" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right leg (forward stride) -->
  <line x1="395" y1="255" x2="440" y2="295" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="440" y1="295" x2="465" y2="310" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leg (back stride) -->
  <line x1="400" y1="255" x2="355" y2="295" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="355" y1="295" x2="340" y2="310" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="100" y1="315" x2="700" y2="315" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Speed lines -->
  <line x1="300" y1="195" x2="260" y2="195" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
  <line x1="310" y1="210" x2="250" y2="210" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <line x1="315" y1="225" x2="265" y2="225" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
  <!-- Distance marker: 21.0975km -->
  <text x="620" y="310" fill="#94a3b8" font-family="monospace" font-size="12">21.0975 km</text>
  <text x="620" y="326" fill="#fbbf24" font-family="monospace" font-size="11">50'26"</text>
  <!-- Stats boxes -->
  <rect x="60" y="330" width="140" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="130" y="354" fill="#34d399" font-family="sans-serif" font-size="12" text-anchor="middle">量产 10,000+ 台</text>
  <rect x="220" y="330" width="140" height="40" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="290" y="354" fill="#fbbf24" font-family="sans-serif" font-size="12" text-anchor="middle">50+ 城市覆盖</text>
  <rect x="380" y="330" width="140" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="450" y="354" fill="#22d3ee" font-family="sans-serif" font-size="12" text-anchor="middle">平台化战略</text>
  <!-- Title -->
  <text x="400" y="50" fill="#e2e8f0" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle">中国人形机器人爆发</text>
  <text x="400" y="78" fill="#94a3b8" font-family="sans-serif" font-size="15" text-anchor="middle">从半马夺冠到万台量产的产业跃迁</text>
</svg>