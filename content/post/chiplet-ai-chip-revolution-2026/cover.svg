<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
  </g>
  <!-- Substrate / interposer -->
  <rect x="200" y="230" width="800" height="200" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="445" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11">Silicon Interposer / Advanced Packaging</text>
  <!-- Chiplet 1 - Compute -->
  <rect x="240" y="260" width="140" height="100" rx="6" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="2"/>
  <text x="310" y="300" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="bold">Compute</text>
  <text x="310" y="318" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">3nm · AI Core</text>
  <text x="310" y="335" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Tensor Units</text>
  <!-- Chiplet 2 - Compute -->
  <rect x="420" y="260" width="140" height="100" rx="6" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="2"/>
  <text x="490" y="300" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="13" font-weight="bold">Compute</text>
  <text x="490" y="318" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">3nm · AI Core</text>
  <text x="490" y="335" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Tensor Units</text>
  <!-- Chiplet 3 - Memory -->
  <rect x="600" y="260" width="120" height="100" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="2"/>
  <text x="660" y="300" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13" font-weight="bold">HBM</text>
  <text x="660" y="318" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Memory</text>
  <text x="660" y="335" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Stack</text>
  <!-- Chiplet 4 - I/O -->
  <rect x="760" y="260" width="120" height="100" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="2"/>
  <text x="820" y="300" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="bold">I/O</text>
  <text x="820" y="318" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">7nm · PCIe</text>
  <text x="820" y="335" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">UCIe Link</text>
  <!-- NoC connections -->
  <line x1="380" y1="310" x2="420" y2="310" stroke="#22d3ee" stroke-width="2"/>
  <line x1="560" y1="310" x2="600" y2="310" stroke="#34d399" stroke-width="2"/>
  <line x1="720" y1="310" x2="760" y2="310" stroke="#fbbf24" stroke-width="2"/>
  <!-- Connection dots -->
  <circle cx="400" cy="310" r="3" fill="#22d3ee"/>
  <circle cx="580" cy="310" r="3" fill="#34d399"/>
  <circle cx="740" cy="310" r="3" fill="#fbbf24"/>
  <!-- TSV arrows going down -->
  <g stroke="#a78bfa" stroke-width="1" opacity="0.5">
    <line x1="310" y1="360" x2="310" y2="420"/><line x1="490" y1="360" x2="490" y2="420"/>
    <line x1="660" y1="360" x2="660" y2="420"/><line x1="820" y1="360" x2="820" y2="420"/>
  </g>
  <!-- Title -->
  <text x="600" y="120" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="38" font-weight="bold">Chiplet 架构革命</text>
  <text x="600" y="160" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="16">Modular · Scalable · Beyond Moore's Law</text>
  <!-- Bottom stats -->
  <text x="200" y="540" fill="#22d3ee" font-family="monospace" font-size="12">◆ 3nm Compute</text>
  <text x="420" y="540" fill="#34d399" font-family="monospace" font-size="12">◆ HBM Memory</text>
  <text x="640" y="540" fill="#fbbf24" font-family="monospace" font-size="12">◆ 7nm I/O</text>
  <text x="860" y="540" fill="#a78bfa" font-family="monospace" font-size="12">◆ 2.5D/3D Package</text>
</svg>