<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Three pillars -->
  <rect x="150" y="200" width="220" height="280" rx="8" fill="none" stroke="#d4a574" stroke-width="2" opacity="0.8"/>
  <text x="260" y="250" text-anchor="middle" fill="#d4a574" font-family="sans-serif" font-size="22" font-weight="bold">Opus 4.7</text>
  <text x="260" y="280" text-anchor="middle" fill="#8b7355" font-family="sans-serif" font-size="14">能力天花板</text>
  <line x1="180" y1="310" x2="340" y2="310" stroke="#d4a574" stroke-width="1" opacity="0.3"/>
  <text x="260" y="340" text-anchor="middle" fill="#a08060" font-family="monospace" font-size="12">每个维度都更强</text>
  <text x="260" y="365" text-anchor="middle" fill="#a08060" font-family="monospace" font-size="12">渐进式超越</text>
  <text x="260" y="390" text-anchor="middle" fill="#a08060" font-family="monospace" font-size="12">编码能力飞跃</text>

  <rect x="490" y="200" width="220" height="280" rx="8" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <text x="600" y="250" text-anchor="middle" fill="#ff6b6b" font-family="sans-serif" font-size="22" font-weight="bold">Mythos</text>
  <text x="600" y="280" text-anchor="middle" fill="#cc5555" font-family="sans-serif" font-size="14">安全新范式</text>
  <line x1="520" y1="310" x2="680" y2="310" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <text x="600" y="340" text-anchor="middle" fill="#bb5555" font-family="monospace" font-size="12">Constitutional AI 2.0</text>
  <text x="600" y="365" text-anchor="middle" fill="#bb5555" font-family="monospace" font-size="12">安全可解释性</text>
  <text x="600" y="390" text-anchor="middle" fill="#bb5555" font-family="monospace" font-size="12">Schneier认证</text>

  <rect x="830" y="200" width="220" height="280" rx="8" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.8"/>
  <text x="940" y="250" text-anchor="middle" fill="#4ecdc4" font-family="sans-serif" font-size="22" font-weight="bold">Glasswing</text>
  <text x="940" y="280" text-anchor="middle" fill="#3ba89e" font-family="sans-serif" font-size="14">企业级布局</text>
  <line x1="860" y1="310" x2="1020" y2="310" stroke="#4ecdc4" stroke-width="1" opacity="0.3"/>
  <text x="940" y="340" text-anchor="middle" fill="#3ba89e" font-family="monospace" font-size="12">企业Agent平台</text>
  <text x="940" y="365" text-anchor="middle" fill="#3ba89e" font-family="monospace" font-size="12">AWS深度整合</text>
  <text x="940" y="390" text-anchor="middle" fill="#3ba89e" font-family="monospace" font-size="12">收入引擎</text>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="bold">Anthropic的三重奏</text>
  <text x="600" y="560" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="16">挑战OpenAI的完整战略拼图</text>
  <!-- Connecting arcs -->
  <path d="M370 340 Q430 180 490 340" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <path d="M710 340 Q770 180 830 340" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
</svg>