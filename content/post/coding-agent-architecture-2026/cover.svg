<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)"/>
  <g opacity="0.15">
    <text x="50" y="80" font-family="monospace" font-size="12" fill="#00ff88">function plan() {</text>
    <text x="50" y="100" font-family="monospace" font-size="12" fill="#00ff88">  analyze_codebase();</text>
    <text x="50" y="120" font-family="monospace" font-size="12" fill="#00ff88">  generate_diff();</text>
    <text x="50" y="140" font-family="monospace" font-size="12" fill="#00ff88">  run_tests();</text>
    <text x="50" y="160" font-family="monospace" font-size="12" fill="#00ff88">}</text>
    <text x="500" y="280" font-family="monospace" font-size="12" fill="#00ff88">class Agent:</text>
    <text x="500" y="300" font-family="monospace" font-size="12" fill="#00ff88">  def think(self):</text>
    <text x="500" y="320" font-family="monospace" font-size="12" fill="#00ff88">    return self.llm(ctx)</text>
  </g>
  <circle cx="400" cy="200" r="60" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="200" r="90" fill="none" stroke="#0f3460" stroke-width="1.5" opacity="0.4"/>
