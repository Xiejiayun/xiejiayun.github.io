  <text x="400" y="360" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">编码智能体的架构解剖</text>
  <text x="400" y="385" font-family="sans-serif" font-size="13" fill="#8899aa" text-anchor="middle">从IDE插件到自主工程师的进化路线</text>
