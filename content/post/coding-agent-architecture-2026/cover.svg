  <text x="555" y="165" font-family="monospace" font-size="11" fill="#8899aa">Tools</text>
  <line x1="460" y1="200" x2="550" y2="200" stroke="#0f3460" stroke-width="1.5"/>
  <text x="555" y="205" font-family="monospace" font-size="11" fill="#8899aa">Sandbox</text>
  <line x1="460" y1="200" x2="550" y2="240" stroke="#0f3460" stroke-width="1.5"/>
