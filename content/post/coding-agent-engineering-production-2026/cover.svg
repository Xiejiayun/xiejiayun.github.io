<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Code lines background -->
  <g fill="#21262d" opacity="0.5">
    <rect x="80" y="120" width="400" height="12" rx="2"/>
    <rect x="80" y="140" width="300" height="12" rx="2"/>
    <rect x="80" y="160" width="350" height="12" rx="2"/>
    <rect x="80" y="180" width="250" height="12" rx="2"/>
    <rect x="80" y="200" width="380" height="12" rx="2"/>
    <rect x="80" y="220" width="200" height="12" rx="2"/>
  </g>
  <!-- Agent brain -->
  <circle cx="800" cy="280" r="120" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <circle cx="800" cy="280" r="80" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
  <circle cx="800" cy="280" r="40" fill="#58a6ff" opacity="0.3"/>
  <!-- Connection lines from code to agent -->
  <line x1="480" y1="170" x2="680" y2="260" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="200" x2="680" y2="280" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="230" x2="680" y2="300" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <!-- Labels around agent -->
  <text x="800" y="140" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="14">Planning</text>
  <text x="960" y="240" text-anchor="middle" fill="#ffa657" font-family="monospace" font-size="14">Tool Use</text>
  <text x="960" y="340" text-anchor="middle" fill="#d2a8ff" font-family="monospace" font-size="14">Memory</text>
  <text x="800" y="430" text-anchor="middle" fill="#79c0ff" font-family="monospace" font-size="14">Reflection</text>
  <text x="640" y="340" text-anchor="middle" fill="#ff7b72" font-family="monospace" font-size="14">Execution</text>
  <text x="640" y="240" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="14">Context</text>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="bold">Coding Agent工程化</text>
  <text x="600" y="540" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="18">从Demo神器到生产力引擎的关键跨越</text>
  <!-- Dots -->
  <circle cx="800" cy="280" r="5" fill="#58a6ff"/>
</svg>