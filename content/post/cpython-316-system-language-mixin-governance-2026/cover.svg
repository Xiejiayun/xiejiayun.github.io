<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a1632"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3776AB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3776AB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CE412B" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- timeline -->
  <g transform="translate(80,470)" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#94a3b8">
    <line x1="0" y1="0" x2="1040" y2="0" stroke="url(#line2)" stroke-width="2"/>
    <g>
      <circle cx="0" cy="0" r="6" fill="#3776AB"/><text x="0" y="-15" text-anchor="middle">1989</text><text x="0" y="25" text-anchor="middle" fill="#64748b">CPython 诞生</text>
    </g>
    <g>
      <circle cx="260" cy="0" r="6" fill="#3776AB"/><text x="260" y="-15" text-anchor="middle">2008</text><text x="260" y="25" text-anchor="middle" fill="#64748b">Python 3.0</text>
    </g>
    <g>
      <circle cx="520" cy="0" r="6" fill="#3776AB"/><text x="520" y="-15" text-anchor="middle">2024</text><text x="520" y="25" text-anchor="middle" fill="#64748b">PEP 703 GIL 可选</text>
    </g>
    <g>
      <circle cx="780" cy="0" r="6" fill="#FFD43B"/><text x="780" y="-15" text-anchor="middle">2026</text><text x="780" y="25" text-anchor="middle" fill="#FFD43B">PEP 草案</text>
    </g>
    <g>
      <circle cx="1040" cy="0" r="8" fill="#CE412B"/><text x="1040" y="-15" text-anchor="middle">2027</text><text x="1040" y="25" text-anchor="middle" fill="#FCA5A5">3.16 + Rust</text>
    </g>
  </g>
  <!-- python logo abstract -->
  <g transform="translate(940,150)" opacity="0.18">
    <path d="M 0 0 Q 0 -40 40 -40 L 100 -40 Q 140 -40 140 0 L 140 40 L 70 40 Q 30 40 30 80 L 30 140" fill="none" stroke="#3776AB" stroke-width="14"/>
    <path d="M 30 200 Q 30 240 70 240 L 130 240 Q 170 240 170 200 L 170 160 L 100 160 Q 60 160 60 120 L 60 60" fill="none" stroke="#FFD43B" stroke-width="14"/>
  </g>
  <!-- title -->
  <g fill="#f1f5f9">
    <text x="60" y="110" font-size="20" fill="#94a3b8" letter-spacing="6">OPEN SOURCE · LANGUAGE GOVERNANCE</text>
    <text x="60" y="180" font-size="48" font-weight="800">CPython 走向系统语言混编</text>
    <text x="60" y="240" font-size="36" font-weight="700" fill="#FFD43B">3.16 写入 Rust</text>
    <text x="60" y="305" font-size="22" fill="#cbd5e1">36 年的 C 单栈终于裂开一条缝</text>
    <text x="60" y="345" font-size="22" fill="#cbd5e1">PEP 路线图 · 内部 API · 发行版态度</text>
  </g>
  <rect x="60" y="200" width="6" height="60" fill="#FFD43B"/>
  <text x="60" y="608" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#64748b">XIEJIAYUN.GITHUB.IO · 2026-05-18</text>
</svg>
