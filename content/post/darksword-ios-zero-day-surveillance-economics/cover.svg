<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="crack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#4ecdc4">
    <line x1="0" y1="0" x2="1200" y2="630" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="0" y2="500" stroke-width="0.5"/>
  </g>
  <!-- Phone silhouette -->
  <g transform="translate(520, 80)">
    <rect x="0" y="0" width="160" height="300" rx="18" fill="none" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
    <rect x="60" y="12" width="40" height="6" rx="3" fill="#4ecdc4" opacity="0.4"/>
    <!-- Screen -->
    <rect x="8" y="30" width="144" height="240" rx="4" fill="#0d1117" stroke="#2d3436" stroke-width="1"/>
    <!-- Crack lines on screen -->
    <g filter="url(#glow)">
      <polyline points="80,30 65,90 85,130 55,180 75,220 60,270" fill="none" stroke="url(#crack)" stroke-width="2.5"/>
      <polyline points="65,90 95,110 110,160" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
      <polyline points="85,130 50,150 40,190" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
      <polyline points="55,180 90,200 105,240" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
    </g>
    <!-- Shield overlay (cracked) -->
    <g transform="translate(80, 120)" opacity="0.3">
      <path d="M0,-35 L30,-20 L30,10 Q30,35 0,45 Q-30,35 -30,10 L-30,-20 Z" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    </g>
    <!-- Crack through shield -->
    <line x1="70" y1="85" x2="95" y2="165" stroke="#ff6b6b" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  </g>
  <!-- Floating 0-day labels -->
  <g font-family="monospace" font-size="13" fill="#ff6b6b" opacity="0.6">
    <text x="150" y="150">CVE-2026-****</text>
    <text x="850" y="120">0day</text>
    <text x="900" y="200">CVE-2026-****</text>
    <text x="120" y="350">GHOSTBLADE</text>
    <text x="880" y="380">GHOSTKNIFE</text>
    <text x="160" y="480">0day × 6</text>
    <text x="870" y="500">GHOSTSABER</text>
  </g>
  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="38" fill="#ffffff">DarkSword 的 6 个零日</text>
  <text x="600" y="530" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#4ecdc4">iOS 全链攻击泄露揭示商业监控行业的经济学死局</text>
  <!-- Bottom accent line -->
  <rect x="350" y="560" width="500" height="2" fill="#ff6b6b" opacity="0.6" rx="1"/>
  <!-- Dots decoration -->
  <circle cx="100" cy="100" r="2" fill="#4ecdc4" opacity="0.3"/>
  <circle cx="1100" cy="80" r="2" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="1050" cy="550" r="3" fill="#4ecdc4" opacity="0.2"/>
  <circle cx="80" cy="550" r="2" fill="#ff6b6b" opacity="0.2"/>
</svg>