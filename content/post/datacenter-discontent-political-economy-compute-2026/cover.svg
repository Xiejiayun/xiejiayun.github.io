<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08101d"/>
      <stop offset="100%" stop-color="#162035"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- World map abstraction: 3 poles -->

  <!-- US pole -->
  <g transform="translate(220,290)">
    <circle r="100" fill="#1c2438" stroke="#5b8ad9" stroke-width="2"/>
    <text y="-55" text-anchor="middle" fill="#5b8ad9" font-family="ui-monospace, monospace" font-size="11" font-weight="bold">US</text>
    <text y="-25" text-anchor="middle" fill="#dbe6ff" font-family="-apple-system, sans-serif" font-size="18" font-weight="bold">美国本土</text>
    <text y="0" text-anchor="middle" fill="#bccaef" font-family="ui-monospace, monospace" font-size="11">建设受阻</text>
    <text y="18" text-anchor="middle" fill="#bccaef" font-family="ui-monospace, monospace" font-size="11">政治成本暴涨</text>
    <text y="44" text-anchor="middle" fill="#7d92b5" font-family="ui-monospace, monospace" font-size="10">$19M / MW</text>
    <text y="62" text-anchor="middle" fill="#ff8a8a" font-family="ui-monospace, monospace" font-size="11">↓ TCO 上涨</text>
  </g>

  <!-- Taiwan / SEA pole -->
  <g transform="translate(600,290)">
    <circle r="100" fill="#1c2a1f" stroke="#5dd693" stroke-width="2"/>
    <text y="-55" text-anchor="middle" fill="#5dd693" font-family="ui-monospace, monospace" font-size="11" font-weight="bold">TW / SEA</text>
    <text y="-25" text-anchor="middle" fill="#dcfbe6" font-family="-apple-system, sans-serif" font-size="18" font-weight="bold">台湾+东南亚</text>
    <text y="0" text-anchor="middle" fill="#bce8c9" font-family="ui-monospace, monospace" font-size="11">TSMC fab 集中</text>
    <text y="18" text-anchor="middle" fill="#bce8c9" font-family="ui-monospace, monospace" font-size="11">CoWoS 36% 占比</text>
    <text y="44" text-anchor="middle" fill="#7db58e" font-family="ui-monospace, monospace" font-size="10">$11B CapEx Q1</text>
    <text y="62" text-anchor="middle" fill="#5dd693" font-family="ui-monospace, monospace" font-size="11">↑ 议价权 max</text>
  </g>

  <!-- China pole -->
  <g transform="translate(980,290)">
    <circle r="100" fill="#2a1c1c" stroke="#ff8a6a" stroke-width="2"/>
    <text y="-55" text-anchor="middle" fill="#ff8a6a" font-family="ui-monospace, monospace" font-size="11" font-weight="bold">CN</text>
    <text y="-25" text-anchor="middle" fill="#fde7df" font-family="-apple-system, sans-serif" font-size="18" font-weight="bold">中国+一带一路</text>
    <text y="0" text-anchor="middle" fill="#f4c5b1" font-family="ui-monospace, monospace" font-size="11">CPU-only 路线</text>
    <text y="18" text-anchor="middle" fill="#f4c5b1" font-family="ui-monospace, monospace" font-size="11">LineShine 1.54 EF</text>
    <text y="44" text-anchor="middle" fill="#b58578" font-family="ui-monospace, monospace" font-size="10">24,000 CPU · 35MW</text>
    <text y="62" text-anchor="middle" fill="#ff8a6a" font-family="ui-monospace, monospace" font-size="11">→ 关键场景自主</text>
  </g>

  <!-- Triangle lines -->
  <g stroke="#3a4f80" stroke-width="2" stroke-dasharray="6,5" fill="none">
    <line x1="310" y1="280" x2="510" y2="280"/>
    <line x1="690" y1="280" x2="890" y2="280"/>
    <line x1="320" y1="305" x2="880" y2="305" opacity="0.4"/>
  </g>

  <!-- Title -->
  <g font-family="-apple-system, 'PingFang SC', sans-serif">
    <text x="60" y="80" fill="#e8ecf5" font-size="38" font-weight="800">三极算力时代</text>
    <text x="60" y="120" fill="#7a8197" font-size="18">Data Center Discontent · TSMC CapEx · LineShine — 单极扩张终结</text>
    <text x="60" y="595" fill="#9ca3b5" font-size="14">物理算力 = 政治问题 + 资本周期 + 技术主权</text>
  </g>

  <!-- Subtle question -->
  <text x="60" y="475" font-family="ui-monospace, monospace" fill="#5b6378" font-size="13">2027 ?  算力期货</text>
  <text x="60" y="495" font-family="ui-monospace, monospace" fill="#3d4866" font-size="11">谁先把"compute futures"做成合规金融产品</text>
</svg>
