<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#22130b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <!-- candlestick chart subtle background -->
  <g opacity="0.18" stroke="#f59e0b" stroke-width="1" fill="none">
    <line x1="100" y1="500" x2="100" y2="400"/>
    <rect x="92" y="440" width="16" height="40" fill="#f59e0b"/>
    <line x1="160" y1="500" x2="160" y2="380"/>
    <rect x="152" y="400" width="16" height="50" fill="#f59e0b"/>
    <line x1="220" y1="500" x2="220" y2="350"/>
    <rect x="212" y="360" width="16" height="70" fill="#f59e0b"/>
    <line x1="280" y1="500" x2="280" y2="320"/>
    <rect x="272" y="335" width="16" height="50" fill="#f59e0b"/>
    <line x1="340" y1="500" x2="340" y2="300"/>
    <rect x="332" y="310" width="16" height="60" fill="#f59e0b"/>
  </g>
  <!-- circuit / latency -->
  <g transform="translate(640,420)" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.7">
    <rect x="0" y="0" width="100" height="60" rx="4"/>
    <text x="50" y="-10" fill="#fbbf24" font-size="13" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">copper</text>
    <line x1="100" y1="30" x2="220" y2="30" stroke="#fbbf24" stroke-dasharray="3,3"/>
    <text x="160" y="20" fill="#fcd34d" font-size="11" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">2.4×10⁸ m/s</text>
    <rect x="220" y="0" width="100" height="60" rx="4"/>
    <text x="270" y="-10" fill="#94a3b8" font-size="13" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">fiber</text>
    <line x1="320" y1="30" x2="440" y2="30" stroke="#94a3b8" stroke-dasharray="3,3"/>
    <text x="380" y="20" fill="#cbd5e1" font-size="11" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">2.0×10⁸ m/s</text>
    <rect x="440" y="0" width="100" height="60" rx="4"/>
    <text x="490" y="-10" fill="#94a3b8" font-size="13" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">GPU</text>
  </g>
  <!-- pound symbol big -->
  <g transform="translate(960,140)" opacity="0.15" fill="#fbbf24">
    <text x="0" y="0" font-size="280" font-weight="800">£</text>
  </g>
  <!-- title -->
  <g fill="#f8fafc">
    <text x="60" y="110" font-size="20" fill="#94a3b8" letter-spacing="6">TECH × FINANCE · INFRASTRUCTURE</text>
    <text x="60" y="190" font-size="44" font-weight="800">数据中心的真正风控官</text>
    <text x="60" y="252" font-size="28" font-weight="600" fill="#fcd34d">从 Jane Street 机房 → Lloyd's 战争承保人</text>
    <text x="60" y="320" font-size="22" fill="#cbd5e1">铜线比光纤快 0.5 倍光速 · HFT 与 AI 推理同一物理学</text>
    <text x="60" y="360" font-size="22" fill="#cbd5e1">ABS / PPA / 算力期货 — 定价权易手</text>
  </g>
  <rect x="60" y="280" width="6" height="60" fill="#fbbf24"/>
  <text x="60" y="608" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#64748b">XIEJIAYUN.GITHUB.IO · 2026-05-18</text>
</svg>
