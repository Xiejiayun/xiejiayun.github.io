<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern like Go board -->
  <g stroke="#1e293b" stroke-width="0.8" opacity="0.4">
    <!-- Vertical lines -->
    <line x1="100" y1="200" x2="100" y2="560"/><line x1="150" y1="200" x2="150" y2="560"/>
    <line x1="200" y1="200" x2="200" y2="560"/><line x1="250" y1="200" x2="250" y2="560"/>
    <line x1="300" y1="200" x2="300" y2="560"/><line x1="350" y1="200" x2="350" y2="560"/>
    <line x1="400" y1="200" x2="400" y2="560"/><line x1="450" y1="200" x2="450" y2="560"/>
    <!-- Horizontal lines -->
    <line x1="100" y1="200" x2="450" y2="200"/><line x1="100" y1="250" x2="450" y2="250"/>
    <line x1="100" y1="300" x2="450" y2="300"/><line x1="100" y1="350" x2="450" y2="350"/>
    <line x1="100" y1="400" x2="450" y2="400"/><line x1="100" y1="450" x2="450" y2="450"/>
    <line x1="100" y1="500" x2="450" y2="500"/><line x1="100" y1="550" x2="450" y2="550"/>
  </g>
  <!-- Go stones fading into neural network -->
  <!-- Black stones -->
  <circle cx="200" cy="300" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="300" cy="350" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="250" cy="450" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="150" cy="400" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <circle cx="350" cy="250" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <!-- White stones -->
  <circle cx="250" cy="300" r="18" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="200" cy="400" r="18" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="350" cy="350" r="18" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="300" cy="500" r="18" fill="#e2e8f0" opacity="0.7"/>
  <!-- Transition zone: stones becoming neural nodes -->
  <circle cx="450" cy="300" r="14" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="450" cy="400" r="14" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="450" cy="500" r="14" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <!-- Neural network nodes -->
  <circle cx="600" cy="250" r="12" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="600" cy="350" r="12" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="600" cy="450" r="12" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="600" cy="550" r="12" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="750" cy="300" r="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="750" cy="400" r="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="750" cy="500" r="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="900" cy="350" r="16" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="900" cy="450" r="16" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <!-- Connections -->
  <g stroke="#22d3ee" stroke-width="0.8" opacity="0.4">
    <line x1="450" y1="300" x2="600" y2="250"/><line x1="450" y1="300" x2="600" y2="350"/>
    <line x1="450" y1="400" x2="600" y2="350"/><line x1="450" y1="400" x2="600" y2="450"/>
    <line x1="450" y1="500" x2="600" y2="450"/><line x1="450" y1="500" x2="600" y2="550"/>
    <line x1="600" y1="250" x2="750" y2="300"/><line x1="600" y1="350" x2="750" y2="300"/>
    <line x1="600" y1="350" x2="750" y2="400"/><line x1="600" y1="450" x2="750" y2="400"/>
    <line x1="600" y1="450" x2="750" y2="500"/><line x1="600" y1="550" x2="750" y2="500"/>
    <line x1="750" y1="300" x2="900" y2="350"/><line x1="750" y1="400" x2="900" y2="350"/>
    <line x1="750" y1="400" x2="900" y2="450"/><line x1="750" y1="500" x2="900" y2="450"/>
  </g>
  <!-- Glow behind output -->
  <circle cx="900" cy="400" r="80" fill="#fbbf24" opacity="0.05" filter="url(#glow)"/>
  <!-- Arrow showing transition -->
  <line x1="470" y1="380" x2="550" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>
  <!-- Title -->
  <text x="600" y="80" fill="white" font-family="monospace" font-size="44" font-weight="bold" text-anchor="middle">Ineffable Intelligence</text>
  <text x="600" y="125" fill="#94a3b8" font-family="monospace" font-size="20" text-anchor="middle">$1.1B · Self-Play · Beyond Human Data</text>
  <!-- Labels -->
  <text x="275" y="590" fill="#64748b" font-family="monospace" font-size="12" text-anchor="middle">Self-Play (Go → General)</text>
  <text x="750" y="590" fill="#64748b" font-family="monospace" font-size="12" text-anchor="middle">Neural Discovery Engine</text>
  <!-- Quote -->
  <text x="1050" y="280" fill="#fbbf24" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.8">"AI is taking</text>
  <text x="1050" y="298" fill="#fbbf24" font-family="monospace" font-size="11" text-anchor="middle" opacity="0.8">the wrong path"</text>
  <text x="1050" y="320" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">— David Silver</text>
</svg>
