<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Old PR flow (fading) -->
  <line x1="150" y1="280" x2="350" y2="280" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="350" y1="280" x2="350" y2="350" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="350" y1="350" x2="550" y2="350" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="550" y1="350" x2="550" y2="280" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.3"/>
  <line x1="550" y1="280" x2="750" y2="280" stroke="#94a3b8" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="150" cy="280" r="8" fill="#94a3b8" fill-opacity="0.3"/>
  <circle cx="350" cy="280" r="8" fill="#94a3b8" fill-opacity="0.3"/>
  <circle cx="550" cy="280" r="8" fill="#94a3b8" fill-opacity="0.3"/>
  <circle cx="750" cy="280" r="8" fill="#94a3b8" fill-opacity="0.3"/>
  <text x="350" y="390" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" fill-opacity="0.4">PR Review</text>
  <!-- Break -->
  <line x1="400" y1="240" x2="500" y2="400" stroke="#fb7185" stroke-width="3" stroke-opacity="0.8"/>
  <line x1="500" y1="240" x2="400" y2="400" stroke="#fb7185" stroke-width="3" stroke-opacity="0.8"/>
  <!-- New AI flow -->
  <line x1="700" y1="315" x2="1050" y2="315" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="750" cy="315" r="12" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="850" cy="315" r="12" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="950" cy="315" r="12" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="1050" cy="315" r="12" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="750" y="350" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">AI Write</text>
  <text x="850" y="350" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">Auto Test</text>
  <text x="950" y="350" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">AI Review</text>
  <text x="1050" y="350" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9">Deploy</text>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="white" font-family="monospace" font-size="32" font-weight="bold">代码审查的范式转移</text>
  <text x="600" y="535" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="16">From Pull Requests to Continuous Verification</text>
</svg>