<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Git branch lines being cut -->
  <line x1="200" y1="200" x2="500" y2="200" stroke="#34d399" stroke-width="3" opacity="0.6"/>
  <line x1="300" y1="200" x2="400" y2="280" stroke="#34d399" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <line x1="400" y1="280" x2="500" y2="200" stroke="#34d399" stroke-width="2" opacity="0.4" stroke-dasharray="8,4"/>
  <!-- Scissors cutting -->
  <line x1="480" y1="160" x2="520" y2="240" stroke="#fb7185" stroke-width="3"/>
  <line x1="520" y1="160" x2="480" y2="240" stroke="#fb7185" stroke-width="3"/>
  <!-- Arrow to new paradigm -->
  <line x1="550" y1="200" x2="650" y2="200" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="650,190 670,200 650,210" fill="#fbbf24"/>
  <!-- Token flow / harness -->
  <rect x="700" y="150" width="300" height="100" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="850" y="195" font-family="monospace" font-size="14" fill="#22d3ee" text-anchor="middle">HARNESS ENGINE</text>
  <text x="850" y="215" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">1B tokens/day → 0% human review</text>
  <!-- Token streams -->
  <circle cx="730" cy="320" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="780" cy="340" r="6" fill="#a78bfa" opacity="0.5"/>
  <circle cx="830" cy="310" r="6" fill="#a78bfa" opacity="0.7"/>
  <circle cx="880" cy="350" r="6" fill="#a78bfa" opacity="0.4"/>
  <circle cx="930" cy="325" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="970" cy="345" r="6" fill="#a78bfa" opacity="0.5"/>
  <!-- Text -->
  <text x="600" y="480" font-family="monospace" font-size="28" fill="#e2e8f0" text-anchor="middle" font-weight="bold">RIP PULL REQUESTS (2005-2026)</text>
  <text x="600" y="520" font-family="monospace" font-size="18" fill="#fbbf24" text-anchor="middle">Harness Engineering 时代来临</text>
  <text x="600" y="555" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">从代码审查到Token编排的范式迁移</text>
</svg>