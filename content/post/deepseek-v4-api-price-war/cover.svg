<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Price chart going down -->
  <g stroke="#22c55e" stroke-width="2.5" fill="none" opacity="0.6">
    <polyline points="200,150 300,160 400,180 500,200 600,250 700,300 800,380 900,420 1000,480 1100,520"/>
  </g>
  <g stroke="#22c55e" stroke-width="0.5" fill="none" opacity="0.2">
    <line x1="200" y1="150" x2="200" y2="560"/>
    <line x1="400" y1="180" x2="400" y2="560"/>
    <line x1="600" y1="250" x2="600" y2="560"/>
    <line x1="800" y1="380" x2="800" y2="560"/>
    <line x1="1000" y1="480" x2="1000" y2="560"/>
  </g>
  <!-- Area fill under curve -->
  <polygon points="200,150 300,160 400,180 500,200 600,250 700,300 800,380 900,420 1000,480 1100,520 1100,560 200,560" fill="#22c55e" opacity="0.05"/>
  <!-- Arrow down -->
  <g transform="translate(950,200)" fill="#22c55e" opacity="0.4">
    <polygon points="0,-30 20,10 10,10 10,50 -10,50 -10,10 -20,10"/>
  </g>
  <!-- Dollar signs fading -->
  <text x="250" y="180" font-family="Arial" font-size="24" fill="#22c55e" opacity="0.3">$$$</text>
  <text x="500" y="240" font-family="Arial" font-size="20" fill="#22c55e" opacity="0.25">$$</text>
  <text x="800" y="400" font-family="Arial" font-size="16" fill="#22c55e" opacity="0.15">$</text>
  <!-- Title -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">DeepSeek V4</text>
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#22c55e">价格革命</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">API成本降至1/10 · MoE架构 · 行业冲击波</text>
  <rect x="80" y="220" width="100" height="4" fill="#22c55e" rx="2"/>
