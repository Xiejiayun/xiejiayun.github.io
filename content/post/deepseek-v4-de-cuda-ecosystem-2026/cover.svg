<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Fork in road -->
  <path d="M600,580 L600,350 Q600,300 550,280 L200,150" fill="none" stroke="#ffaa00" stroke-width="4" opacity="0.6"/>
  <path d="M600,580 L600,350 Q600,300 650,280 L1000,150" fill="none" stroke="#00aaff" stroke-width="4" opacity="0.6"/>
  <!-- Left path label: CUDA -->
  <rect x="100" y="80" width="200" height="60" rx="10" fill="#ffaa0020" stroke="#ffaa00" stroke-width="2"/>
  <text x="200" y="118" font-family="monospace" font-size="24" fill="#ffaa00" text-anchor="middle">CUDA</text>
  <!-- Right path label: CANN/自主 -->
  <rect x="900" y="80" width="200" height="60" rx="10" fill="#00aaff20" stroke="#00aaff" stroke-width="2"/>
  <text x="1000" y="118" font-family="monospace" font-size="24" fill="#00aaff" text-anchor="middle">CANN</text>
  <!-- Center: DeepSeek V4 -->
  <circle cx="600" cy="400" r="80" fill="#ffffff08" stroke="#ffffff40" stroke-width="2"/>
  <text x="600" y="390" font-family="monospace" font-size="20" fill="#ffffff" text-anchor="middle">DeepSeek</text>
  <text x="600" y="420" font-family="monospace" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">V4</text>
  <!-- Question mark -->
  <text x="600" y="510" font-family="serif" font-size="72" fill="#ffffff30" text-anchor="middle">?</text>
  <!-- Chip icons -->
  <g transform="translate(150,200)" opacity="0.4">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="none" stroke="#ffaa00" stroke-width="1.5"/>
    <line x1="-8" y1="10" x2="0" y2="10" stroke="#ffaa00" stroke-width="1"/>
    <line x1="-8" y1="20" x2="0" y2="20" stroke="#ffaa00" stroke-width="1"/>
    <line x1="-8" y1="30" x2="0" y2="30" stroke="#ffaa00" stroke-width="1"/>
    <line x1="40" y1="10" x2="48" y2="10" stroke="#ffaa00" stroke-width="1"/>
    <line x1="40" y1="20" x2="48" y2="20" stroke="#ffaa00" stroke-width="1"/>
    <line x1="40" y1="30" x2="48" y2="30" stroke="#ffaa00" stroke-width="1"/>
  </g>
  <g transform="translate(1010,200)" opacity="0.4">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="none" stroke="#00aaff" stroke-width="1.5"/>
    <line x1="-8" y1="10" x2="0" y2="10" stroke="#00aaff" stroke-width="1"/>
    <line x1="-8" y1="20" x2="0" y2="20" stroke="#00aaff" stroke-width="1"/>
    <line x1="-8" y1="30" x2="0" y2="30" stroke="#00aaff" stroke-width="1"/>
    <line x1="40" y1="10" x2="48" y2="10" stroke="#00aaff" stroke-width="1"/>
    <line x1="40" y1="20" x2="48" y2="20" stroke="#00aaff" stroke-width="1"/>
    <line x1="40" y1="30" x2="48" y2="30" stroke="#00aaff" stroke-width="1"/>
  </g>
</svg>
