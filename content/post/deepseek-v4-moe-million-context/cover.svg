<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="40" y1="0" x2="40" y2="630" /><line x1="80" y1="0" x2="80" y2="630" /><line x1="120" y1="0" x2="120" y2="630" /><line x1="160" y1="0" x2="160" y2="630" /><line x1="200" y1="0" x2="200" y2="630" /><line x1="240" y1="0" x2="240" y2="630" /><line x1="280" y1="0" x2="280" y2="630" /><line x1="320" y1="0" x2="320" y2="630" /><line x1="360" y1="0" x2="360" y2="630" /><line x1="400" y1="0" x2="400" y2="630" /><line x1="440" y1="0" x2="440" y2="630" /><line x1="480" y1="0" x2="480" y2="630" /><line x1="520" y1="0" x2="520" y2="630" /><line x1="560" y1="0" x2="560" y2="630" /><line x1="600" y1="0" x2="600" y2="630" />
    <line x1="0" y1="40" x2="1200" y2="40" /><line x1="0" y1="80" x2="1200" y2="80" /><line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="160" x2="1200" y2="160" /><line x1="0" y1="200" x2="1200" y2="200" /><line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="280" x2="1200" y2="280" /><line x1="0" y1="320" x2="1200" y2="320" /><line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="400" x2="1200" y2="400" /><line x1="0" y1="440" x2="1200" y2="440" /><line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="520" x2="1200" y2="520" /><line x1="0" y1="560" x2="1200" y2="560" /><line x1="0" y1="600" x2="1200" y2="600" />
