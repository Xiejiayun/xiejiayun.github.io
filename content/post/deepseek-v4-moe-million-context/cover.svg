    <circle cx="720" cy="130" r="35" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="720" y="133" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">Expert N</text>
    <circle cx="820" cy="180" r="35" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="820" y="183" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">Expert M</text>
    <circle cx="380" cy="380" r="35" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="380" y="383" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" opacity="0.6">Inactive</text>
    <circle cx="820" cy="380" r="35" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="820" y="383" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" opacity="0.6">Inactive</text>
  </g>
  <!-- Connections -->
  <line x1="545" y1="260" x2="415" y2="200" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="565" y1="240" x2="490" y2="165" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="635" y1="240" x2="710" y2="165" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="655" y1="260" x2="785" y2="200" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="555" y1="310" x2="405" y2="360" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="645" y1="310" x2="795" y2="360" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="url(#accent)" font-family="monospace" font-size="42" font-weight="bold">DeepSeek V4</text>
  <text x="600" y="540" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="18">1.6T Parameters · 49B Active · 1M Context</text>
  <!-- Stats -->
  <text x="100" y="560" fill="#22d3ee" font-family="monospace" font-size="13">PRO: 1.6T / 49B</text>
  <text x="100" y="580" fill="#34d399" font-family="monospace" font-size="13">FLASH: 284B / 13B</text>
  <text x="950" y="560" text-anchor="end" fill="#fbbf24" font-family="monospace" font-size="13">MIT Licensed</text>
  <text x="950" y="580" text-anchor="end" fill="#fbbf24" font-family="monospace" font-size="13">Huawei Ascend Ready</text>
