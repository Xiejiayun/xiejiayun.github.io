    <circle cx="380" cy="180" r="35" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="380" y="183" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10">Expert 1</text>
    <circle cx="480" cy="130" r="35" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
