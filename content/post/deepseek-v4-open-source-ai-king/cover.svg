<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>
  <!-- Glow effects -->
  <circle cx="350" cy="315" r="180" fill="#06b6d4" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="850" cy="315" r="180" fill="#8b5cf6" opacity="0.08" filter="url(#blur1)"/>
  <!-- MoE routing visualization -->
  <!-- Central router -->
  <rect x="520" y="240" width="160" height="60" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
  <text x="600" y="277" fill="#22d3ee" font-family="monospace" font-size="16" text-anchor="middle">MoE Router</text>
  <!-- Expert nodes -->
  <circle cx="200" cy="400" r="30" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="200" y="405" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Expert 1</text>
  <circle cx="350" cy="450" r="30" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="455" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Expert 2</text>
  <circle cx="500" cy="420" r="30" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="425" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle">Expert 3</text>
  <circle cx="700" cy="420" r="30" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="700" y="425" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle">Expert N</text>
  <circle cx="850" cy="450" r="30" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="850" y="455" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Expert 5</text>
  <circle cx="1000" cy="400" r="30" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1000" y="405" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Expert 6</text>
  <!-- Routing lines (active) -->
  <line x1="560" y1="300" x2="200" y2="370" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
  <line x1="580" y1="300" x2="500" y2="390" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <line x1="620" y1="300" x2="700" y2="390" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <!-- Routing lines (inactive/dim) -->
  <line x1="570" y1="300" x2="350" y2="420" stroke="#475569" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="630" y1="300" x2="850" y2="420" stroke="#475569" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="640" y1="300" x2="1000" y2="370" stroke="#475569" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="600" y="120" fill="white" font-family="monospace" font-size="56" font-weight="bold" text-anchor="middle">DeepSeek V4</text>
  <text x="600" y="165" fill="#94a3b8" font-family="monospace" font-size="22" text-anchor="middle">1.6T Parameters · 49B Active · MoE Architecture</text>
  <!-- Stats bar -->
  <rect x="150" y="530" width="200" height="50" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
  <text x="250" y="555" fill="#34d399" font-family="monospace" font-size="13" text-anchor="middle">32T Training Tokens</text>
  <text x="250" y="572" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">FP4 Precision</text>
  <rect x="500" y="530" width="200" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="600" y="555" fill="#22d3ee" font-family="monospace" font-size="13" text-anchor="middle">1M Context Window</text>
  <text x="600" y="572" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">MIT License</text>
  <rect x="850" y="530" width="200" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="950" y="555" fill="#fbbf24" font-family="monospace" font-size="13" text-anchor="middle">Huawei Ascend</text>
  <text x="950" y="572" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">Compatible</text>
</svg>
