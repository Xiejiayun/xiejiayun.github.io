<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#1a0a28"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- Speed lines -->
  <g stroke="#f59e0b" stroke-width="2" opacity="0.3">
    <line x1="700" y1="100" x2="1150" y2="100"/>
    <line x1="750" y1="140" x2="1100" y2="140"/>
    <line x1="700" y1="180" x2="1150" y2="180"/>
    <line x1="720" y1="220" x2="1080" y2="220"/>
  </g>
  <!-- Slow chip lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.3">
    <line x1="700" y1="400" x2="900" y2="400"/>
    <line x1="720" y1="440" x2="880" y2="440"/>
    <line x1="700" y1="480" x2="850" y2="480"/>
  </g>
  <!-- Gap indicator -->
  <text x="1000" y="160" font-family="Arial" font-size="14" fill="#f59e0b" opacity="0.5">AI Model Speed →→→</text>
  <text x="820" y="460" font-family="Arial" font-size="14" fill="#3b82f6" opacity="0.5">Chip Design Speed →</text>
  <!-- Gap arrow -->
  <g stroke="#ef4444" stroke-width="1" opacity="0.4">
    <line x1="950" y1="250" x2="950" y2="380" stroke-dasharray="4,4"/>
    <text x="960" y="320" font-family="Arial" font-size="12" fill="#ef4444">GAP</text>
  </g>
  <!-- Chip icon -->
  <g transform="translate(850,300)" opacity="0.2">
    <rect x="-40" y="-40" width="80" height="80" fill="none" stroke="#3b82f6" stroke-width="2" rx="4"/>
    <rect x="-25" y="-25" width="50" height="50" fill="#3b82f6" opacity="0.3" rx="2"/>
    <line x1="-40" y1="-20" x2="-55" y2="-20" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="-40" y1="0" x2="-55" y2="0" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="-40" y1="20" x2="-55" y2="20" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="40" y1="-20" x2="55" y2="-20" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="40" y1="0" x2="55" y2="0" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="40" y1="20" x2="55" y2="20" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <!-- Title -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Edge AI的速度困局</text>
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="28" fill="#f59e0b">当模型进化快过芯片迭代</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">端侧推理 · 不可能三角 · 架构适应性 · 供应链</text>
  <rect x="80" y="205" width="100" height="4" fill="#f59e0b" rx="2"/>
</svg>