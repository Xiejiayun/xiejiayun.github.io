<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Robot silhouette -->
  <g transform="translate(600,260)" opacity="0.7">
    <!-- Head -->
    <rect x="-30" y="-120" width="60" height="50" rx="8" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="-10" cy="-95" r="5" fill="#22d3ee"/>
    <circle cx="10" cy="-95" r="5" fill="#22d3ee"/>
    <!-- Neck -->
    <rect x="-8" y="-70" width="16" height="15" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <!-- Body -->
    <rect x="-50" y="-55" width="100" height="100" rx="6" fill="none" stroke="#34d399" stroke-width="2"/>
    <!-- Arms -->
    <line x1="-50" y1="-40" x2="-100" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <line x1="-100" y1="0" x2="-90" y2="40" stroke="#22d3ee" stroke-width="2"/>
    <line x1="50" y1="-40" x2="100" y2="0" stroke="#22d3ee" stroke-width="2"/>
    <line x1="100" y1="0" x2="90" y2="40" stroke="#22d3ee" stroke-width="2"/>
    <!-- Legs -->
    <line x1="-25" y1="45" x2="-30" y2="110" stroke="#34d399" stroke-width="2"/>
    <line x1="25" y1="45" x2="30" y2="110" stroke="#34d399" stroke-width="2"/>
    <!-- Neural glow -->
    <circle cx="0" cy="-10" r="60" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="-10" r="90" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.1"/>
    <circle cx="0" cy="-10" r="120" fill="none" stroke="#34d399" stroke-width="0.5" opacity="0.05"/>
  </g>
  <!-- Neural sparks -->
  <g opacity="0.4">
    <circle cx="480" cy="180" r="2" fill="#34d399"/><circle cx="720" cy="200" r="2" fill="#22d3ee"/>
    <circle cx="450" cy="300" r="2" fill="#22d3ee"/><circle cx="750" cy="280" r="2" fill="#34d399"/>
    <line x1="480" y1="180" x2="570" y2="165" stroke="#34d399" stroke-width="0.5"/>
    <line x1="720" y1="200" x2="630" y2="165" stroke="#22d3ee" stroke-width="0.5"/>
  </g>
  <text x="600" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">EMBODIED AI</text>
  <text x="600" y="550" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">The Inflection Point · Gemini Robotics · Physical Intelligence</text>
</svg>