<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <!-- Robot silhouette -->
  <g transform="translate(600, 240)">
    <!-- Head -->
    <rect x="-40" y="-120" width="80" height="60" rx="10" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="-15" cy="-95" r="8" fill="#06b6d4" opacity="0.6"/>
    <circle cx="15" cy="-95" r="8" fill="#06b6d4" opacity="0.6"/>
    <!-- Body -->
    <rect x="-55" y="-50" width="110" height="100" rx="8" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <!-- Brain glow -->
    <circle cx="0" cy="-90" r="25" fill="#8b5cf6" opacity="0.15"/>
    <circle cx="0" cy="-90" r="15" fill="#8b5cf6" opacity="0.2"/>
    <!-- Arms -->
    <line x1="-55" y1="-20" x2="-100" y2="30" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="-105" cy="35" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <line x1="55" y1="-20" x2="100" y2="30" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="105" cy="35" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="-25" y1="50" x2="-35" y2="120" stroke="#06b6d4" stroke-width="2"/>
    <line x1="25" y1="50" x2="35" y2="120" stroke="#06b6d4" stroke-width="2"/>
    <!-- Neural connections -->
    <line x1="0" y1="-60" x2="0" y2="-50" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
    <!-- Sensor rays -->
    <line x1="-40" y1="-95" x2="-80" y2="-110" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="-95" x2="80" y2="-110" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
    <line x1="-40" y1="-85" x2="-80" y2="-75" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="-85" x2="80" y2="-75" stroke="#fbbf24" stroke-width="0.8" opacity="0.4"/>
  </g>
  <!-- World model indicators -->
  <g opacity="0.3">
    <circle cx="250" cy="200" r="60" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="250" y="205" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11">World Model</text>
    <circle cx="950" cy="200" r="60" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="950" y="205" text-anchor="middle" fill="#f43f5e" font-family="monospace" font-size="11">Sim2Real</text>
    <circle cx="250" cy="380" r="60" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="250" y="385" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11">Dexterity</text>
    <circle cx="950" cy="380" r="60" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="950" y="385" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="11">Safety</text>
  </g>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="34" font-weight="bold">具身智能的拐点</text>
  <text x="600" y="545" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="18">当大模型长出手脚，机器人产业迎来iPhone时刻</text>
  <rect x="50" y="40" width="100" height="32" rx="16" fill="#06b6d4" opacity="0.2"/>
  <text x="100" y="61" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="14">机器人</text>
</svg>