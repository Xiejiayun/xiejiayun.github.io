  <line x1="530" y1="330" x2="540" y2="400" stroke="#00cc88" stroke-width="3"/>
  <!-- Thought bubble -->
  <circle cx="320" y="210" r="8" fill="#00cc88" opacity="0.3"/>
  <circle cx="290" y="180" r="12" fill="#00cc88" opacity="0.3"/>
  <ellipse cx="250" cy="140" rx="80" ry="40" fill="none" stroke="#00cc88" stroke-width="2" opacity="0.5"/>
  <text x="250" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#00cc88">推理中...</text>
