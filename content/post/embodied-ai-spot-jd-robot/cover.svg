  <text x="600" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#00cc88">从实验室到街头</text>
  <text x="600" y="500" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#00cc88">Spot推理 · 京东机器人急救 · NVIDIA Physical AI</text>
