<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- Robot dog silhouette (simplified) -->
  <rect x="350" y="250" width="200" height="80" rx="15" fill="none" stroke="#00cc88" stroke-width="3"/>
  <rect x="340" y="240" width="50" height="30" rx="8" fill="none" stroke="#00cc88" stroke-width="2"/>
  <line x1="380" y1="330" x2="370" y2="400" stroke="#00cc88" stroke-width="3"/>
  <line x1="420" y1="330" x2="410" y2="400" stroke="#00cc88" stroke-width="3"/>
