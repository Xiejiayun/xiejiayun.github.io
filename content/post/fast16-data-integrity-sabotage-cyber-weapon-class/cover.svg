<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Binary streams -->
  <g opacity="0.15" fill="#4ecca3" font-family="Courier New,monospace" font-size="14">
    <text x="30" y="30">01001101 01100001 01101100 01110111 01100001 01110010 01100101</text>
    <text x="80" y="55">11010010 01101110 01110100 01100101 01100111 01110010 01101001</text>
    <text x="20" y="80">01110100 01111001 00100000 01000001 01110100 01110100 01100001</text>
    <text x="60" y="105">00110001 00110000 01101000 01101001 01100100 01100100 01100101</text>
    <text x="40" y="130">01100011 01101011 00100000 01110011 01100001 01100010 01101111</text>
    <text x="90" y="155">11010100 01100001 01100111 01100101 00101110 01100110 01100001</text>
    <text x="10" y="180">01110011 01110100 00110001 00110110 00101110 01100100 01100001</text>
    <text x="70" y="205">01110100 01100001 00101110 01101001 01101110 01110100 01100101</text>
    <text x="50" y="520">01100011 01111001 01100010 01100101 01110010 00101110 01110111</text>
    <text x="30" y="545">01100101 01100001 01110000 01101111 01101110 00101110 01100011</text>
    <text x="80" y="570">01101100 01100001 01110011 01110011 00101110 01110011 01110100</text>
    <text x="20" y="595">01110101 01111000 01101110 01100101 01110100 00101110 01110000</text>
  </g>
  <!-- Altered bits highlighted in red -->
  <g fill="#e94560" font-family="Courier New,monospace" font-size="14" filter="url(#glow)">
    <text x="310" y="30">0</text><text x="470" y="55">1</text>
    <text x="200" y="80">0</text><text x="390" y="105">1</text>
    <text x="520" y="130">0</text><text x="150" y="155">1</text>
    <text x="440" y="520">1</text><text x="280" y="545">0</text>
  </g>
  <!-- Central visualization: data flow with corruption -->
  <g transform="translate(600,315)">
    <!-- Clean data stream left -->
    <line x1="-400" y1="-30" x2="-80" y2="-30" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <line x1="-400" y1="0" x2="-80" y2="0" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <line x1="-400" y1="30" x2="-80" y2="30" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <!-- Corruption zone -->
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
    <text x="0" y="-75" text-anchor="middle" fill="#e94560" font-family="Courier New,monospace" font-size="12" opacity="0.9">FAST16 INTERCEPT</text>
    <!-- Corruption symbol -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
    <path d="M-15,-15 L15,15 M15,-15 L-15,15" stroke="#e94560" stroke-width="2.5" opacity="0.8"/>
    <!-- Corrupted data stream right -->
    <line x1="80" y1="-25" x2="400" y2="-35" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="5" x2="400" y2="-8" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <line x1="80" y1="35" x2="400" y2="28" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <!-- Small delta symbols on corrupted lines -->
    <text x="200" y="-22" fill="#e94560" font-size="16" font-family="serif" opacity="0.7">Δ</text>
    <text x="300" y="0" fill="#e94560" font-size="16" font-family="serif" opacity="0.7">Δ</text>
    <text x="250" y="38" fill="#e94560" font-size="16" font-family="serif" opacity="0.7">Δ</text>
  </g>
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" fill="#ffffff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="42" font-weight="bold" letter-spacing="2">
    Fast16
  </text>
  <text x="600" y="340" text-anchor="middle" fill="#e0e0e0" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="24">
    数据完整性武器：比 Stuxnet 更早的网络战范式
  </text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" fill="#e94560" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="16" opacity="0.9">
    不破坏系统，只篡改真相
  </text>
  <!-- Bottom accent line -->
  <rect x="200" y="610" width="800" height="3" rx="1" fill="#e94560" opacity="0.6"/>
</svg>