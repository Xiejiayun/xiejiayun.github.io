<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#0d1117"/>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#f24e1e"/>
      <stop offset="1" stop-color="#a259ff"/>
    </linearGradient>
  </defs>
  <!-- client side -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <rect x="40" y="80" width="120" height="40" rx="6" stroke="#58a6ff"/>
    <rect x="40" y="140" width="120" height="40" rx="6" stroke="#58a6ff"/>
    <rect x="40" y="200" width="120" height="40" rx="6" stroke="#58a6ff"/>
    <rect x="40" y="260" width="120" height="40" rx="6" stroke="#58a6ff"/>
  </g>
  <text x="100" y="105" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">app-1</text>
  <text x="100" y="165" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">app-2</text>
  <text x="100" y="225" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">app-3</text>
  <text x="100" y="285" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">app-N</text>

  <!-- proxy -->
  <rect x="320" y="150" width="160" height="120" rx="10" fill="url(#g)" opacity="0.15" stroke="url(#g)" stroke-width="2"/>
  <text x="400" y="200" fill="#f0f6fc" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">PROXY</text>
  <text x="400" y="225" fill="#a259ff" font-family="monospace" font-size="11" text-anchor="middle">protocol-aware</text>
  <text x="400" y="245" fill="#a259ff" font-family="monospace" font-size="11" text-anchor="middle">conn-pool · retry</text>

  <!-- backend -->
  <g fill="none" stroke="#39d353" stroke-width="1.5">
    <circle cx="640" cy="120" r="22"/>
    <circle cx="700" cy="180" r="22"/>
    <circle cx="640" cy="240" r="22"/>
    <circle cx="700" cy="300" r="22"/>
    <circle cx="600" cy="320" r="22"/>
  </g>
  <text x="640" y="125" fill="#39d353" font-family="monospace" font-size="10" text-anchor="middle">R</text>
  <text x="700" y="185" fill="#39d353" font-family="monospace" font-size="10" text-anchor="middle">R</text>
  <text x="640" y="245" fill="#39d353" font-family="monospace" font-size="10" text-anchor="middle">R</text>
  <text x="700" y="305" fill="#39d353" font-family="monospace" font-size="10" text-anchor="middle">R</text>
  <text x="600" y="325" fill="#39d353" font-family="monospace" font-size="10" text-anchor="middle">R</text>

  <!-- lines -->
  <g stroke="#30363d" stroke-width="1">
    <line x1="160" y1="100" x2="320" y2="200"/>
    <line x1="160" y1="160" x2="320" y2="210"/>
    <line x1="160" y1="220" x2="320" y2="220"/>
    <line x1="160" y1="280" x2="320" y2="230"/>
    <line x1="480" y1="190" x2="618" y2="125"/>
    <line x1="480" y1="200" x2="678" y2="180"/>
    <line x1="480" y1="220" x2="618" y2="240"/>
    <line x1="480" y1="235" x2="678" y2="300"/>
    <line x1="480" y1="245" x2="578" y2="320"/>
  </g>

  <!-- title -->
  <text x="400" y="50" fill="#f0f6fc" font-family="Inter, system-ui, sans-serif" font-size="24" text-anchor="middle" font-weight="700">Figma Redis Proxy / 99.9999%</text>
  <text x="400" y="395" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">six nines = 31 seconds / year</text>
</svg>
