<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Modular blocks -->
  <g transform="translate(800,180)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="90" y="0" width="80" height="50" rx="4" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="0" y="60" width="80" height="50" rx="4" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
    <rect x="90" y="60" width="80" height="50" rx="4" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="0" y="120" width="80" height="50" rx="4" fill="rgba(251,113,133,0.2)" stroke="#fb7185" stroke-width="1.5"/>
    <rect x="90" y="120" width="80" height="50" rx="4" fill="rgba(6,182,212,0.2)" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="130" y="155" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">可升级</text>
    <!-- Labels -->
    <text x="40" y="30" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle">CPU</text>
    <text x="130" y="30" font-family="monospace" font-size="9" fill="#8b5cf6" text-anchor="middle">RAM</text>
    <text x="40" y="90" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">SSD</text>
    <text x="130" y="90" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">GPU</text>
    <text x="40" y="150" font-family="monospace" font-size="9" fill="#fb7185" text-anchor="middle">屏幕</text>
  </g>
  <!-- Title -->
  <text x="100" y="280" font-family="sans-serif" font-size="38" fill="#f8fafc" font-weight="bold">Framework Laptop 13 Pro</text>
  <text x="100" y="335" font-family="sans-serif" font-size="24" fill="#94a3b8">模块化硬件能否成为AI时代的反叛旗帜？</text>
  <rect x="100" y="365" width="160" height="3" fill="#34d399" rx="1"/>
  <rect x="100" y="400" width="70" height="28" rx="14" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="135" y="418" font-family="sans-serif" font-size="12" fill="#34d399" text-anchor="middle">硬件</text>
  <rect x="190" y="400" width="100" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
  <text x="240" y="418" font-family="sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">模块化</text>
</svg>
