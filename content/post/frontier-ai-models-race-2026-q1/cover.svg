<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- Three competing circles -->
  <g transform="translate(600, 260)">
    <!-- Anthropic -->
    <circle cx="-180" cy="-40" r="90" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="2"/>
    <text x="-180" y="-50" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="16" font-weight="bold">Anthropic</text>
    <text x="-180" y="-25" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="11" opacity="0.7">Mythos</text>
    <!-- Meta -->
    <circle cx="180" cy="-40" r="90" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="2"/>
    <text x="180" y="-50" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="16" font-weight="bold">Meta</text>
    <text x="180" y="-25" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11" opacity="0.7">Muse Spark</text>
    <!-- OpenAI -->
    <circle cx="0" cy="100" r="90" fill="#34d399" opacity="0.1" stroke="#34d399" stroke-width="2"/>
    <text x="0" y="90" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="16" font-weight="bold">OpenAI</text>
    <text x="0" y="115" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="11" opacity="0.7">Rosalind</text>
    <!-- Intersection lines -->
    <line x1="-90" y1="-40" x2="90" y2="-40" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
    <line x1="-90" y1="30" x2="-40" y2="60" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
    <line x1="90" y1="30" x2="40" y2="60" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
    <!-- Center spark -->
    <circle cx="0" cy="10" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="0" cy="10" r="15" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="600" y="490" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="34" font-weight="bold">前沿模型三国杀</text>
  <text x="600" y="535" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="18">通用智能竞赛让位于垂直领域深耕</text>
  <rect x="50" y="40" width="100" height="32" rx="16" fill="#8b5cf6" opacity="0.2"/>
  <text x="100" y="61" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="14">AI模型</text>
</svg>