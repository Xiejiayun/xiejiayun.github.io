<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Model comparison bars -->
  <rect x="200" y="130" width="380" height="40" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="210" y="155" font-family="monospace" font-size="12" fill="#a78bfa">Claude Opus 4.7</text>
  <rect x="200" y="185" width="350" height="40" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="210" y="210" font-family="monospace" font-size="12" fill="#34d399">Gemma 4 (Open)</text>
  <rect x="200" y="240" width="340" height="40" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="210" y="265" font-family="monospace" font-size="12" fill="#22d3ee">GPT-Rosalind</text>
  <rect x="200" y="295" width="300" height="40" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="210" y="320" font-family="monospace" font-size="12" fill="#fbbf24">Muse Spark (Meta)</text>
  <rect x="200" y="350" width="320" height="40" rx="4" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="210" y="375" font-family="monospace" font-size="12" fill="#fb7185">OpenClaw (Open Source)</text>
  <!-- Benchmark arrow -->
  <line x1="200" y1="410" x2="600" y2="410" stroke="#94a3b8" stroke-width="1"/>
  <text x="600" y="430" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="end">Capability →</text>
  <!-- Text -->
  <text x="600" y="500" font-family="monospace" font-size="28" fill="#e2e8f0" text-anchor="middle" font-weight="bold">前沿模型竞速：2026年4月格局</text>
  <text x="600" y="540" font-family="monospace" font-size="16" fill="#a78bfa" text-anchor="middle">Gemma 4 × Opus 4.7 × GPT-Rosalind × Muse Spark</text>
  <text x="600" y="575" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">开放与封闭的新动态平衡</text>
</svg>