  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- Gemma logo area -->
  <circle cx="600" cy="280" r="150" fill="none" stroke="#4285f4" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="280" r="100" fill="none" stroke="#ea4335" stroke-width="2" opacity="0.4"/>
