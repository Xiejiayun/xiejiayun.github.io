  <line x1="440" y1="390" x2="550" y2="310" stroke="#ea4335" stroke-width="1" opacity="0.3"/>
  <line x1="760" y1="390" x2="650" y2="310" stroke="#fbbc05" stroke-width="1" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold">开放权重模型的Agent化转型</text>
