<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#161a2b"/>
    </linearGradient>
    <linearGradient id="ghost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5dff"/>
      <stop offset="1" stop-color="#3b2a8a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2540" stroke-width="0.5" opacity="0.5">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500"/>
    <path d="M150 0 L150 630 M300 0 L300 630 M450 0 L450 630 M600 0 L600 630 M750 0 L750 630 M900 0 L900 630 M1050 0 L1050 630"/>
  </g>

  <!-- left: ghost icon (代表 Ghostty) -->
  <g transform="translate(160 200)" filter="url(#glow)">
    <path d="M0 70 Q0 0 90 0 Q180 0 180 70 L180 230 L150 200 L120 230 L90 200 L60 230 L30 200 L0 230 Z"
          fill="url(#ghost)" stroke="#a48dff" stroke-width="3"/>
    <circle cx="60" cy="90" r="14" fill="#ffffff"/>
    <circle cx="120" cy="90" r="14" fill="#ffffff"/>
    <circle cx="62" cy="92" r="6" fill="#1a1a1a"/>
    <circle cx="122" cy="92" r="6" fill="#1a1a1a"/>
  </g>

  <!-- arrow leaving -->
  <g transform="translate(420 290)">
    <path d="M0 0 L260 0" stroke="#ff6b6b" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 10"/>
    <polygon points="260,-12 290,0 260,12" fill="#ff6b6b"/>
    <text x="100" y="-22" fill="#ffd166" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">leaving</text>
  </g>

  <!-- right: GitHub-style cat silhouette in CROSS-OUT -->
  <g transform="translate(820 195)" opacity="0.95">
    <circle cx="120" cy="120" r="120" fill="#161b22" stroke="#30363d" stroke-width="3"/>
    <path d="M120 50 c-38 0 -70 32 -70 70 0 30 19 56 47 65 3 1 4 -2 4 -3 0 -2 -0.1 -6 -0.1 -12 -19 4 -23 -8 -23 -8 -3 -8 -8 -10 -8 -10 -6 -4 0.5 -4 0.5 -4 7 0.5 11 7 11 7 6 11 16 8 20 6 0.5 -4 2 -7 4 -8 -15 -2 -31 -7 -31 -33 0 -7 3 -13 7 -18 -1 -2 -3 -9 0.5 -19 0 0 6 -2 19 7 6 -2 12 -3 19 -3 6 0 13 1 19 3 13 -9 19 -7 19 -7 4 10 1 17 0.5 19 4 5 7 11 7 18 0 26 -16 31 -31 33 3 2 5 7 5 14 0 10 -0.1 18 -0.1 21 0 2 1 4 4 3 28 -9 47 -35 47 -65 0 -38 -32 -70 -70 -70Z"
          fill="#7d8590"/>
    <!-- red X over it -->
    <path d="M30 30 L210 210 M210 30 L30 210" stroke="#ff5252" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- title -->
  <text x="60" y="490" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800">Ghostty 离开 GitHub</text>
  <text x="60" y="540" fill="#a48dff" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">当 18 年的 GitHub 用户决定自托管 — 开源协作的'垄断时代'拐点</text>
  <text x="60" y="580" fill="#7d8590" font-family="JetBrains Mono, monospace" font-size="16">2026-05-14 · 前沿科技 · 开源 / 治理 / Forgejo</text>
</svg>
