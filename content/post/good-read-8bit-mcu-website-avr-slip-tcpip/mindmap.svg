<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .root{fill:#FBBF24}
      .l1{fill:#60A5FA}
      .l2{fill:#34D399}
      .l3{fill:#F87171}
      .l4{fill:#A78BFA}
      .label{font-family:"-apple-system","Segoe UI",sans-serif;fill:#F9FAFB}
      .sub{font-family:"Menlo","Consolas",monospace;fill:#9CA3AF}
      .edge{stroke:#374151;stroke-width:1.5;fill:none}
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="60" y="50" font-family="Menlo,Consolas,monospace" font-size="16" fill="#6B7280">思维导图 · 1$ AVR Web Server 全栈决策树</text>

  <!-- center root -->
  <ellipse cx="700" cy="450" rx="160" ry="50" class="root" opacity="0.18"/>
  <ellipse cx="700" cy="450" rx="160" ry="50" stroke="#FBBF24" stroke-width="2" fill="none"/>
  <text x="700" y="445" text-anchor="middle" class="label" font-size="22" font-weight="700">8-bit AVR Web Server</text>
  <text x="700" y="470" text-anchor="middle" class="sub" font-size="14">maurycyz.com · 600 行 C</text>

  <!-- L1 branch: 硬件选型 -->
  <g>
    <line x1="700" y1="425" x2="320" y2="180" class="edge"/>
    <rect x="170" y="155" width="300" height="50" rx="6" fill="#1e3a5f" stroke="#60A5FA"/>
    <text x="320" y="186" text-anchor="middle" class="label" font-size="18" font-weight="600">1. 硬件选型</text>
  </g>
  <g font-size="13" class="sub">
    <text x="180" y="225">• AVR64DD32 · 8kB RAM · 24MHz</text>
    <text x="180" y="245">• 选它而非 ATmega328：RAM 翻 4 倍</text>
    <text x="180" y="265">• 选它而非 ESP32：拒绝现成 lwIP</text>
    <text x="180" y="285">• 12 MHz I/O → 排除 10BASE-T</text>
  </g>

  <!-- L1 branch: 物理层 -->
  <g>
    <line x1="700" y1="425" x2="320" y2="430" class="edge"/>
    <rect x="170" y="405" width="300" height="50" rx="6" fill="#0f3a2e" stroke="#34D399"/>
    <text x="320" y="436" text-anchor="middle" class="label" font-size="18" font-weight="600">2. 链路层：SLIP</text>
  </g>
  <g font-size="13" class="sub">
    <text x="180" y="475">• RFC 1055（1988）</text>
    <text x="180" y="495">• 帧定界：0xC0 包裹</text>
    <text x="180" y="515">• 转义：0xDB 0xDC / 0xDB 0xDD</text>
    <text x="180" y="535">• Linux slattach 模块依然内建</text>
  </g>

  <!-- L1 branch: 网络层 -->
  <g>
    <line x1="700" y1="475" x2="320" y2="680" class="edge"/>
    <rect x="170" y="655" width="300" height="50" rx="6" fill="#5b1a1a" stroke="#F87171"/>
    <text x="320" y="686" text-anchor="middle" class="label" font-size="18" font-weight="600">3. 网络层：手写 IPv4</text>
  </g>
  <g font-size="13" class="sub">
    <text x="180" y="725">• 砍掉 fragmentation（DF=1）</text>
    <text x="180" y="745">• 砍掉 IP options</text>
    <text x="180" y="765">• 互换 src/dst + 重置 TTL + 重算 checksum</text>
    <text x="180" y="785">• RFC 1071 one's complement 累加</text>
  </g>

  <!-- L1 branch: 传输层 -->
  <g>
    <line x1="700" y1="450" x2="1080" y2="180" class="edge"/>
    <rect x="930" y="155" width="300" height="50" rx="6" fill="#3a1e5f" stroke="#A78BFA"/>
    <text x="1080" y="186" text-anchor="middle" class="label" font-size="18" font-weight="600">4. 传输层：自写 TCP</text>
  </g>
  <g font-size="13" class="sub">
    <text x="940" y="225">• MAX_CONNS = 200 · 定长结构</text>
    <text x="940" y="245">• 状态：LISTEN/SYN_RECEIVED/...</text>
    <text x="940" y="265">• 500 ms 定时器重传</text>
    <text x="940" y="285">• 砍掉 Nagle/SACK/ECN/timestamp</text>
  </g>

  <!-- L1 branch: 应用层 -->
  <g>
    <line x1="700" y1="450" x2="1080" y2="430" class="edge"/>
    <rect x="930" y="405" width="300" height="50" rx="6" fill="#5f4d1a" stroke="#FBBF24"/>
    <text x="1080" y="436" text-anchor="middle" class="label" font-size="18" font-weight="600">5. 应用层：HTTP？没写</text>
  </g>
  <g font-size="13" class="sub">
    <text x="940" y="475">• 只有一个 URL → 不需要 parse</text>
    <text x="940" y="495">• 硬编码 200 OK 响应</text>
    <text x="940" y="515">• 约束驱动设计的极致</text>
    <text x="940" y="535">• Redis 反向案例对照</text>
  </g>

  <!-- L1 branch: 公网暴露 -->
  <g>
    <line x1="700" y1="475" x2="1080" y2="680" class="edge"/>
    <rect x="930" y="655" width="300" height="50" rx="6" fill="#1a3a5f" stroke="#60A5FA"/>
    <text x="1080" y="686" text-anchor="middle" class="label" font-size="18" font-weight="600">6. 公网暴露</text>
  </g>
  <g font-size="13" class="sub">
    <text x="940" y="725">• 家里无公网 IP（CGNAT）</text>
    <text x="940" y="745">• WireGuard 隧道 → 赫尔辛基 VPS</text>
    <text x="940" y="765">• nginx /mcu 子路径反代</text>
    <text x="940" y="785">• 反代同时是 SYN flood 缓冲器</text>
  </g>

  <!-- bottom: takeaway -->
  <rect x="280" y="820" width="840" height="60" rx="8" fill="#1F2937" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="700" y="855" text-anchor="middle" class="label" font-size="18">底层启示：约束本身就是题目 · 自己凿穿一次 = 当代护城河</text>
</svg>
