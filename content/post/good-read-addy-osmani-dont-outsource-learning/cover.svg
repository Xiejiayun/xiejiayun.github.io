<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#16233f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- top badge -->
  <g transform="translate(56,52)">
    <rect width="190" height="38" rx="19" fill="#0f172a" stroke="#334155"/>
    <text x="95" y="25" font-family="-apple-system,Segoe UI,sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">好文共赏 · Editor's Pick</text>
  </g>
  <text x="1144" y="76" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#64748b" text-anchor="end">2026-05-19 · xiejiayun.github.io</text>

  <!-- main title -->
  <text x="56" y="180" font-family="-apple-system,Segoe UI,sans-serif" font-size="48" font-weight="800" fill="#f8fafc">把学习外包给 AI</text>
  <text x="56" y="240" font-family="-apple-system,Segoe UI,sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">—— Addy Osmani 把三项研究串成一根针，</text>
  <text x="56" y="276" font-family="-apple-system,Segoe UI,sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">给"姿势 &gt; 工具"写下了一份工程师生存手册</text>

  <!-- big quote -->
  <g transform="translate(56,330)">
    <text x="0" y="0" font-family="Georgia,serif" font-size="44" fill="url(#accent)" font-weight="700">posture &gt; tool</text>
    <text x="0" y="40" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" fill="#94a3b8">"The tool didn't determine the outcome. The posture did."</text>
  </g>

  <!-- 3 study boxes -->
  <g transform="translate(56,420)" font-family="-apple-system,Segoe UI,sans-serif">
    <g>
      <rect x="0" y="0" width="350" height="120" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="20" y="34" font-size="14" fill="#38bdf8" font-weight="700">ANTHROPIC · 行为层</text>
      <text x="20" y="70" font-size="26" fill="#f8fafc" font-weight="800">−17%</text>
      <text x="20" y="96" font-size="14" fill="#94a3b8">52 工程师 / Trio 库 / 测验 AI 组掉两个等级</text>
    </g>
    <g transform="translate(370,0)">
      <rect x="0" y="0" width="350" height="120" rx="12" fill="#0f172a" stroke="#3b1e5f" stroke-width="1.5"/>
      <text x="20" y="34" font-size="14" fill="#a78bfa" font-weight="700">MIT MEDIA LAB · 神经层</text>
      <text x="20" y="70" font-size="26" fill="#f8fafc" font-weight="800">83%</text>
      <text x="20" y="96" font-size="14" fill="#94a3b8">EEG / LLM 用户记不起自己刚写的内容</text>
    </g>
    <g transform="translate(740,0)">
      <rect x="0" y="0" width="350" height="120" rx="12" fill="#0f172a" stroke="#5f3b1e" stroke-width="1.5"/>
      <text x="20" y="34" font-size="14" fill="#f59e0b" font-weight="700">CHI 2026 · 顺序层</text>
      <text x="20" y="70" font-size="26" fill="#f8fafc" font-weight="800">order &gt; amount</text>
      <text x="20" y="96" font-size="14" fill="#94a3b8">首次接触 LLM 的时点决定决策质量</text>
    </g>
  </g>

  <!-- footer -->
  <text x="56" y="600" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#475569">Addy Osmani · Google Chrome Engineering Lead · addyosmani.com</text>
  <text x="1144" y="600" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#475569" text-anchor="end">多模评分：Opus 9.0 / Sonnet 8.7 / Gemini 8.6</text>
</svg>
