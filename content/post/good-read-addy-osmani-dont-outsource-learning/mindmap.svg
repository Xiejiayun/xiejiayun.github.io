<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- title -->
  <text x="700" y="48" font-family="-apple-system,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#f8fafc" text-anchor="middle">Don't Outsource the Learning · 思维导图</text>
  <text x="700" y="76" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Addy Osmani · 2026-05-16 · 三项研究 / 五个临界点 / 六条姿势补丁 / 两个指标</text>

  <!-- center node -->
  <g transform="translate(700,440)">
    <circle r="105" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
    <text x="0" y="-12" font-family="-apple-system,Segoe UI,sans-serif" font-size="24" fill="#f8fafc" text-anchor="middle" font-weight="800">Posture</text>
    <text x="0" y="18" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">姿势 &gt; 工具</text>
    <text x="0" y="42" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">tool didn't determine outcome</text>
  </g>

  <!-- LEFT: Three studies -->
  <g font-family="-apple-system,Segoe UI,sans-serif">
    <!-- Anthropic -->
    <g transform="translate(70,170)">
      <rect width="280" height="110" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
      <text x="16" y="28" font-size="13" fill="#38bdf8" font-weight="700">① Anthropic RCT (Jan 2026)</text>
      <text x="16" y="52" font-size="12" fill="#cbd5e1">52 工程师 · Python Trio 库</text>
      <text x="16" y="72" font-size="12" fill="#cbd5e1">AI 组 50% vs 手写组 67%</text>
      <text x="16" y="92" font-size="12" fill="#f59e0b">−17% · Cohen's d=0.738</text>
    </g>
    <!-- MIT -->
    <g transform="translate(70,310)">
      <rect width="280" height="110" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <text x="16" y="28" font-size="13" fill="#a78bfa" font-weight="700">② MIT Your Brain on ChatGPT</text>
      <text x="16" y="52" font-size="12" fill="#cbd5e1">54 被试 · EEG / 论文写作</text>
      <text x="16" y="72" font-size="12" fill="#cbd5e1">脑连接随工具单调下降</text>
      <text x="16" y="92" font-size="12" fill="#f59e0b">83% 想不起自己刚写过什么</text>
    </g>
    <!-- CHI -->
    <g transform="translate(70,450)">
      <rect width="280" height="110" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <text x="16" y="28" font-size="13" fill="#fbbf24" font-weight="700">③ CHI 2026 Anchoring</text>
      <text x="16" y="52" font-size="12" fill="#cbd5e1">arXiv:2603.08849</text>
      <text x="16" y="72" font-size="12" fill="#cbd5e1">LLM 首次接触时点 = 决策锚点</text>
      <text x="16" y="92" font-size="12" fill="#f59e0b">order &gt; total amount</text>
    </g>
    <line x1="350" y1="225" x2="595" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="350" y1="365" x2="595" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="350" y1="505" x2="595" y2="460" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- RIGHT: Five no-outsource boundaries -->
  <g font-family="-apple-system,Segoe UI,sans-serif">
    <text x="1050" y="148" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">五个不可外包的临界点</text>
    <g transform="translate(900,170)">
      <rect width="300" height="50" rx="8" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="30" font-size="13" fill="#fecaca">① When something breaks（生产事故）</text>
    </g>
    <g transform="translate(900,230)">
      <rect width="300" height="50" rx="8" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="30" font-size="13" fill="#fecaca">② When it's confidently wrong（自信的错）</text>
    </g>
    <g transform="translate(900,290)">
      <rect width="300" height="50" rx="8" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="30" font-size="13" fill="#fecaca">③ When foundation changes（地基迁移）</text>
    </g>
    <g transform="translate(900,350)">
      <rect width="300" height="50" rx="8" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="30" font-size="13" fill="#fecaca">④ When you leave the median（远离均值）</text>
    </g>
    <g transform="translate(900,410)">
      <rect width="300" height="50" rx="8" fill="#0f172a" stroke="#ef4444"/>
      <text x="20" y="30" font-size="13" fill="#fecaca">⑤ When market re-prices（劳动力重新定价）</text>
    </g>
    <line x1="805" y1="440" x2="895" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- BOTTOM: Six posture patches -->
  <g font-family="-apple-system,Segoe UI,sans-serif">
    <text x="700" y="610" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle">六条姿势补丁（Posture Patches）</text>
    <g transform="translate(60,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">① 先假设</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">先写下你认为的问题</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">再用 AI 验证它</text>
    </g>
    <g transform="translate(280,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">② 先解释 再代码</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">explain → tradeoffs</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">才允许写代码</text>
    </g>
    <g transform="translate(500,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">③ Learning Mode</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">把"学生功能"</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">当生产工具</text>
    </g>
    <g transform="translate(720,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">④ 当 junior PR 审</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">测试通过你也不会</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">轻易 merge junior PR</text>
    </g>
    <g transform="translate(940,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">⑤ 手写复现</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">月度对账</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">re-derive by hand</text>
    </g>
    <g transform="translate(1160,640)">
      <rect width="200" height="80" rx="8" fill="#0f172a" stroke="#22c55e"/>
      <text x="100" y="30" font-size="13" fill="#bbf7d0" text-anchor="middle" font-weight="700">⑥ 让 AI 教你</text>
      <text x="100" y="56" font-size="11" fill="#94a3b8" text-anchor="middle">写完之后问</text>
      <text x="100" y="72" font-size="11" fill="#94a3b8" text-anchor="middle">"你刚才用了什么"</text>
    </g>
  </g>

  <!-- footer: two metrics -->
  <g transform="translate(700,800)" font-family="-apple-system,Segoe UI,sans-serif">
    <rect x="-350" y="0" width="700" height="68" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="28" font-size="16" fill="#fbbf24" text-anchor="middle" font-weight="700">两个指标，不是一个</text>
    <text x="0" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">"Did I learn anything today, or did I just close tickets?"</text>
  </g>
</svg>
