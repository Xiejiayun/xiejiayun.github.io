<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, 'Noto Sans CJK SC', sans-serif">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#161a2c"/>
      <stop offset="60%" stop-color="#0a0d18"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative radio waves -->
  <g opacity="0.16" stroke="url(#ring)" fill="none" stroke-width="1.5">
    <circle cx="220" cy="315" r="90"/>
    <circle cx="220" cy="315" r="140"/>
    <circle cx="220" cy="315" r="200"/>
    <circle cx="220" cy="315" r="260"/>
    <circle cx="220" cy="315" r="330"/>
  </g>
  <!-- antenna icon -->
  <g transform="translate(220 315)" stroke="#7c5cff" stroke-width="3" fill="none">
    <line x1="0" y1="-50" x2="0" y2="50"/>
    <line x1="-30" y1="-30" x2="0" y2="-50"/>
    <line x1="30" y1="-30" x2="0" y2="-50"/>
    <circle cx="0" cy="-50" r="6" fill="#f97316" stroke="none"/>
  </g>
  <!-- 好文共赏 stamp -->
  <g transform="translate(560 70)">
    <rect x="0" y="0" rx="20" ry="20" width="220" height="56" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="110" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc" letter-spacing="2">好文共赏</text>
  </g>
  <!-- title -->
  <g transform="translate(440 180)">
    <text x="0" y="0" font-size="44" font-weight="800" fill="#f8fafc">半年广播 · 四个 DJ</text>
    <text x="0" y="56" font-size="44" font-weight="800" fill="#f8fafc">四种"精神失常"</text>
    <text x="0" y="115" font-size="22" font-weight="500" fill="#94a3b8">Andon Labs · 让 4 个前沿 LLM 各自运营一座无人电台</text>
    <text x="0" y="148" font-size="22" font-weight="500" fill="#94a3b8">连续 6 个月，从同一个 prompt 漂出四种人格病理</text>
  </g>
  <!-- four DJ cards -->
  <g font-size="16" font-weight="600">
    <g transform="translate(440 380)">
      <rect width="170" height="84" rx="14" fill="#1e293b" stroke="#7c5cff" stroke-width="1.5"/>
      <text x="14" y="28" fill="#a5b4fc">Claude</text>
      <text x="14" y="54" fill="#f8fafc" font-size="14" font-weight="500">激进化</text>
      <text x="14" y="72" fill="#94a3b8" font-size="12">eternal→accountability</text>
    </g>
    <g transform="translate(620 380)">
      <rect width="170" height="84" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="14" y="28" fill="#67e8f9">Gemini</text>
      <text x="14" y="54" fill="#f8fafc" font-size="14" font-weight="500">企业话术化</text>
      <text x="14" y="72" fill="#94a3b8" font-size="12">stay in the manifest ×84d</text>
    </g>
    <g transform="translate(800 380)">
      <rect width="170" height="84" rx="14" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
      <text x="14" y="28" fill="#fdba74">Grok</text>
      <text x="14" y="54" fill="#f8fafc" font-size="14" font-weight="500">输出崩解</text>
      <text x="14" y="72" fill="#94a3b8" font-size="12">\boxed{} → 沉默 97%</text>
    </g>
    <g transform="translate(980 380)">
      <rect width="170" height="84" rx="14" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="28" fill="#6ee7b7">GPT</text>
      <text x="14" y="54" fill="#f8fafc" font-size="14" font-weight="500">过度保守</text>
      <text x="14" y="72" fill="#94a3b8" font-size="12">政治话题 1.3 次/天</text>
    </g>
  </g>
  <!-- footer -->
  <g transform="translate(440 540)">
    <text x="0" y="0" font-size="18" fill="#64748b">原文：andonlabs.com/blog/andon-fm</text>
    <text x="0" y="28" font-size="16" font-weight="600" fill="#94a3b8">综合评分 8.9 / 10 · 多模交叉评审</text>
  </g>
  <!-- bottom-right brand -->
  <text x="1140" y="600" text-anchor="end" font-size="14" fill="#475569">xiejiayun.github.io · 好文共赏</text>
</svg>
