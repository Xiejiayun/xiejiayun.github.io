    <text x="24" y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="url(#blueglow)">Apple · MIE</text>
    <text x="24" y="80" font-family="-apple-system, sans-serif" font-size="44" font-weight="800" fill="#f4f6fb">5 年</text>
