<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#101a30"/>
      <stop offset="100%" stop-color="#1a0e2e"/>
    </linearGradient>
    <linearGradient id="partLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7b54" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff3860" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="durSpike" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="durPatch" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#2a3050" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Title section -->
  <text x="60" y="80" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22"
        fill="#8b9bbf" letter-spacing="4">好文共赏 · EDITOR'S PICK</text>

  <text x="60" y="155" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44"
        font-weight="800" fill="#ffffff">part 数从 30k → 160k</text>
  <text x="60" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44"
        font-weight="800" fill="#ffffff">一把 mutex 拖垮百 PB 账单</text>

  <text x="60" y="265" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22"
        fill="#a8b5e0">Cloudflare × ClickHouse · 三步上游 PR · 8× 加速</text>

  <!-- Chart: parts growth + query duration spike + patch drop -->
  <g transform="translate(80, 470)">
    <!-- Axis -->
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#5a6080" stroke-width="1"/>
    <line x1="0" y1="-160" x2="0" y2="10" stroke="#5a6080" stroke-width="1"/>

    <!-- Y axis label -->
    <text x="-12" y="-150" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10"
          fill="#7a82a0" text-anchor="end">↑</text>
    <text x="-12" y="5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10"
          fill="#7a82a0" text-anchor="end">0</text>

    <!-- Parts count line: linear growth -->
    <path d="M 0,-20 L 150,-35 L 300,-55 L 450,-80 L 600,-105 L 750,-125 L 900,-140 L 1020,-148"
          fill="none" stroke="url(#partLine)" stroke-width="3" filter="url(#glow)" stroke-dasharray="0"/>
    <text x="1030" y="-148" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11"
          fill="#ff8e53">parts 数（160k）</text>

    <!-- Query duration: rising then catastrophic spike before patch, then crash down -->
    <path d="M 0,-18 L 100,-25 L 200,-38 L 300,-58 L 400,-95 L 450,-125 L 470,-140"
          fill="none" stroke="url(#durSpike)" stroke-width="3" filter="url(#glow)"/>
    <text x="380" y="-152" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11"
          fill="#fbbf24" text-anchor="middle">查询时长（迁移后）</text>

    <!-- Patch 1: shared_lock immediate drop -->
    <line x1="470" y1="-140" x2="490" y2="-50" stroke="#4fd1c5" stroke-width="2"
          stroke-dasharray="3 3" opacity="0.7"/>
    <text x="495" y="-145" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10"
          fill="#4fd1c5">① shared_lock</text>

    <!-- Plateau after patch 1, then minor rise before patch 2 -->
    <path d="M 490,-50 L 560,-58 L 620,-72"
          fill="none" stroke="url(#durPatch)" stroke-width="3" filter="url(#glow)"/>

    <!-- Patch 2: deferred copy further drop -->
    <line x1="620" y1="-72" x2="640" y2="-35" stroke="#60a5fa" stroke-width="2"
          stroke-dasharray="3 3" opacity="0.7"/>
    <text x="645" y="-78" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10"
          fill="#60a5fa">② deferred copy</text>

    <!-- After patch 2: slow rise again as parts grow -->
    <path d="M 640,-35 L 720,-45 L 800,-60 L 860,-78"
          fill="none" stroke="url(#durPatch)" stroke-width="3" filter="url(#glow)"/>

    <!-- Patch 3: binary search final drop, breaks correlation -->
    <line x1="860" y1="-78" x2="880" y2="-30" stroke="#a78bfa" stroke-width="2"
          stroke-dasharray="3 3" opacity="0.7"/>
    <text x="885" y="-84" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10"
          fill="#a78bfa">③ binary search</text>

    <!-- Stable line: correlation broken -->
    <path d="M 880,-30 L 960,-32 L 1020,-31"
          fill="none" stroke="url(#durPatch)" stroke-width="3" filter="url(#glow)"/>

    <!-- Annotation: correlation broken arrow -->
    <text x="950" y="-15" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11"
          fill="#c8d0f0" text-anchor="middle" font-style="italic">↑ 相关性首次被打断</text>

    <!-- X axis label -->
    <text x="520" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12"
          fill="#8a90b0" text-anchor="middle">2025-01 ───────────── 时间 ───────────── 2026-05</text>
  </g>

  <!-- Lock icon decoration -->
  <g transform="translate(960, 130)" opacity="0.6">
    <rect x="0" y="20" width="60" height="50" rx="6" fill="#ff7b54" opacity="0.3"/>
    <path d="M 12 20 L 12 8 Q 12 -8 30 -8 Q 48 -8 48 8 L 48 20" fill="none" stroke="#ff7b54" stroke-width="3"/>
    <circle cx="30" cy="42" r="4" fill="#ff7b54"/>
    <line x1="30" y1="44" x2="30" y2="56" stroke="#ff7b54" stroke-width="2"/>
  </g>

  <!-- Footer URL -->
  <text x="60" y="600" font-family="ui-monospace, monospace" font-size="13"
        fill="#5a6080">blog.cloudflare.com/clickhouse-query-plan-contention</text>
  <text x="1140" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        fill="#5a6080" text-anchor="end">2026-05-18 · xiejiayun.github.io</text>
</svg>
