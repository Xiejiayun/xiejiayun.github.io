<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="mmbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#181028"/>
    </linearGradient>
    <radialGradient id="centerNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7b54"/>
      <stop offset="100%" stop-color="#c93b5e"/>
    </radialGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="b5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#mmbg)"/>

  <!-- Title -->
  <text x="700" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700"
        fill="#ffffff" text-anchor="middle">Cloudflare × ClickHouse: 三步上游 PR 把 mutex 从规划器里拔出来</text>
  <text x="700" y="65" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        fill="#8b95b8" text-anchor="middle">part 数从 30k → 160k · 8x SELECT 加速 · 一张未来 ZooKeeper 的伏笔</text>

  <!-- Center node -->
  <g transform="translate(700, 460)">
    <ellipse cx="0" cy="0" rx="130" ry="50" fill="url(#centerNode)" opacity="0.95"/>
    <text x="0" y="-5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"
          fill="#ffffff" text-anchor="middle">查询规划器的</text>
    <text x="0" y="20" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700"
          fill="#ffffff" text-anchor="middle">那把独占锁</text>
  </g>

  <!-- Branch 1: 背景设计 (top-left) -->
  <g stroke="url(#b1)" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 600,440 Q 450,400 320,200"/>
  </g>
  <g transform="translate(170, 170)">
    <rect x="0" y="0" width="220" height="34" rx="8" fill="url(#b1)" opacity="0.9"/>
    <text x="110" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700"
          fill="#fff" text-anchor="middle">① Ready-Analytics</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#c8d0f0">
    <text x="180" y="225">• 共享宽表 (20 float + 20 string)</text>
    <text x="180" y="245">• namespace 区分多租户</text>
    <text x="180" y="265">• 主键 (namespace, indexID, ts)</text>
    <text x="180" y="285">• 2 PiB+ · 几百个内部应用</text>
    <text x="180" y="305">• 但保留期只有一档：31 天</text>
  </g>

  <!-- Branch 2: 分区键变更 (top-right) -->
  <g stroke="url(#b2)" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 800,440 Q 950,400 1080,200"/>
  </g>
  <g transform="translate(1010, 170)">
    <rect x="0" y="0" width="220" height="34" rx="8" fill="url(#b2)" opacity="0.9"/>
    <text x="110" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700"
          fill="#fff" text-anchor="middle">② 分区键迁移</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#d8c8f0">
    <text x="1020" y="225">• PARTITION BY day</text>
    <text x="1020" y="245">→ PARTITION BY (ns, day)</text>
    <text x="1020" y="265">• 假设：每 query 实际读 parts 不变</text>
    <text x="1020" y="285">• 现实：part 总数 30k → 160k</text>
    <text x="1020" y="305">• 隐含代价：planner 的"看多少"</text>
  </g>

  <!-- Branch 3: 三步优化 (right) -->
  <g stroke="url(#b3)" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 830,460 Q 1000,480 1100,520"/>
  </g>
  <g transform="translate(1080, 510)">
    <rect x="0" y="0" width="280" height="34" rx="8" fill="url(#b3)" opacity="0.95"/>
    <text x="140" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700"
          fill="#fff" text-anchor="middle">③ 三步上游 PR</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#c0f0d8">
    <text x="1090" y="565">① shared_lock (planner 是只读)</text>
    <text x="1090" y="585">  → 排队消失，曲线砸下来</text>
    <text x="1090" y="610">② deferred copy (cached shared)</text>
    <text x="1090" y="630">  → 复制成本搬到 writer 端</text>
    <text x="1090" y="655">③ binary search (前缀有序)</text>
    <text x="1090" y="675">  → O(N) → O(log N)，相关性断</text>
    <text x="1090" y="700" fill="#ffd97a" font-weight="600">PR #85535 (jawm) merged in 25.11</text>
  </g>

  <!-- Branch 4: 火焰图洞察 (left) -->
  <g stroke="url(#b4)" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 570,460 Q 400,490 280,540"/>
  </g>
  <g transform="translate(40, 510)">
    <rect x="0" y="0" width="280" height="34" rx="8" fill="url(#b4)" opacity="0.95"/>
    <text x="140" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700"
          fill="#1a0e0e" text-anchor="middle">④ 火焰图的转折点</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#ffe9b0">
    <text x="50" y="565">• CPU 模式：filterParts 45%</text>
    <text x="50" y="585">  → 改启发式，只快 5%</text>
    <text x="50" y="610">• Real 模式：所有线程</text>
    <text x="50" y="630">  → 一半时间在等 mutex</text>
    <text x="50" y="655">• 教训：CPU profile 看不见</text>
    <text x="50" y="675">  排队中的线程</text>
    <text x="50" y="700" fill="#ffdb6b" font-weight="600">采样模式定义你能看到什么</text>
  </g>

  <!-- Branch 5: 反思与伏笔 (bottom) -->
  <g stroke="url(#b5)" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 700,510 Q 700,650 700,720"/>
  </g>
  <g transform="translate(560, 720)">
    <rect x="0" y="0" width="280" height="34" rx="8" fill="url(#b5)" opacity="0.95"/>
    <text x="140" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700"
          fill="#fff" text-anchor="middle">⑤ 没说出口的伏笔</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#ffd0e8">
    <text x="570" y="775">• 8x 优化只买回 18 个月</text>
    <text x="570" y="795">• part 数还在涨，没有下降信号</text>
    <text x="570" y="815">• ZooKeeper 集群已逼近 100 GB</text>
    <text x="570" y="835">• Ready-Analytics 长期是否正确？</text>
    <text x="570" y="855" fill="#ffaad0" font-weight="600">"也许哪天我们会写 ZK 的故事"</text>
  </g>

  <!-- Edge labels around center -->
  <text x="700" y="850" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11"
        fill="#5a6080" text-anchor="middle">xiejiayun.github.io · 好文共赏 · 2026-05-18</text>
</svg>
