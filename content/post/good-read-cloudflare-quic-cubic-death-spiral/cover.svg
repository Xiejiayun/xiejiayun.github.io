<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="cwndLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff8e53" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="recoveryLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#63b3ed" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#2a3050" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- CWND death spiral visualization (sawtooth oscillation at min) -->
  <g transform="translate(80, 450)" opacity="0.85">
    <!-- Axis -->
    <line x1="0" y1="0" x2="1040" y2="0" stroke="#5a6080" stroke-width="1"/>
    <line x1="0" y1="-130" x2="0" y2="10" stroke="#5a6080" stroke-width="1"/>

    <!-- Sawtooth death spiral pattern -->
    <path d="M 0,-8 L 20,-12 L 22,-8 L 42,-12 L 44,-8 L 64,-12 L 66,-8 L 86,-12 L 88,-8 L 108,-12 L 110,-8 L 130,-12 L 132,-8 L 152,-12 L 154,-8 L 174,-12 L 176,-8 L 196,-12 L 198,-8 L 218,-12 L 220,-8 L 240,-12 L 242,-8 L 262,-12 L 264,-8 L 284,-12 L 286,-8 L 306,-12 L 308,-8 L 328,-12 L 330,-8 L 350,-12 L 352,-8 L 372,-12 L 374,-8 L 394,-12 L 396,-8 L 416,-12 L 418,-8 L 438,-12 L 440,-8 L 460,-12 L 462,-8 L 482,-12 L 484,-8 L 504,-12 L 506,-8 L 526,-12 L 528,-8 L 548,-12 L 550,-8 L 570,-12 L 572,-8 L 592,-12 L 594,-8 L 614,-12 L 616,-8 L 636,-12 L 638,-8 L 658,-12 L 660,-8 L 680,-12"
          fill="none" stroke="url(#cwndLine)" stroke-width="2" filter="url(#glow)"/>

    <!-- Recovery break + ramp up -->
    <path d="M 680,-12 L 720,-30 L 760,-55 L 800,-85 L 850,-115 L 920,-125 L 1000,-128"
          fill="none" stroke="url(#recoveryLine)" stroke-width="3" filter="url(#glow)"/>

    <!-- Labels -->
    <text x="340" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12"
          fill="#8a90b0" text-anchor="middle">999 次状态翻转 · 6.7s · 每 14ms 一次</text>
    <text x="860" y="-145" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12"
          fill="#a0c9e0" text-anchor="middle">3 行代码修复后</text>

    <text x="-10" y="-128" font-family="ui-monospace, monospace" font-size="11"
          fill="#5a6080" text-anchor="end">cwnd</text>
    <text x="1040" y="22" font-family="ui-monospace, monospace" font-size="11"
          fill="#5a6080" text-anchor="end">t</text>
  </g>

  <!-- Title block -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22"
          font-weight="500" fill="#7a8aaa" letter-spacing="2">好文共赏 · EDITOR'S PICK</text>

    <text x="0" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="50"
          font-weight="700" fill="#f0f4ff">当 "idle" 不是 idle</text>

    <text x="0" y="125" font-family="ui-sans-serif, system-ui, sans-serif" font-size="36"
          font-weight="600" fill="#a0b0d0">一次 14ms 的 QUIC 死亡螺旋</text>

    <text x="0" y="175" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20"
          fill="#7a8aaa">Cloudflare · CUBIC · 跨越十年的协议时间债</text>
  </g>

  <!-- Keywords pill -->
  <g transform="translate(80, 310)" font-family="ui-monospace, monospace" font-size="13" fill="#9fb4d4">
    <rect x="0" y="0" width="92" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="46" y="17" text-anchor="middle">QUIC</text>

    <rect x="104" y="0" width="96" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="152" y="17" text-anchor="middle">CUBIC</text>

    <rect x="212" y="0" width="120" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="272" y="17" text-anchor="middle">min-cwnd</text>

    <rect x="344" y="0" width="100" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="394" y="17" text-anchor="middle">qlog</text>

    <rect x="456" y="0" width="120" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="516" y="17" text-anchor="middle">quiche/Rust</text>

    <rect x="588" y="0" width="140" height="26" rx="13" fill="none" stroke="#3a4878" stroke-width="1"/>
    <text x="658" y="17" text-anchor="middle">Linux Kernel</text>
  </g>

  <!-- Footer -->
  <text x="1120" y="610" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        fill="#5a6080" text-anchor="end">xiejiayun.com · 2026-05-14</text>
</svg>
