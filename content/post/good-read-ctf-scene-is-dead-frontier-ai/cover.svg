<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="60%" stop-color="#10182f"/>
      <stop offset="100%" stop-color="#1c1230"/>
    </linearGradient>
    <linearGradient id="redfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5e6c" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff9966" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ghost" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c8cff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5ad1ff" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <!-- top label -->
  <text x="60" y="80" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#9aa3c7" letter-spacing="6">EDITOR'S PICK · 好文共赏</text>

  <!-- main title -->
  <text x="60" y="170" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="62" font-weight="800" fill="#f6f7fb">CTF 场景已死</text>
  <text x="60" y="240" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="34" fill="#cdd3ee">— Frontier AI 蒸发了那条阶梯</text>

  <!-- sub -->
  <text x="60" y="305" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#9aa3c7">Kabir Acharya · kabir.au · 2026-05-01</text>

  <!-- broken ladder illustration -->
  <g transform="translate(720,160)" filter="url(#soft)">
    <!-- ghost upper part (the part that got vaporized) -->
    <g stroke="url(#ghost)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.55" stroke-dasharray="6 12">
      <line x1="40" y1="0" x2="40" y2="120"/>
      <line x1="260" y1="0" x2="260" y2="120"/>
      <line x1="40" y1="20" x2="260" y2="20"/>
      <line x1="40" y1="60" x2="260" y2="60"/>
      <line x1="40" y1="100" x2="260" y2="100"/>
    </g>
    <!-- gap zone -->
    <g stroke="#ff5e6c" stroke-width="2" opacity="0.7">
      <line x1="40" y1="135" x2="260" y2="135" stroke-dasharray="4 6"/>
    </g>
    <text x="150" y="160" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#ff9aa2" letter-spacing="2">vaporized by Opus 4.5 + GPT-5.5 Pro</text>

    <!-- still-intact bottom rungs (picoGym etc) -->
    <g stroke="url(#redfade)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow)">
      <line x1="40" y1="180" x2="40" y2="380"/>
      <line x1="260" y1="180" x2="260" y2="380"/>
      <line x1="40" y1="200" x2="260" y2="200"/>
      <line x1="40" y1="260" x2="260" y2="260"/>
      <line x1="40" y1="320" x2="260" y2="320"/>
      <line x1="40" y1="380" x2="260" y2="380"/>
    </g>
    <text x="150" y="410" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#ffd6c7" letter-spacing="2">picoGym · HackTheBox · 学习平台</text>
  </g>

  <!-- bottom keywords strip -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#9aa3c7">
    <rect x="60" y="500" width="1080" height="2" fill="#9aa3c7" opacity="0.25"/>
    <text x="60" y="540">CTFtime · Claude Code · agentic harness · pay-to-win · ladder collapse</text>
    <text x="60" y="580" fill="#cdd3ee" font-size="18">"The loss is not just a scoreboard. It is the ladder from beginner curiosity to elite competition."</text>
  </g>
</svg>
