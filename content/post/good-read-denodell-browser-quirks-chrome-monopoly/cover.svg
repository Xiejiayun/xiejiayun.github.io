<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="chromeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4285f4"/>
      <stop offset="0.5" stop-color="#ea4335"/>
      <stop offset="1" stop-color="#fbbc05"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- grid lines (subtle code aesthetic) -->
  <g stroke="#2a2f4a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- category tag -->
  <rect x="60" y="60" width="120" height="32" rx="6" fill="#ff6b6b"/>
  <text x="120" y="82" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">好文共赏</text>

  <!-- date -->
  <text x="200" y="82" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">2026 / 05 / 18</text>

  <!-- main title -->
  <text x="60" y="170" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">浏览器源码里那张</text>
  <text x="60" y="230" font-family="Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">藏起来的 <tspan fill="#ffd166">"大客户名单"</tspan></text>

  <!-- subtitle -->
  <text x="60" y="290" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a0a4c0">Den Odell 把 Quirks.cpp 摊开，</text>
  <text x="60" y="320" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a0a4c0">整个 Web 标准其实只是 Chrome 的脚注</text>

  <!-- three numbers panel -->
  <g transform="translate(60, 380)">
    <rect width="320" height="160" rx="12" fill="#1f2547" stroke="#3a4070" stroke-width="1"/>
    <text x="20" y="40" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">WebKit Quirks.cpp</text>
    <text x="20" y="100" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#06d6a0">4048</text>
    <text x="200" y="100" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a0a4c0">行 C++</text>
    <text x="20" y="140" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">≈ 149 个硬编码域名</text>
  </g>

  <g transform="translate(400, 380)">
    <rect width="320" height="160" rx="12" fill="#1f2547" stroke="#3a4070" stroke-width="1"/>
    <text x="20" y="40" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">Firefox webcompat/</text>
    <text x="20" y="100" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffd166">372</text>
    <text x="180" y="100" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a0a4c0">份 JSON</text>
    <text x="20" y="140" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">每份 = 一份产业债务</text>
  </g>

  <g transform="translate(740, 380)">
    <rect width="400" height="160" rx="12" fill="#1f2547" stroke="#ff6b6b" stroke-width="2"/>
    <text x="20" y="40" font-family="Helvetica, monospace" font-size="14" fill="#7a7e96">Chrome quirks 目录</text>
    <text x="20" y="100" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="url(#chromeGrad)">不存在</text>
    <text x="20" y="140" font-family="Helvetica, monospace" font-size="14" fill="#a0a4c0">因为 Chrome 自己就是 quirk</text>
  </g>

  <!-- footer -->
  <text x="60" y="595" font-family="Helvetica, monospace" font-size="13" fill="#5a5e7a">denodell.com  ·  WebKit Quirks.cpp  ·  mozilla-firefox/firefox · 多模评分 8.7 / 10</text>
</svg>
