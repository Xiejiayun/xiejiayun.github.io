<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#101831"/>
      <stop offset="100%" stop-color="#0a1426"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="320" fill="url(#glow)"/>
  <circle cx="250" cy="500" r="260" fill="url(#glow)" opacity="0.6"/>

  <!-- Top label -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" >
    <text x="80" y="100" fill="#22d3ee" font-size="22" font-weight="700" letter-spacing="6">好文共赏 · EDITOR'S PICK</text>
    <text x="80" y="135" fill="#94a3b8" font-size="20" letter-spacing="2">FIL-C · CALLING CONVENTION · LLVM · ELF</text>
  </g>

  <!-- Main title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" >
    <text x="80" y="240" fill="#f8fafc" font-size="56" font-weight="800">Filip Pizlo 的</text>
    <text x="80" y="310" fill="url(#accent)" font-size="56" font-weight="800">「内存安全 C」</text>
    <text x="80" y="380" fill="#f8fafc" font-size="44" font-weight="700">为什么还能跑得</text>
    <text x="80" y="430" fill="#fbbf24" font-size="44" font-weight="700">几乎和裸 C 一样快？</text>
  </g>

  <!-- Side asm-like decoration -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas" font-size="13" fill="#475569" opacity="0.55">
    <text x="780" y="450">mov  %rdi,%rbx</text>
    <text x="780" y="470">cmp  $0x17,%rdx</text>
    <text x="780" y="490">jbe  74 &lt;...&gt;</text>
    <text x="780" y="510">call *(%rsi)</text>
    <text x="780" y="530">test $0x1,%al</text>
    <text x="780" y="550">ret</text>
  </g>

  <!-- Signature box -->
  <g transform="translate(780,180)">
    <rect width="320" height="180" rx="20" fill="#0f172a" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
    <text x="20" y="40" fill="#22d3ee" font-family="ui-monospace, Menlo" font-size="14">signature(char*(int,char*,double))</text>
    <text x="20" y="80" fill="#f8fafc" font-family="ui-monospace, Menlo" font-size="38" font-weight="700">= 60125</text>
    <text x="20" y="120" fill="#cbd5e1" font-family="ui-monospace, Menlo" font-size="12">11 types · 16 args · 64-bit hash</text>
    <text x="20" y="145" fill="#cbd5e1" font-family="ui-monospace, Menlo" font-size="12">fast == LIKELY ? direct : thunk</text>
    <text x="20" y="170" fill="#a78bfa" font-family="ui-monospace, Menlo" font-size="12">PizBench9019 ≈ +1% per layer</text>
  </g>

  <!-- Bottom byline -->
  <g font-family="ui-sans-serif, system-ui" font-size="18" fill="#94a3b8">
    <text x="80" y="555">原文：fil-c.org/calling_convention · 作者：Filip Pizlo</text>
    <text x="80" y="585">XieJiaYun · 好文共赏 · 2026-05-19</text>
  </g>
</svg>
