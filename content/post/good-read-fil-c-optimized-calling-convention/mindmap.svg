<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0a1426"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
    <style>
      .root { fill:#111827; stroke:#22d3ee; stroke-width:3; }
      .l1 { fill:#0f172a; stroke:#a78bfa; stroke-width:2; }
      .l2 { fill:#0f172a; stroke:#22d3ee; stroke-width:1.5; }
      .l3 { fill:#0f172a; stroke:#64748b; stroke-width:1; }
      .label-root { fill:#f8fafc; font-family:ui-sans-serif,system-ui; font-size:24px; font-weight:700; }
      .label-l1 { fill:#f8fafc; font-family:ui-sans-serif,system-ui; font-size:17px; font-weight:600; }
      .label-l2 { fill:#cbd5e1; font-family:ui-sans-serif,system-ui; font-size:13px; }
      .label-l3 { fill:#94a3b8; font-family:ui-sans-serif,system-ui; font-size:11px; }
      .conn { stroke:#475569; stroke-width:1.5; fill:none; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="700" y="50" text-anchor="middle" fill="#22d3ee" font-family="ui-sans-serif,system-ui" font-size="22" letter-spacing="4">FIL-C OPTIMIZED CALLING CONVENTION · 思维导图</text>

  <!-- Center node -->
  <rect x="560" y="410" width="280" height="80" rx="14" class="root"/>
  <text x="700" y="445" text-anchor="middle" class="label-root">Fil-C</text>
  <text x="700" y="473" text-anchor="middle" class="label-l2">Memory-Safe C/C++, ~Yolo-C speed</text>

  <!-- Top-left: Generic CC -->
  <line x1="600" y1="410" x2="320" y2="180" class="conn" marker-end="url(#arrow)"/>
  <rect x="160" y="120" width="280" height="120" rx="10" class="l1"/>
  <text x="300" y="150" text-anchor="middle" class="label-l1">① 通用调用约定</text>
  <text x="300" y="175" text-anchor="middle" class="label-l2">Generic CC</text>
  <text x="180" y="200" class="label-l3">• 线程局部 CC buffer (payload + caps)</text>
  <text x="180" y="215" class="label-l3">• Flight pointer 检查 / 异常 flag</text>
  <text x="180" y="230" class="label-l3">• va_arg / zargs / libffi 闭包 兜底</text>

  <!-- Top-mid: Register CC -->
  <line x1="700" y1="410" x2="700" y2="180" class="conn" marker-end="url(#arrow)"/>
  <rect x="560" y="120" width="280" height="120" rx="10" class="l1"/>
  <text x="700" y="150" text-anchor="middle" class="label-l1">② 寄存器调用约定</text>
  <text x="700" y="175" text-anchor="middle" class="label-l2">Register CC + Signature Hash</text>
  <text x="580" y="200" class="label-l3">• 64-bit 算术编码签名(11 类型 × 16 arg)</text>
  <text x="580" y="215" class="label-l3">• fast_entrypoint vs generic_entrypoint</text>
  <text x="580" y="230" class="label-l3">• 不匹配 → 一对 thunk 翻译</text>

  <!-- Top-right: Direct call -->
  <line x1="800" y1="410" x2="1080" y2="180" class="conn" marker-end="url(#arrow)"/>
  <rect x="960" y="120" width="280" height="120" rx="10" class="l1"/>
  <text x="1100" y="150" text-anchor="middle" class="label-l1">③ 直接调用优化</text>
  <text x="1100" y="175" text-anchor="middle" class="label-l2">Avoiding Direct Caller Resolution</text>
  <text x="980" y="200" class="label-l3">• 不再 getter 解析符号</text>
  <text x="980" y="215" class="label-l3">• pizlonatedFI60125_foo 符号</text>
  <text x="980" y="230" class="label-l3">• COMDAT NULL 检查保命</text>

  <!-- Bottom row support concepts -->
  <line x1="640" y1="490" x2="400" y2="660" class="conn" marker-end="url(#arrow)"/>
  <rect x="200" y="660" width="240" height="100" rx="10" class="l2"/>
  <text x="320" y="690" text-anchor="middle" class="label-l1">InvisiCaps</text>
  <text x="220" y="715" class="label-l3">• 64-bit ptr + 隐藏 cap 元数据</text>
  <text x="220" y="730" class="label-l3">• flight ptr = (intval, lower)</text>
  <text x="220" y="745" class="label-l3">• 比 SoftBound 更线程安全</text>

  <line x1="700" y1="490" x2="700" y2="660" class="conn" marker-end="url(#arrow)"/>
  <rect x="580" y="660" width="240" height="100" rx="10" class="l2"/>
  <text x="700" y="690" text-anchor="middle" class="label-l1">FUGC</text>
  <text x="600" y="715" class="label-l3">• 并发 garbage collector</text>
  <text x="600" y="730" class="label-l3">• Free 原子地 invalidate caps</text>
  <text x="600" y="745" class="label-l3">• Use-after-free 必 panic</text>

  <line x1="760" y1="490" x2="1000" y2="660" class="conn" marker-end="url(#arrow)"/>
  <rect x="960" y="660" width="280" height="100" rx="10" class="l2"/>
  <text x="1100" y="690" text-anchor="middle" class="label-l1">ELF / COMDAT 陷阱</text>
  <text x="980" y="715" class="label-l3">• weak vs strong, loader 与 linker</text>
  <text x="980" y="730" class="label-l3">• pizlonatedFIP / FI 两层别名</text>
  <text x="980" y="745" class="label-l3">• ValueTracking + ConstantFold 改 LLVM</text>

  <!-- bottom-most note -->
  <rect x="380" y="800" width="640" height="60" rx="8" class="l3"/>
  <text x="700" y="825" text-anchor="middle" class="label-l1">结果：PizBench9019 每层 ≥ 1% 提速</text>
  <text x="700" y="845" text-anchor="middle" class="label-l2">总体把 Fil-C 拉到 1×~4× Yolo-C 区间，djb 已经在做 Filian/Debian 移植</text>
</svg>
