<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#13183f"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c9eff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c9eff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="940" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="260" cy="480" r="220" fill="url(#glow)"/>

  <!-- 网格点 -->
  <g fill="#3b3f6e" opacity="0.35">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/>
    <circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>

  <!-- 顶部 tag -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-size="16" fill="#c084fc" letter-spacing="2">好文共赏</text>
  </g>
  <g transform="translate(280, 70)">
    <text x="0" y="24" font-size="16" fill="#8b92c4" letter-spacing="1">EDITOR'S PICK · 2026-05-14</text>
  </g>

  <!-- 主标题 -->
  <g transform="translate(80, 200)">
    <text font-size="56" font-weight="bold" fill="#ffffff" letter-spacing="-1">
      <tspan x="0" y="0">17 分钟 vs 一篇 PhD 论文</tspan>
    </text>
    <text font-size="32" font-weight="500" fill="#c084fc" letter-spacing="0">
      <tspan x="0" y="56">Fields 奖得主 Tim Gowers</tspan>
      <tspan x="0" y="100">实测 ChatGPT 5.5 Pro 做数学</tspan>
    </text>
  </g>

  <!-- 数学符号装饰 -->
  <g transform="translate(800, 230)" opacity="0.85">
    <text x="0" y="0" font-size="60" font-family="serif" fill="url(#accent)" font-style="italic">A + A</text>
    <text x="0" y="60" font-size="28" font-family="serif" fill="#7c9eff" font-style="italic">|hA| ∈ R(h,k)</text>
    <text x="0" y="100" font-size="22" font-family="serif" fill="#7c9eff" opacity="0.7" font-style="italic">B_h sets · Sidon set</text>
    <text x="0" y="135" font-size="22" font-family="serif" fill="#7c9eff" opacity="0.5">exponential → polynomial</text>
  </g>

  <!-- 底部关键词 -->
  <g transform="translate(80, 480)" font-size="18" fill="#a0a4d6">
    <text x="0" y="0">#加性数论 · #Sidon-Set · #B_h-Sets · #PhD-级研究 · #AI-辅助证明</text>
    <text x="0" y="32" fill="#6b71a5">从「LLM 拼凑已知」到「LLM 提出原创结构」的临界点</text>
  </g>

  <!-- 装饰线 -->
  <line x1="80" y1="170" x2="320" y2="170" stroke="url(#accent)" stroke-width="2"/>
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#2a2e5e" stroke-width="1" opacity="0.6"/>

  <!-- 角落标记 -->
  <text x="1120" y="580" text-anchor="end" font-size="14" fill="#6b71a5">xiejiayun.github.io · 好文共赏</text>
</svg>
