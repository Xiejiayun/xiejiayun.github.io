<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#11182e"/>
      <stop offset="100%" stop-color="#1a1140"/>
    </linearGradient>
    <linearGradient id="boundary" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="chaos" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#dc2626" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle haskell-style λ pattern -->
  <g fill="#7dd3fc" opacity="0.05" font-family="ui-monospace,Menlo,monospace" font-size="28">
    <text x="60" y="80">λ</text><text x="160" y="120">→</text><text x="240" y="80">::</text>
    <text x="980" y="120">runST</text><text x="60" y="560">forall</text>
    <text x="940" y="540">∀ s.</text><text x="820" y="600">IO ()</text>
    <text x="120" y="600">Either</text><text x="380" y="60">Monoid</text>
  </g>

  <!-- Big "container" box -->
  <g transform="translate(120,180)">
    <!-- chaos inside -->
    <ellipse cx="320" cy="160" rx="290" ry="130" fill="url(#chaos)"/>
    <g stroke="#fde68a" stroke-width="1.5" fill="none" opacity="0.55">
      <path d="M120 120 q 60 -40 120 0 t 120 0 t 120 0"/>
      <path d="M120 180 q 60 -40 120 0 t 120 0 t 120 0"/>
      <path d="M120 240 q 60 -40 120 0 t 120 0 t 120 0"/>
    </g>
    <g fill="#fef3c7" font-family="ui-monospace,Menlo,monospace" font-size="14" opacity="0.85">
      <text x="160" y="130">unsafePerformIO</text>
      <text x="180" y="160">mutable buffers</text>
      <text x="170" y="190">connection pools</text>
      <text x="170" y="220">retries · circuit breakers</text>
      <text x="200" y="250">IORef · STRef</text>
    </g>

    <!-- Boundary -->
    <rect x="0" y="0" width="640" height="320" rx="22" ry="22"
          fill="none" stroke="url(#boundary)" stroke-width="4" filter="url(#glow)"/>
    <text x="320" y="-12" fill="#a78bfa" font-family="ui-monospace,Menlo,monospace"
          font-size="18" text-anchor="middle">forall s . ST s a  →  a</text>
    <text x="0" y="345" fill="#7dd3fc" font-family="ui-monospace,Menlo,monospace"
          font-size="16">-- nothing escapes the rank-2 boundary</text>
  </g>

  <!-- Title -->
  <g font-family="ui-sans-serif,system-ui,'Noto Sans CJK SC',sans-serif" fill="#e2e8f0">
    <text x="60" y="80" font-size="34" font-weight="700">好文共赏 · Editor's Pick</text>
    <text x="60" y="125" font-size="20" fill="#a78bfa">A Couple Million Lines of Haskell @ Mercury</text>
  </g>

  <!-- Right column big numbers -->
  <g transform="translate(820,180)" font-family="ui-sans-serif,system-ui,sans-serif" fill="#e2e8f0">
    <text x="0" y="0"  font-size="20" fill="#94a3b8">in production</text>
    <text x="0" y="40" font-size="46" font-weight="800" fill="#facc15">2,000,000</text>
    <text x="0" y="65" font-size="16" fill="#cbd5e1">lines of Haskell</text>

    <text x="0" y="120" font-size="46" font-weight="800" fill="#86efac">$248 B</text>
    <text x="0" y="145" font-size="16" fill="#cbd5e1">2025 transaction volume</text>

    <text x="0" y="200" font-size="46" font-weight="800" fill="#f472b6">300,000+</text>
    <text x="0" y="225" font-size="16" fill="#cbd5e1">business customers</text>

    <text x="0" y="280" font-size="20" fill="#94a3b8">scored</text>
    <text x="0" y="320" font-size="32" font-weight="700" fill="#7dd3fc">9.07 / 10</text>
  </g>

  <!-- Footer -->
  <g font-family="ui-sans-serif,system-ui,sans-serif" fill="#94a3b8">
    <text x="60" y="600" font-size="14">xiejiayun.github.io · 好文共赏 · 2026-05-14 · Safety-II × Types × Durable Execution</text>
  </g>
</svg>
