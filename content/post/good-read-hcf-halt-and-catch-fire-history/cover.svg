<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#1a1530"/>
      <stop offset="100%" stop-color="#2a1010"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff3a00" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff5e1a" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#ffd200" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fffdd2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="grad-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff2cc"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff6347"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 上方分类标签 -->
  <rect x="60" y="50" width="180" height="38" rx="19" fill="#ff5e1a" opacity="0.18"/>
  <text x="150" y="76" font-family="SF Mono, Menlo, monospace" font-size="20" fill="#ffb347" text-anchor="middle" font-weight="700">好文共赏 · Editor's Pick</text>

  <!-- 主标题 -->
  <text x="60" y="180" font-family="ui-serif, Georgia, serif" font-size="64" fill="url(#grad-title)" font-weight="800" filter="url(#glow)">Halt and</text>
  <text x="60" y="252" font-family="ui-serif, Georgia, serif" font-size="64" fill="url(#grad-title)" font-weight="800" filter="url(#glow)">Catch Fire</text>

  <!-- 中线 -->
  <line x1="60" y1="290" x2="1140" y2="290" stroke="#ff5e1a" stroke-width="2" opacity="0.4"/>

  <!-- 副标题 -->
  <text x="60" y="330" font-family="ui-sans-serif, system-ui" font-size="24" fill="#e8e6df" opacity="0.92">从 1977 年 BYTE 杂志的玩笑指令到 2019 年</text>
  <text x="60" y="365" font-family="ui-sans-serif, system-ui" font-size="24" fill="#e8e6df" opacity="0.92">真实硅片示波器上的 500 kHz 方波</text>

  <!-- 关键词组 -->
  <g font-family="SF Mono, Menlo, monospace" font-size="18" fill="#ffb347">
    <rect x="60" y="395" width="158" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="139" y="419" text-anchor="middle">Motorola 6800</text>

    <rect x="232" y="395" width="116" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="290" y="419" text-anchor="middle">$9D / $DD</text>

    <rect x="362" y="395" width="84" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="404" y="419" text-anchor="middle">HACOF</text>

    <rect x="460" y="395" width="100" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="510" y="419" text-anchor="middle">F00F bug</text>

    <rect x="574" y="395" width="80" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="614" y="419" text-anchor="middle">UD2</text>

    <rect x="668" y="395" width="120" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="728" y="419" text-anchor="middle">Sandsifter</text>

    <rect x="802" y="395" width="158" height="36" rx="6" fill="#ff5e1a" opacity="0.12"/>
    <text x="881" y="419" text-anchor="middle">post-silicon val.</text>
  </g>

  <!-- 模拟示波器方波图示 -->
  <g transform="translate(60, 480)">
    <text x="0" y="0" font-family="SF Mono, monospace" font-size="14" fill="#7da3ff" opacity="0.7">Doc TB 2019 · MC6800 · 1 MHz clock · 500 kHz square wave on A0–A15</text>
    <path d="M 0 35 L 30 35 L 30 5 L 70 5 L 70 35 L 110 35 L 110 5 L 150 5 L 150 35 L 190 35 L 190 5 L 230 5 L 230 35 L 270 35 L 270 5 L 310 5 L 310 35 L 350 35 L 350 5 L 390 5 L 390 35 L 430 35 L 430 5 L 470 5 L 470 35 L 510 35 L 510 5 L 550 5 L 550 35 L 590 35 L 590 5 L 630 5 L 630 35 L 670 35 L 670 5 L 710 5 L 710 35 L 750 35 L 750 5 L 790 5 L 790 35 L 830 35 L 830 5 L 870 5 L 870 35 L 910 35 L 910 5 L 950 5 L 950 35 L 990 35 L 990 5 L 1030 5 L 1030 35 L 1080 35"
          stroke="#ff5e1a" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- 火焰光晕 (装饰) -->
  <ellipse cx="980" cy="180" rx="180" ry="130" fill="url(#fire)" opacity="0.7"/>
  <text x="980" y="170" font-family="ui-serif, Georgia, serif" font-size="120" fill="#ff5e1a" opacity="0.18" text-anchor="middle">🔥</text>

  <!-- 底部署名 -->
  <text x="60" y="595" font-family="SF Mono, monospace" font-size="14" fill="#7da3ff" opacity="0.75">Source · Scott Robinson, unstack.io · 2026-05-15  ·  xiejiayun.github.io / 好文共赏</text>
</svg>
