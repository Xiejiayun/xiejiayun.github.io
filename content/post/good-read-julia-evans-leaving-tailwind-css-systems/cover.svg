<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#101a33"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fea0c2"/>
      <stop offset="100%" stop-color="#f91a55"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7b250"/>
      <stop offset="100%" stop-color="#de751f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#9ab2ff" stroke-width="1">
    <path d="M0 0 H1200 M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200 M0 630 H1200"/>
    <path d="M0 0 V630 M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630 M1200 0 V630"/>
  </g>

  <!-- top eyebrow -->
  <g transform="translate(64,72)">
    <rect width="170" height="34" rx="17" fill="url(#accent)" opacity="0.95"/>
    <text x="85" y="23" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'PingFang SC', Arial" font-size="16" font-weight="700" fill="#0b1220">好文共赏 · Pick</text>

    <text x="190" y="23" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9ab2ff">jvns.ca / 2026-05-15 / Julia Evans</text>
  </g>

  <!-- main title -->
  <g transform="translate(64,160)">
    <text font-family="ui-sans-serif, system-ui, 'PingFang SC', Arial" font-size="54" font-weight="800" fill="#f5f7ff" filter="url(#glow)">
      <tspan x="0" dy="0">Julia Evans 把 Tailwind</tspan>
      <tspan x="0" dy="66">拆成<tspan fill="url(#orange)">九个抽屉</tspan></tspan>
    </text>
    <text x="0" y="170" font-family="ui-sans-serif, system-ui, 'PingFang SC', Arial" font-size="22" font-weight="500" fill="#c4cfe3">
      八年之后，她终于敢说 CSS 是一门技术 —— 给 LLM 时代的 CSS 成熟度模型
    </text>
  </g>

  <!-- nine drawers row -->
  <g transform="translate(64,420)" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#e5ecff">
    <g>
      <rect x="0"   y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="59" y="29" text-anchor="middle">1. reset</text>
    </g>
    <g>
      <rect x="124" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="183" y="29" text-anchor="middle">2. components</text>
    </g>
    <g>
      <rect x="248" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#fea0c2" stroke-width="1.5"/>
      <text x="307" y="29" text-anchor="middle" fill="#fea0c2">3. colours</text>
    </g>
    <g>
      <rect x="372" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="431" y="29" text-anchor="middle">4. font sizes</text>
    </g>
    <g>
      <rect x="496" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="555" y="29" text-anchor="middle">5. utilities</text>
    </g>
    <g>
      <rect x="620" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="679" y="29" text-anchor="middle">6. base</text>
    </g>
    <g>
      <rect x="744" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="803" y="29" text-anchor="middle">7. spacing</text>
    </g>
    <g>
      <rect x="868" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="url(#orange)" stroke-width="1.5"/>
      <text x="927" y="29" text-anchor="middle" fill="#f7b250">8. responsive</text>
    </g>
    <g>
      <rect x="992" y="0" width="118" height="48" rx="8" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1.5"/>
      <text x="1051" y="29" text-anchor="middle">9. build</text>
    </g>
  </g>

  <!-- bottom badge -->
  <g transform="translate(64,520)" font-family="ui-sans-serif, system-ui, 'PingFang SC', Arial">
    <rect x="0" y="0" width="280" height="34" rx="17" fill="#1c2a4e" stroke="#3a4f8a" stroke-width="1"/>
    <text x="14" y="22" font-size="14" fill="#9ab2ff">综合评分</text>
    <text x="88" y="22" font-size="18" font-weight="800" fill="url(#accent)">8.7 / 10</text>
    <text x="170" y="22" font-size="13" fill="#9ab2ff">Opus·Sonnet·Gemini</text>
  </g>

  <!-- right hint -->
  <g transform="translate(1080,580)" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#5a6a8a">
    <text x="60" y="0">xiejiayun.com · 好文共赏</text>
  </g>
</svg>
