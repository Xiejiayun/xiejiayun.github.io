<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="0.55" stop-color="#142046"/>
      <stop offset="1" stop-color="#1f1146"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ef476f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd166" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="950" cy="160" r="220" fill="url(#glow)"/>
  <circle cx="220" cy="500" r="180" fill="url(#glow)" opacity="0.55"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500"/>
    <path d="M150 0 L150 630 M300 0 L300 630 M450 0 L450 630 M600 0 L600 630 M750 0 L750 630 M900 0 L900 630 M1050 0 L1050 630"/>
  </g>

  <!-- top label -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="#ffd166" fill-opacity="0.12" stroke="#ffd166" stroke-opacity="0.6"/>
    <text x="100" y="24" fill="#ffd166" font-size="18" font-weight="600" text-anchor="middle">好文共赏 · Editor's Pick</text>
  </g>

  <!-- main title -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" fill="#ffffff" font-size="60" font-weight="700">别回答</text>
    <text x="0" y="70" fill="#ffffff" font-size="60" font-weight="700">第一个问题</text>
  </g>

  <!-- subtitle bar -->
  <g transform="translate(80, 305)">
    <rect x="0" y="0" width="8" height="120" fill="url(#accent)"/>
    <text x="28" y="22" fill="#bcc8ff" font-size="22" font-weight="500">Don't answer the first question</text>
    <text x="28" y="58" fill="#94a3d6" font-size="19">Lalit Maganti · Google Perfetto</text>
    <text x="28" y="92" fill="#94a3d6" font-size="19">2026 · 一份工具维护者的"读心术"</text>
  </g>

  <!-- right side keyword cluster -->
  <g transform="translate(780, 200)" font-size="16" fill="#ffffff">
    <text x="0" y="0" fill="#ffd166" font-weight="600" font-size="18">关键词</text>
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">工程支持</text>
    </g>
    <g transform="translate(130, 30)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">XY problem</text>
    </g>
    <g transform="translate(260, 30)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">平台思维</text>
    </g>
    <g transform="translate(0, 75)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">工具的形状</text>
    </g>
    <g transform="translate(130, 75)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">Staff Engineer</text>
    </g>
    <g transform="translate(260, 75)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.2"/>
      <text x="60" y="22" text-anchor="middle" fill="#e2e8ff">Perfetto</text>
    </g>
  </g>

  <!-- bottom score -->
  <g transform="translate(80, 540)">
    <text x="0" y="0" fill="#ffd166" font-size="15" font-weight="600">多模评分</text>
    <text x="0" y="28" fill="#ffffff" font-size="20" font-weight="500">Opus 8.7 · Sonnet 8.6 · Gemini 8.5 · 综合 8.6 / 10</text>
  </g>

  <!-- mini accent dot -->
  <circle cx="1090" cy="555" r="6" fill="#ef476f"/>
  <text x="1100" y="560" fill="#94a3d6" font-size="14">xiejiayun.github.io · 2026-05-18</text>
</svg>
