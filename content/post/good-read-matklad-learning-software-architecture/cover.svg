<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa657"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dea584"/>
      <stop offset="100%" stop-color="#c47e3a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.05" stroke="#7d8590" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- header tag -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#21262d" stroke="#ffa657" stroke-width="1.5"/>
    <text x="90" y="24" fill="#ffa657" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle">📌 好文共赏</text>
  </g>

  <!-- author chip -->
  <g transform="translate(260, 60)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#21262d" stroke="#7ee787" stroke-width="1"/>
    <text x="110" y="24" fill="#7ee787" font-family="ui-monospace, 'SF Mono', monospace" font-size="14" font-weight="600" text-anchor="middle">@matklad · 2026-05-12</text>
  </g>

  <!-- title -->
  <text x="60" y="180" fill="#e6edf3" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800">Learning Software</text>
  <text x="60" y="232" fill="url(#accent)" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800">Architecture</text>

  <!-- subtitle -->
  <text x="60" y="290" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="500">Conway 定律才是软件架构的母题</text>
  <text x="60" y="318" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="500">rust-analyzer 作者写给"科学码农"的一封建筑学回信</text>

  <!-- core formula -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="640" height="100" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="35" fill="#7ee787" font-family="ui-monospace, 'SF Mono', monospace" font-size="16" font-weight="600">// matklad's three-layer causal chain</text>
    <text x="20" y="68" fill="#e6edf3" font-family="ui-monospace, 'SF Mono', monospace" font-size="22" font-weight="700">
      <tspan fill="#79c0ff">code</tspan>
      <tspan fill="#8b949e"> &lt; </tspan>
      <tspan fill="#d2a8ff">architecture</tspan>
      <tspan fill="#8b949e"> &lt; </tspan>
      <tspan fill="#ffa657">social issues</tspan>
    </text>
    <text x="20" y="88" fill="#6e7681" font-family="ui-monospace, 'SF Mono', monospace" font-size="12">— Evan Martin (neugierig), quoted by matklad</text>
  </g>

  <!-- score chip -->
  <g transform="translate(900, 380)" filter="url(#glow)">
    <circle cx="80" cy="80" r="80" fill="#161b22" stroke="url(#accent)" stroke-width="3"/>
    <text x="80" y="62" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">综合评分</text>
    <text x="80" y="100" fill="#ffa657" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="800" text-anchor="middle">8.65</text>
    <text x="80" y="120" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">/ 10.0</text>
  </g>

  <!-- footer keywords -->
  <g transform="translate(60, 560)">
    <text x="0" y="0" fill="#6e7681" font-family="ui-monospace, 'SF Mono', monospace" font-size="13">
      <tspan fill="#79c0ff">#Conway-Law</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#d2a8ff">#TIGER_STYLE</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#ffa657">#rust-analyzer</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#7ee787">#OptimisticMerging</tspan>
      <tspan fill="#6e7681"> · </tspan>
      <tspan fill="#ff7b72">#catch_unwind</tspan>
    </text>
  </g>

  <!-- crab silhouette accent (rust-analyzer mascot allusion) -->
  <g transform="translate(950, 180)" opacity="0.18">
    <ellipse cx="80" cy="60" rx="60" ry="38" fill="url(#rust)"/>
    <circle cx="50" cy="50" r="5" fill="#0d1117"/>
    <circle cx="110" cy="50" r="5" fill="#0d1117"/>
    <path d="M 30 70 Q 10 80 5 100" stroke="url(#rust)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 130 70 Q 150 80 155 100" stroke="url(#rust)" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
