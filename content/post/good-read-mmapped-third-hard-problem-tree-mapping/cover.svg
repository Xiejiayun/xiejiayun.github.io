<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="0.6" stop-color="#13183a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0a0e27" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative graph (web) on the left -->
  <g stroke="#7c3aed" stroke-opacity="0.45" stroke-width="1.4" fill="none">
    <line x1="120" y1="180" x2="220" y2="240"/>
    <line x1="120" y1="180" x2="160" y2="320"/>
    <line x1="220" y1="240" x2="320" y2="200"/>
    <line x1="220" y1="240" x2="280" y2="380"/>
    <line x1="160" y1="320" x2="280" y2="380"/>
    <line x1="320" y1="200" x2="380" y2="320"/>
    <line x1="280" y1="380" x2="380" y2="320"/>
    <line x1="380" y1="320" x2="260" y2="460"/>
    <line x1="280" y1="380" x2="260" y2="460"/>
    <line x1="160" y1="320" x2="260" y2="460"/>
  </g>
  <g fill="#a78bfa">
    <circle cx="120" cy="180" r="7"/>
    <circle cx="220" cy="240" r="7"/>
    <circle cx="160" cy="320" r="7"/>
    <circle cx="320" cy="200" r="7"/>
    <circle cx="280" cy="380" r="7"/>
    <circle cx="380" cy="320" r="7"/>
    <circle cx="260" cy="460" r="7"/>
  </g>

  <!-- Arrow indicating mapping -->
  <g stroke="#f472b6" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 430 320 L 540 320" />
    <path d="M 520 305 L 540 320 L 520 335" />
  </g>
  <text x="485" y="305" font-family="Georgia, serif" font-size="18" fill="#f9a8d4" text-anchor="middle" font-style="italic">map</text>

  <!-- Decorative tree on the right -->
  <g stroke="#22d3ee" stroke-opacity="0.75" stroke-width="1.5" fill="none">
    <line x1="700" y1="180" x2="620" y2="260"/>
    <line x1="700" y1="180" x2="780" y2="260"/>
    <line x1="620" y1="260" x2="580" y2="360"/>
    <line x1="620" y1="260" x2="660" y2="360"/>
    <line x1="780" y1="260" x2="740" y2="360"/>
    <line x1="780" y1="260" x2="820" y2="360"/>
    <line x1="580" y1="360" x2="560" y2="460"/>
    <line x1="580" y1="360" x2="600" y2="460"/>
    <line x1="660" y1="360" x2="640" y2="460"/>
    <line x1="660" y1="360" x2="680" y2="460"/>
    <line x1="740" y1="360" x2="720" y2="460"/>
    <line x1="740" y1="360" x2="760" y2="460"/>
    <line x1="820" y1="360" x2="800" y2="460"/>
    <line x1="820" y1="360" x2="840" y2="460"/>
  </g>
  <g fill="#67e8f9">
    <circle cx="700" cy="180" r="7"/>
    <circle cx="620" cy="260" r="6"/>
    <circle cx="780" cy="260" r="6"/>
    <circle cx="580" cy="360" r="5"/>
    <circle cx="660" cy="360" r="5"/>
    <circle cx="740" cy="360" r="5"/>
    <circle cx="820" cy="360" r="5"/>
    <circle cx="560" cy="460" r="4"/>
    <circle cx="600" cy="460" r="4"/>
    <circle cx="640" cy="460" r="4"/>
    <circle cx="680" cy="460" r="4"/>
    <circle cx="720" cy="460" r="4"/>
    <circle cx="760" cy="460" r="4"/>
    <circle cx="800" cy="460" r="4"/>
    <circle cx="840" cy="460" r="4"/>
  </g>

  <!-- Banner badge -->
  <g transform="translate(60, 60)">
    <rect width="180" height="38" rx="6" fill="#7c3aed" fill-opacity="0.15" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="90" y="25" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#c4b5fd" letter-spacing="3">好文共赏 · EDITOR'S PICK</text>
  </g>

  <!-- Title -->
  <g transform="translate(910, 110)">
    <text font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-weight="800" fill="#f8fafc" text-anchor="end">
      <tspan x="0" y="0" font-size="44" letter-spacing="0.5">第三个难题</tspan>
      <tspan x="0" y="58" font-size="28" fill="#cbd5e1" font-weight="500">The Third Hard Problem</tspan>
    </text>
  </g>

  <!-- Subtitle area -->
  <g transform="translate(60, 530)">
    <text font-family="-apple-system, 'PingFang SC', sans-serif" fill="#e2e8f0">
      <tspan x="0" y="0" font-size="20" font-weight="600">Tree Mapping —— 把图嵌入到树的不可解之痛</tspan>
      <tspan x="0" y="32" font-size="14" fill="#94a3b8">Roman Kashitsyn · mmapped.blog · 2026 / 02</tspan>
    </text>
  </g>

  <!-- footer right -->
  <text x="1140" y="610" font-family="Georgia, serif" font-size="13" fill="#7c3aed" text-anchor="end" font-style="italic">naming · cache invalidation · tree mapping</text>
</svg>
