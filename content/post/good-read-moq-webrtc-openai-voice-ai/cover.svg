<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="0.5" stop-color="#10162e"/>
      <stop offset="1" stop-color="#0a0e27"/>
    </linearGradient>
    <linearGradient id="webrtcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4757"/>
      <stop offset="1" stop-color="#ff6b7a"/>
    </linearGradient>
    <linearGradient id="quicGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ed573"/>
      <stop offset="1" stop-color="#7bed9f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1a2147" stroke-width="0.5" opacity="0.7">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- header tag -->
  <g transform="translate(60,60)">
    <rect width="200" height="34" rx="17" fill="#1c2440" stroke="#3d4d80" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" font-family="ui-sans-serif,system-ui,'PingFang SC','Microsoft YaHei'" font-size="16" fill="#a8b3d9" font-weight="600">好文共赏 · Good Read</text>
  </g>

  <!-- title -->
  <text x="60" y="180" font-family="ui-sans-serif,system-ui,'PingFang SC','Microsoft YaHei'" font-size="60" font-weight="800" fill="#f5f7ff" letter-spacing="-1">WebRTC 是问题本身</text>
  <text x="60" y="240" font-family="ui-sans-serif,system-ui,'PingFang SC','Microsoft YaHei'" font-size="34" font-weight="500" fill="#c4cce6">为什么 OpenAI 的语音 AI 架构不该被照搬</text>

  <!-- subtitle -->
  <text x="60" y="290" font-family="ui-sans-serif,system-ui" font-size="20" fill="#7c87ad" font-style="italic">by Luke Curley (kixelated) · Media over QUIC · 2026.05</text>

  <!-- VS comparison panel -->
  <g transform="translate(60,340)">
    <!-- WebRTC side -->
    <rect width="500" height="220" rx="14" fill="#1b1e2e" stroke="#ff4757" stroke-width="2" opacity="0.95"/>
    <text x="30" y="40" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="700" fill="url(#webrtcGrad)">WebRTC（2011 为 Google Meet 设计）</text>
    <g font-family="ui-monospace,monospace" font-size="16" fill="#d8dcec">
      <text x="30" y="80">• 45+ 个 RFC 拼出来的麻袋</text>
      <text x="30" y="108">• 8 个 RTT 才能握上手</text>
      <text x="30" y="136">• jitter buffer 20–200ms 写死</text>
      <text x="30" y="164">• 临时端口×连接数，K8s 噩梦</text>
      <text x="30" y="192">• 浏览器实现锁死 → 想 fork 也难</text>
    </g>
  </g>

  <g transform="translate(640,340)">
    <!-- QUIC side -->
    <rect width="500" height="220" rx="14" fill="#1b1e2e" stroke="#2ed573" stroke-width="2" opacity="0.95"/>
    <text x="30" y="40" font-family="ui-sans-serif,system-ui" font-size="22" font-weight="700" fill="url(#quicGrad)">QUIC + WebTransport（2026）</text>
    <g font-family="ui-monospace,monospace" font-size="16" fill="#d8dcec">
      <text x="30" y="80">• 1 个 RTT 完成连接 + 加密</text>
      <text x="30" y="108">• CONNECTION_ID 免疫 IP 漂移</text>
      <text x="30" y="136">• QUIC-LB 无状态路由</text>
      <text x="30" y="164">• anycast + unicast 双层架构</text>
      <text x="30" y="192">• 浏览器原生支持 (WebTransport)</text>
    </g>
  </g>

  <!-- big arrow -->
  <g transform="translate(580,440)" filter="url(#glow)">
    <path d="M 0 10 L 50 10 L 50 0 L 75 20 L 50 40 L 50 30 L 0 30 Z" fill="#7c87ad"/>
  </g>

  <!-- footer -->
  <text x="60" y="600" font-family="ui-sans-serif,system-ui" font-size="14" fill="#5a6285">xiejiayun.github.io · #WebRTC #QUIC #VoiceAI #MoQ #协议设计</text>
</svg>
