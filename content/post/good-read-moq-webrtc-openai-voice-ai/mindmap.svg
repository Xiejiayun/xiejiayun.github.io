<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="mmbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e27"/>
      <stop offset="1" stop-color="#10162e"/>
    </linearGradient>
    <style>
      .core { fill: #ffd166; }
      .branch-red { fill: #ff6b6b; }
      .branch-orange { fill: #ffa94d; }
      .branch-blue { fill: #4dabf7; }
      .branch-green { fill: #51cf66; }
      .leaf { fill: #1c2440; stroke: #3d4d80; stroke-width: 1.5; }
      .txt { font-family: ui-sans-serif, system-ui, 'PingFang SC', 'Microsoft YaHei'; fill: #e8ecf8; }
      .core-txt { font-family: ui-sans-serif, system-ui, 'PingFang SC', 'Microsoft YaHei'; fill: #0a0e27; font-weight: 700; }
      .line { stroke: #3d4d80; stroke-width: 2; fill: none; }
      .line-red { stroke: #ff6b6b; stroke-width: 2.5; fill: none; opacity: 0.7; }
      .line-orange { stroke: #ffa94d; stroke-width: 2.5; fill: none; opacity: 0.7; }
      .line-blue { stroke: #4dabf7; stroke-width: 2.5; fill: none; opacity: 0.7; }
      .line-green { stroke: #51cf66; stroke-width: 2.5; fill: none; opacity: 0.7; }
    </style>
  </defs>
  <rect width="1600" height="1000" fill="url(#mmbg)"/>

  <!-- Title -->
  <text x="800" y="50" class="txt" font-size="24" font-weight="700" text-anchor="middle">WebRTC 是问题本身 · 论证结构思维导图</text>

  <!-- Central core -->
  <ellipse cx="800" cy="500" rx="170" ry="60" class="core"/>
  <text x="800" y="495" text-anchor="middle" class="core-txt" font-size="22">WebRTC ≠ Voice AI</text>
  <text x="800" y="525" text-anchor="middle" class="core-txt" font-size="16">协议级抽象错位</text>

  <!-- BRANCH 1: 协议错位 (top-left) -->
  <path class="line-red" d="M 720 470 Q 500 380 320 280"/>
  <rect x="180" y="240" width="280" height="80" rx="14" class="leaf" stroke="#ff6b6b"/>
  <text x="320" y="270" text-anchor="middle" class="txt" font-size="18" font-weight="700">① 协议错位</text>
  <text x="320" y="298" text-anchor="middle" class="txt" font-size="14">jitter buffer 写死 · 丢包优先于等待</text>

  <path class="line" d="M 320 320 L 200 380"/>
  <path class="line" d="M 320 320 L 200 430"/>
  <path class="line" d="M 320 320 L 200 480"/>
  <text x="200" y="385" text-anchor="end" class="txt" font-size="13">• 45+ RFC 的合集</text>
  <text x="200" y="435" text-anchor="end" class="txt" font-size="13">• audio NACK 几乎不可用</text>
  <text x="200" y="485" text-anchor="end" class="txt" font-size="13">• 实现在浏览器里锁死</text>

  <!-- BRANCH 2: 流量模型错位 (bottom-left) -->
  <path class="line-orange" d="M 720 530 Q 500 620 320 720"/>
  <rect x="180" y="700" width="280" height="80" rx="14" class="leaf" stroke="#ffa94d"/>
  <text x="320" y="730" text-anchor="middle" class="txt" font-size="18" font-weight="700">② 流量模型错位</text>
  <text x="320" y="758" text-anchor="middle" class="txt" font-size="14">TTS 比实时快 · 应缓冲不应同步</text>

  <path class="line" d="M 320 780 L 200 820"/>
  <path class="line" d="M 320 780 L 200 870"/>
  <text x="200" y="825" text-anchor="end" class="txt" font-size="13">• OpenAI 被迫加 sleep</text>
  <text x="200" y="875" text-anchor="end" class="txt" font-size="13">• 抖动反咬→质量恶化</text>

  <!-- BRANCH 3: 基础设施错位 (top-right) -->
  <path class="line-blue" d="M 880 470 Q 1100 380 1280 280"/>
  <rect x="1140" y="240" width="280" height="80" rx="14" class="leaf" stroke="#4dabf7"/>
  <text x="1280" y="270" text-anchor="middle" class="txt" font-size="18" font-weight="700">③ 基础设施错位</text>
  <text x="1280" y="298" text-anchor="middle" class="txt" font-size="14">临时端口 × 连接数 · K8s 不友好</text>

  <path class="line" d="M 1280 320 L 1400 380"/>
  <path class="line" d="M 1280 320 L 1400 430"/>
  <path class="line" d="M 1280 320 L 1400 480"/>
  <text x="1400" y="385" text-anchor="start" class="txt" font-size="13">• 多协议 mux 到一个端口</text>
  <text x="1400" y="435" text-anchor="start" class="txt" font-size="13">• ufrag/ssrc 做路由 key</text>
  <text x="1400" y="485" text-anchor="start" class="txt" font-size="13">• Redis 兜底连接表</text>

  <!-- BRANCH 4: 握手错位 (bottom-right) -->
  <path class="line-green" d="M 880 530 Q 1100 620 1280 720"/>
  <rect x="1140" y="700" width="280" height="80" rx="14" class="leaf" stroke="#51cf66"/>
  <text x="1280" y="730" text-anchor="middle" class="txt" font-size="18" font-weight="700">④ 握手错位</text>
  <text x="1280" y="758" text-anchor="middle" class="txt" font-size="14">8 个 RTT · 全是 P2P 遗留税</text>

  <path class="line" d="M 1280 780 L 1400 820"/>
  <path class="line" d="M 1280 780 L 1400 870"/>
  <text x="1400" y="825" text-anchor="start" class="txt" font-size="13">• 信令 3 + 媒体 5 = 8 RTT</text>
  <text x="1400" y="875" text-anchor="start" class="txt" font-size="13">• QUIC 只需 1 RTT</text>

  <!-- bottom solution -->
  <rect x="600" y="900" width="400" height="80" rx="14" fill="#1c2440" stroke="#51cf66" stroke-width="2"/>
  <text x="800" y="930" text-anchor="middle" class="txt" font-size="18" font-weight="700">应该怎么做？</text>
  <text x="800" y="958" text-anchor="middle" class="txt" font-size="14">先 WebSocket → 等需要丢包优先级再上 WebTransport+QUIC</text>
  <path class="line" d="M 800 900 L 800 560" stroke-dasharray="6,6" stroke="#51cf66"/>

  <!-- bottom legend -->
  <text x="800" y="60" text-anchor="middle" class="txt" font-size="12" opacity="0.7">moq.dev · @kixelated · 2026-05-06</text>
</svg>
