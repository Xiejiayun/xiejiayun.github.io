<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="60%" stop-color="#1a1330"/>
      <stop offset="100%" stop-color="#1f0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- top tag -->
  <g transform="translate(60,55)">
    <rect width="170" height="34" rx="17" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#22d3ee" font-weight="600">好文共赏 · Editor's Pick</text>
  </g>

  <!-- title -->
  <text x="60" y="170" font-family="ui-sans-serif,system-ui,sans-serif" font-size="56" font-weight="800" fill="#f1f5f9">Needle</text>
  <text x="60" y="220" font-family="ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="600" fill="#94a3b8">把 Gemini 3.1 蒸馏成 26M 参数的</text>
  <text x="60" y="258" font-family="ui-sans-serif,system-ui,sans-serif" font-size="28" font-weight="600" fill="#94a3b8">工具调用专家，并砍掉所有 FFN</text>

  <!-- divider -->
  <rect x="60" y="285" width="120" height="3" fill="url(#accent)"/>

  <!-- key numbers -->
  <g transform="translate(60, 330)">
    <text font-family="ui-monospace,monospace" font-size="20" fill="#a855f7">┌─ 模型规模 ──────────────────────┐</text>
  </g>

  <g transform="translate(80, 380)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#warm)">26M</text>
    <text x="0" y="40" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#cbd5e1">参数</text>
  </g>

  <g transform="translate(220, 380)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#accent)">200B</text>
    <text x="0" y="40" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#cbd5e1">预训练 token</text>
  </g>

  <g transform="translate(380, 380)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#accent)">27h</text>
    <text x="0" y="40" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#cbd5e1">16x TPU v6e 训练</text>
  </g>

  <g transform="translate(520, 380)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="48" font-weight="800" fill="url(#warm)">1200</text>
    <text x="0" y="40" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#cbd5e1">tok/s decode 手机</text>
  </g>

  <!-- right-side architecture sketch -->
  <g transform="translate(780, 90)" opacity="0.75">
    <text font-family="ui-monospace,monospace" font-size="14" fill="#22d3ee">// Simple Attention Network</text>

    <g transform="translate(0,30)">
      <rect width="280" height="36" rx="6" fill="none" stroke="#a855f7" stroke-width="1.5"/>
      <text x="140" y="23" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#e9d5ff">Encoder × 12  (no FFN)</text>
    </g>

    <g transform="translate(0,80)">
      <rect width="280" height="36" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="140" y="23" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#a5f3fc">Decoder × 8  (cross-attn)</text>
    </g>

    <line x1="140" y1="116" x2="140" y2="135" stroke="#94a3b8" stroke-width="1"/>
    <polygon points="135,135 145,135 140,142" fill="#94a3b8"/>

    <g transform="translate(0,150)">
      <rect width="280" height="36" rx="6" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="140" y="23" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" fill="#fde68a">JSON  tool_call</text>
    </g>

    <g transform="translate(0,210)">
      <text font-family="ui-monospace,monospace" font-size="12" fill="#cbd5e1">+ Gated Residual</text>
      <text y="20" font-family="ui-monospace,monospace" font-size="12" fill="#cbd5e1">+ ZCRMSNorm</text>
      <text y="40" font-family="ui-monospace,monospace" font-size="12" fill="#cbd5e1">+ Muon optimizer</text>
      <text y="60" font-family="ui-monospace,monospace" font-size="12" fill="#cbd5e1">+ INT4 QAT  (regularization)</text>
      <text y="80" font-family="ui-monospace,monospace" font-size="12" fill="#cbd5e1">+ Contrastive tool head</text>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(60, 560)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="600" fill="#22d3ee">Cactus Compute</text>
    <text x="160" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" fill="#64748b">|</text>
    <text x="180" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" fill="#94a3b8">MIT 开源 · GitHub · 2026-05-12</text>
  </g>
  <g transform="translate(1040, 555)">
    <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#64748b">jiaxie.dev</text>
    <text y="22" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#475569">2026-05-14</text>
  </g>
</svg>
