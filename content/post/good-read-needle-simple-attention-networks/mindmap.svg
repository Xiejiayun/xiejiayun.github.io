<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#1f0a2e"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- title -->
  <text x="800" y="40" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Needle / Simple Attention Networks — 核心论点思维导图</text>
  <text x="800" y="65" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#94a3b8">Cactus Compute · 2026-05-12 · MIT</text>

  <!-- center node -->
  <g transform="translate(800,500)">
    <circle r="100" fill="none" stroke="url(#core)" stroke-width="3"/>
    <circle r="95" fill="#0f172a" opacity="0.6"/>
    <text y="-12" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="800" fill="#22d3ee">Needle</text>
    <text y="18" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#cbd5e1">26M 工具调用模型</text>
    <text y="38" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">distilled from Gemini 3.1</text>
  </g>

  <!-- 8 branches (top-left, top, top-right, right, bottom-right, bottom, bottom-left, left) -->

  <!-- Branch 1: No FFN (top-left) -->
  <g>
    <path d="M 730 430 C 600 380 450 280 280 200" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <g transform="translate(80, 150)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#22d3ee">1. No FFN</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">softmax 已经非线性</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">外部知识任务无需记忆</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 砍掉 2/3 参数</text>
    </g>
  </g>

  <!-- Branch 2: Encoder-Decoder (top) -->
  <g>
    <path d="M 800 400 C 800 350 800 300 800 200" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <g transform="translate(660, 100)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#a855f7">2. Encoder-Decoder</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">工具列表 = 结构化对象</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">双向编码 + 定长 KV cache</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ T5 路线的现代复活</text>
    </g>
  </g>

  <!-- Branch 3: Gated Residual (top-right) -->
  <g>
    <path d="M 870 430 C 1000 380 1150 280 1320 200" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <g transform="translate(1240, 150)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fbbf24">3. Gated Residual</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">x = x + sigmoid(g)·Attn(N(x))</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">gate 初始化 0 → 半强残差</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 替代 FFN 的"重写"角色</text>
    </g>
  </g>

  <!-- Branch 4: ZCRMSNorm (right) -->
  <g>
    <path d="M 900 500 C 1050 500 1180 500 1320 500" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <g transform="translate(1240, 450)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#22d3ee">4. ZCRMSNorm</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">x · (1+γ)/RMS, γ init 0</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">初始状态 = 阻尼恒等</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 借鉴 nGPT/DeepSeek-V3</text>
    </g>
  </g>

  <!-- Branch 5: Muon + AdamW (bottom-right) -->
  <g>
    <path d="M 870 570 C 1000 620 1150 720 1320 800" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <g transform="translate(1240, 750)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#a855f7">5. Muon + AdamW</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">Muon → Q/K/V/O 投影</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">Newton-Schulz 正交化</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 防止线性塌缩</text>
    </g>
  </g>

  <!-- Branch 6: INT4 QAT (bottom) -->
  <g>
    <path d="M 800 600 C 800 700 800 800 800 850" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <g transform="translate(660, 850)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fbbf24">6. INT4 QAT 作正则</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">每 100 步假量化前向</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">STE 反传 + group_size=32</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 训练+部署同一目标</text>
    </g>
  </g>

  <!-- Branch 7: CLIP Tool Head (bottom-left) -->
  <g>
    <path d="M 730 570 C 600 620 450 720 280 800" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <g transform="translate(80, 750)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#22d3ee">7. 对比检索头</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">CLIP-style，0.1× loss</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">encoder 共享给生成+检索</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 大工具集 top-k 过滤</text>
    </g>
  </g>

  <!-- Branch 8: Token loss weighting (left) -->
  <g>
    <path d="M 700 500 C 550 500 420 500 280 500" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <g transform="translate(80, 450)">
      <rect width="280" height="100" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <text x="20" y="30" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fbbf24">8. Token Loss Weighting</text>
      <text x="20" y="55" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">JSON 1× · name 2× · key 1.5×</text>
      <text x="20" y="73" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">value 4×</text>
      <text x="20" y="91" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">→ 损失对齐错误分布</text>
    </g>
  </g>

  <!-- footer -->
  <text x="800" y="970" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">基于 cactus-compute/needle docs/simple_attention_networks.md — 仅作学习用途</text>
</svg>
