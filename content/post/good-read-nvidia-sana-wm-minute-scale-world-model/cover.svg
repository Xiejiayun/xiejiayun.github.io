<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1230"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#1e2746" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Camera trajectory illustration top-right -->
  <g opacity="0.4" stroke="#06b6d4" stroke-width="2" fill="none">
    <path d="M 850 80 Q 950 110 1000 60 Q 1050 30 1130 80" stroke-dasharray="5,3"/>
    <circle cx="850" cy="80" r="6" fill="#06b6d4"/>
    <circle cx="950" cy="110" r="4" fill="#06b6d4"/>
    <circle cx="1000" cy="60" r="4" fill="#06b6d4"/>
    <circle cx="1130" cy="80" r="6" fill="#10b981"/>
  </g>
  
  <!-- Category tag -->
  <rect x="80" y="60" width="180" height="40" rx="20" fill="url(#green)"/>
  <text x="170" y="87" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="700">好文共赏</text>
  
  <!-- Subtag -->
  <rect x="280" y="60" width="140" height="40" rx="20" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="350" y="87" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="500">论文导读</text>
  
  <!-- Score badge -->
  <g transform="translate(1080, 80)">
    <circle r="38" fill="#fbbf24"/>
    <text y="-5" text-anchor="middle" fill="#1a1f3a" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800">9.0</text>
    <text y="15" text-anchor="middle" fill="#1a1f3a" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600">综合评分</text>
  </g>
  
  <!-- Main title -->
  <text x="80" y="195" fill="#f8fafc" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800">把"一分钟世界"</text>
  <text x="80" y="265" fill="#f8fafc" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800">塞进一块 <tspan fill="url(#green)">H100</tspan></text>
  
  <!-- Subtitle -->
  <text x="80" y="330" fill="#94a3b8" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="400">NVIDIA SANA-WM · 混合线性注意力 · 世界模型</text>
  
  <!-- Key stats row -->
  <g transform="translate(80, 380)">
    <!-- Stat 1 -->
    <rect width="240" height="100" rx="12" fill="#1a1f3a" stroke="#334155" stroke-width="1"/>
    <text x="120" y="40" text-anchor="middle" fill="url(#green)" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="800">2.6B</text>
    <text x="120" y="70" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, system-ui, sans-serif" font-size="14">参数（对手 14B）</text>
    <text x="120" y="88" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, sans-serif" font-size="12">5.4× 更小</text>
    
    <!-- Stat 2 -->
    <rect x="260" width="240" height="100" rx="12" fill="#1a1f3a" stroke="#334155" stroke-width="1"/>
    <text x="380" y="40" text-anchor="middle" fill="url(#cyan)" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="800">36×</text>
    <text x="380" y="70" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, system-ui, sans-serif" font-size="14">推理吞吐量</text>
    <text x="380" y="88" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, sans-serif" font-size="12">vs LingBot-World</text>
    
    <!-- Stat 3 -->
    <rect x="520" width="240" height="100" rx="12" fill="#1a1f3a" stroke="#334155" stroke-width="1"/>
    <text x="640" y="40" text-anchor="middle" fill="url(#purple)" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="800">60s</text>
    <text x="640" y="70" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, system-ui, sans-serif" font-size="14">720p 视频</text>
    <text x="640" y="88" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, sans-serif" font-size="12">单 GPU 推理</text>
    
    <!-- Stat 4 -->
    <rect x="780" width="240" height="100" rx="12" fill="#1a1f3a" stroke="#334155" stroke-width="1"/>
    <text x="900" y="40" text-anchor="middle" fill="#fbbf24" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="800">34s</text>
    <text x="900" y="70" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, system-ui, sans-serif" font-size="14">RTX 5090 推理</text>
    <text x="900" y="88" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, sans-serif" font-size="12">NVFP4 量化</text>
  </g>
  
  <!-- Tags row -->
  <g transform="translate(80, 530)" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600">
    <rect width="120" height="32" rx="16" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#10b981">Frame-wise GDN</text>
    
    <rect x="135" width="100" height="32" rx="16" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="185" y="22" text-anchor="middle" fill="#06b6d4">UCPE</text>
    
    <rect x="250" width="120" height="32" rx="16" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <text x="310" y="22" text-anchor="middle" fill="#a855f7">Plücker Mixing</text>
    
    <rect x="385" width="100" height="32" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="435" y="22" text-anchor="middle" fill="#fbbf24">NVFP4</text>
    
    <rect x="500" width="120" height="32" rx="16" fill="none" stroke="#ec4899" stroke-width="1.5"/>
    <text x="560" y="22" text-anchor="middle" fill="#ec4899">Self-Forcing</text>
  </g>
  
  <!-- Bottom right meta -->
  <text x="1120" y="570" text-anchor="end" fill="#64748b" font-family="-apple-system, system-ui, sans-serif" font-size="14">NVIDIA · 2026-05-14 · arXiv 2605.15178</text>
  <text x="1120" y="595" text-anchor="end" fill="#94a3b8" font-family="-apple-system, system-ui, sans-serif" font-size="14">xiejiayun.github.io</text>
</svg>
