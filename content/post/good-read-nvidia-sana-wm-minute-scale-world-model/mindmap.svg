    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">DL3DV + FCGS + DiFix3D</text>
  </g>
  <g stroke="#f59e0b" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 280 750 L 100 820"/>
