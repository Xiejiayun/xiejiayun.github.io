    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">60 步 → 4 步</text>
  </g>
  <g stroke="#ec4899" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 1120 720 L 1300 720"/>
