    <text y="-3" text-anchor="middle" fill="#fbcfe8" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">NVFP4 量化</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">Blackwell 原生 4-bit</text>
  </g>
  <g stroke="#ec4899" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 1120 750 L 1300 820"/>
  </g>
  <g transform="translate(1300, 820)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#500724" stroke="#be185d"/>
    <text y="-3" text-anchor="middle" fill="#fbcfe8" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">RTX 5090 34s</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">60s 720p 视频</text>
  </g>
  
  <!-- 5. Refiner (top) -->
  <g stroke="#10b981" stroke-width="2" fill="none">
    <path d="M 700 390 L 700 200"/>
  </g>
  <g transform="translate(700, 170)">
    <rect x="-160" y="-30" width="320" height="60" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text y="-5" text-anchor="middle" fill="#34d399" font-family="-apple-system, sans-serif" font-size="16" font-weight="700">⑤ 两阶段 + 17B Refiner</text>
    <text y="18" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="12">ΔIQ 3.79 → 1.17 · 晚段去漂移</text>
  </g>
  
  <!-- 6. Benchmark (bottom) -->
  <g stroke="#22d3ee" stroke-width="2" fill="none">
    <path d="M 700 510 L 700 760"/>
  </g>
  <g transform="translate(700, 790)">
