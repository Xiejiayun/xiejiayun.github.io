<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#141a30"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  
  <rect width="1400" height="900" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" fill="#f8fafc" font-family="-apple-system, sans-serif" font-size="22" font-weight="700">SANA-WM 技术拆解思维导图</text>
  <text x="700" y="62" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="13">NVIDIA · 2.6B 参数 · 单 GPU · 60s 720p 可控世界生成</text>
  
  <!-- Center node -->
  <g transform="translate(700, 450)">
    <circle r="80" fill="#10b981" opacity="0.15"/>
    <circle r="60" fill="#10b981"/>
    <text y="-5" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, sans-serif" font-size="18" font-weight="800">SANA-WM</text>
    <text y="15" text-anchor="middle" fill="#0a0e1a" font-family="-apple-system, sans-serif" font-size="12" font-weight="600">World Model</text>
  </g>
  
  <!-- Branches -->
  
  <!-- 1. Architecture (top-left) -->
  <g stroke="#06b6d4" stroke-width="2" fill="none">
    <path d="M 640 410 Q 500 350 280 220"/>
  </g>
  <g transform="translate(280, 220)">
    <rect x="-120" y="-30" width="240" height="60" rx="10" fill="#0c4a6e" stroke="#06b6d4" stroke-width="2"/>
    <text y="-5" text-anchor="middle" fill="#22d3ee" font-family="-apple-system, sans-serif" font-size="16" font-weight="700">① 架构 Architecture</text>
    <text y="18" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="12">Hybrid Linear DiT</text>
  </g>
  <!-- 1.1 -->
  <g stroke="#06b6d4" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 280 250 L 100 320"/>
  </g>
  <g transform="translate(100, 340)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#082f49" stroke="#0891b2"/>
    <text y="-3" text-anchor="middle" fill="#67e8f9" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">Frame-wise GDN</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">15 层 · D×D state</text>
  </g>
  <g stroke="#06b6d4" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 280 250 L 100 410"/>
  </g>
  <g transform="translate(100, 430)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#082f49" stroke="#0891b2"/>
    <text y="-3" text-anchor="middle" fill="#67e8f9" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">Softmax Attention</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">每 4 层插 1 · 5 层共</text>
  </g>
  <g stroke="#06b6d4" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 280 250 L 100 500"/>
  </g>
  <g transform="translate(100, 520)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#082f49" stroke="#0891b2"/>
    <text y="-3" text-anchor="middle" fill="#67e8f9" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">Algebraic Stability</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">key 1/√(DS) 缩放</text>
  </g>
  
  <!-- 2. Camera Control (top-right) -->
