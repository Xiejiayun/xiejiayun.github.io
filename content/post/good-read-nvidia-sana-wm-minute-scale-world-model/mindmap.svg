    <text y="-5" text-anchor="middle" fill="#67e8f9" font-family="-apple-system, sans-serif" font-size="16" font-weight="700">⑥ 1-Min Benchmark</text>
    <text y="18" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system, sans-serif" font-size="12">80 init × Simple/Hard × Pose+VBench+Memory+ΔIQ</text>
  </g>
  
  <!-- Footer -->
  <text x="700" y="880" text-anchor="middle" fill="#475569" font-family="-apple-system, sans-serif" font-size="11">好文共赏 · xiejiayun.github.io · 2026-05-18</text>
</svg>
