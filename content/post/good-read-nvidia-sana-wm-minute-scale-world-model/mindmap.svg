    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">latent-frame 全局 pose</text>
  </g>
  <g stroke="#a855f7" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 1120 250 L 1300 410"/>
  </g>
  <g transform="translate(1300, 430)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#312e81" stroke="#7c3aed"/>
    <text y="-3" text-anchor="middle" fill="#c4b5fd" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">Plücker Mixing (细)</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">raw-frame 子帧补偿</text>
  </g>
  <g stroke="#a855f7" stroke-width="1.2" opacity="0.7" fill="none" stroke-dasharray="3,2">
    <path d="M 1120 250 L 1300 500"/>
  </g>
  <g transform="translate(1300, 520)">
    <rect x="-90" y="-25" width="180" height="50" rx="8" fill="#312e81" stroke="#7c3aed"/>
    <text y="-3" text-anchor="middle" fill="#c4b5fd" font-family="-apple-system, sans-serif" font-size="13" font-weight="600">RotErr 4.50°</text>
    <text y="15" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">vs 14B LingBot 10.47°</text>
  </g>
  
