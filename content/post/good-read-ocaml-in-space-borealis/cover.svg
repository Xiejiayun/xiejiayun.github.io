<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#0b1a2c"/>
      <stop offset="60%" stop-color="#06101c"/>
      <stop offset="100%" stop-color="#020610"/>
    </radialGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="240" cy="40" r="0.8"/>
    <circle cx="360" cy="120" r="1.6"/>
    <circle cx="500" cy="60" r="1.0"/>
    <circle cx="660" cy="100" r="1.2"/>
    <circle cx="820" cy="50" r="0.9"/>
    <circle cx="950" cy="140" r="1.5"/>
    <circle cx="1080" cy="80" r="1.1"/>
    <circle cx="80" cy="280" r="1.0"/>
    <circle cx="180" cy="430" r="0.9"/>
    <circle cx="320" cy="540" r="1.3"/>
    <circle cx="900" cy="500" r="1.4"/>
    <circle cx="1100" cy="380" r="1.0"/>
    <circle cx="1020" cy="260" r="1.1"/>
    <circle cx="60" cy="540" r="0.8"/>
    <circle cx="780" cy="420" r="0.9"/>
  </g>

  <!-- Earth -->
  <g transform="translate(120,470)">
    <circle r="160" fill="#0a3760" stroke="#1d4e85" stroke-width="2"/>
    <path d="M -120 -30 Q -60 -80 0 -50 T 120 -10" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
    <path d="M -100 30 Q -40 -10 40 20 T 130 30" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
    <ellipse rx="160" ry="40" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Orbit arc -->
  <path d="M 50 470 Q 600 -80 1150 470" fill="none" stroke="url(#orbit)" stroke-width="2" stroke-dasharray="6 6" opacity="0.7"/>

  <!-- Satellite -->
  <g transform="translate(720,130) rotate(-15)">
    <!-- solar panels -->
    <rect x="-90" y="-12" width="60" height="24" fill="#1e3a5f" stroke="#22d3ee" stroke-width="1"/>
    <rect x="30" y="-12" width="60" height="24" fill="#1e3a5f" stroke="#22d3ee" stroke-width="1"/>
    <!-- bus -->
    <rect x="-26" y="-22" width="52" height="44" fill="#1f2937" stroke="#f59e0b" stroke-width="2" rx="2"/>
    <rect x="-18" y="-14" width="36" height="28" fill="#0b1a2c"/>
    <!-- antenna -->
    <line x1="0" y1="-22" x2="0" y2="-40" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="-44" r="3" fill="#fef08a"/>
    <!-- camera lens -->
    <circle cx="0" cy="22" r="6" fill="#22d3ee" opacity="0.9"/>
  </g>

  <!-- Downlink beam -->
  <path d="M 720 152 L 320 470" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.55"/>
  <text x="560" y="310" fill="#22d3ee" font-family="ui-monospace,Menlo,monospace" font-size="14" opacity="0.85">BPv7 · BPSec · ML-DSA-65</text>

  <!-- Brand tag -->
  <g transform="translate(60,70)">
    <rect x="0" y="0" width="170" height="34" fill="#f59e0b" rx="4"/>
    <text x="14" y="23" fill="#1a1a1a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="800">好文共赏</text>
    <text x="100" y="23" fill="#1a1a1a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600">Editor's Pick</text>
  </g>

  <!-- Title -->
  <g transform="translate(60,170)" filter="url(#glow)">
    <text fill="url(#title)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,sans-serif" font-weight="900" font-size="56" letter-spacing="-1">
      <tspan x="0" y="0">O(x)Caml in Space</tspan>
    </text>
    <text fill="#e5e7eb" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
      <tspan x="0" y="56">Borealis：纯 OCaml 的</tspan>
      <tspan x="0" y="96">CCSDS 协议栈飞上轨道</tspan>
    </text>
  </g>

  <!-- Metrics card -->
  <g transform="translate(60,400)">
    <rect width="540" height="180" fill="#0f172a" stroke="#22d3ee" stroke-width="1" rx="10" opacity="0.92"/>
    <text x="20" y="34" fill="#22d3ee" font-family="ui-monospace,Menlo,monospace" font-size="14" font-weight="700">FLIGHT TELEMETRY · 2026-04-23 18:48:06 UTC</text>
    <g font-family="ui-monospace,Menlo,monospace" font-size="16" fill="#fef08a">
      <text x="20" y="68">p99.9 latency:    29 ns  →  9 ns   (OxCaml exclave_ stack_)</text>
      <text x="20" y="92">minor GCs:        394  →  0       (25 M packets)</text>
      <text x="20" y="116">flight binary:    5–10 MB        FROM scratch image</text>
      <text x="20" y="140">runtime:          Linux on Arm   Cortex-A53 ×4 / 4 GB</text>
      <text x="20" y="164">post-quantum:     ML-DSA-65      OTAR rekey ready</text>
    </g>
  </g>

  <!-- footer -->
  <text x="60" y="610" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14">
    深度导读 · Thomas Gazagnaire (Parsimoni · Tarides · MirageOS) · 2026-05-14
  </text>
</svg>
