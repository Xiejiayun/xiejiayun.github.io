<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08081a"/>
      <stop offset="1" stop-color="#161028"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- root -->
  <g transform="translate(700, 450)">
    <ellipse cx="0" cy="0" rx="160" ry="55" fill="#ff6a3d" fill-opacity="0.18" stroke="#ff6a3d" stroke-width="2"/>
    <text x="0" y="-6" font-size="18" fill="#ffd9c8" text-anchor="middle" font-weight="700">为什么 PSX 爆炸比</text>
    <text x="0" y="18" font-size="18" fill="#ffd9c8" text-anchor="middle" font-weight="700">N64 漂亮？</text>
  </g>

  <!-- branches -->
  <g stroke-width="2" fill="none" stroke-opacity="0.4">
    <path d="M540 450 Q 380 250, 280 180" stroke="#7adfff"/>
    <path d="M540 450 Q 380 450, 250 450" stroke="#7affc8"/>
    <path d="M540 450 Q 380 650, 280 720" stroke="#ffd28a"/>
    <path d="M860 450 Q 1020 250, 1120 180" stroke="#c890ff"/>
    <path d="M860 450 Q 1020 450, 1150 450" stroke="#ff8aa8"/>
    <path d="M860 450 Q 1020 650, 1120 720" stroke="#90ffa8"/>
  </g>

  <!-- Branch 1: PSX 的便宜 -->
  <g transform="translate(280, 180)">
    <rect x="-150" y="-50" width="300" height="100" rx="10" fill="#7adfff" fill-opacity="0.1" stroke="#7adfff" stroke-opacity="0.5"/>
    <text x="0" y="-20" font-size="14" fill="#bfecff" text-anchor="middle" font-weight="700">PSX 的硬件免费送</text>
    <text x="0" y="2" font-size="11" fill="#9accd8" text-anchor="middle">• saturating add (clamp 255)</text>
    <text x="0" y="20" font-size="11" fill="#9accd8" text-anchor="middle">• 单调性：叠加只会更亮</text>
    <text x="0" y="38" font-size="11" fill="#9accd8" text-anchor="middle">• 4 种固定混合模式</text>
  </g>

  <!-- Branch 2: N64 的坑 -->
  <g transform="translate(250, 450)">
    <rect x="-160" y="-60" width="320" height="120" rx="10" fill="#7affc8" fill-opacity="0.1" stroke="#7affc8" stroke-opacity="0.5"/>
    <text x="0" y="-28" font-size="14" fill="#beffe0" text-anchor="middle" font-weight="700">N64 RDP 的硬件 bug</text>
    <text x="0" y="-6" font-size="11" fill="#90d4b0" text-anchor="middle">• Color Combiner 可编程</text>
    <text x="0" y="12" font-size="11" fill="#90d4b0" text-anchor="middle">• 但不 clamp，wrap-around</text>
    <text x="0" y="30" font-size="11" fill="#90d4b0" text-anchor="middle">• B: 396 → 140，颜色反转</text>
    <text x="0" y="48" font-size="11" fill="#90d4b0" text-anchor="middle">• 整代开发者绕开 additive</text>
  </g>

  <!-- Branch 3: 工具链 -->
  <g transform="translate(280, 720)">
    <rect x="-160" y="-50" width="320" height="100" rx="10" fill="#ffd28a" fill-opacity="0.1" stroke="#ffd28a" stroke-opacity="0.5"/>
    <text x="0" y="-22" font-size="14" fill="#ffe9c0" text-anchor="middle" font-weight="700">2026 现代 N64 工具链</text>
    <text x="0" y="-2" font-size="11" fill="#d8b878" text-anchor="middle">• libdragon · 开源 SDK</text>
    <text x="0" y="16" font-size="11" fill="#d8b878" text-anchor="middle">• RSPL · C-like 微码</text>
    <text x="0" y="34" font-size="11" fill="#d8b878" text-anchor="middle">• N64Brew · 全球社区</text>
  </g>

  <!-- Branch 4: phoboslab hack -->
  <g transform="translate(1120, 180)">
    <rect x="-160" y="-60" width="320" height="120" rx="10" fill="#c890ff" fill-opacity="0.1" stroke="#c890ff" stroke-opacity="0.5"/>
    <text x="0" y="-28" font-size="14" fill="#e0c8ff" text-anchor="middle" font-weight="700">三步管线 hack</text>
    <text x="0" y="-6" font-size="11" fill="#b090d8" text-anchor="middle">1) 渲染到 32-bit 临时画布</text>
    <text x="0" y="12" font-size="11" fill="#b090d8" text-anchor="middle">2) 借 fog_alpha 做 1/8 缩放</text>
    <text x="0" y="30" font-size="11" fill="#b090d8" text-anchor="middle">3) RSP 微码 shuffle 回 16-bit</text>
    <text x="0" y="48" font-size="11" fill="#b090d8" text-anchor="middle">→ 70 ms → 3.1 ms · 23×</text>
  </g>

  <!-- Branch 5: HDR 副产品 -->
  <g transform="translate(1150, 450)">
    <rect x="-160" y="-50" width="320" height="100" rx="10" fill="#ff8aa8" fill-opacity="0.1" stroke="#ff8aa8" stroke-opacity="0.5"/>
    <text x="0" y="-22" font-size="14" fill="#ffc4d4" text-anchor="middle" font-weight="700">意外副产品：N64 HDR</text>
    <text x="0" y="-2" font-size="11" fill="#d08aa0" text-anchor="middle">• 32-bit 中间 = 高动态范围</text>
    <text x="0" y="16" font-size="11" fill="#d08aa0" text-anchor="middle">• 1/8 + clamp = tone mapping</text>
    <text x="0" y="34" font-size="11" fill="#d08aa0" text-anchor="middle">• Tiny3D 已用此做 Bloom</text>
  </g>

  <!-- Branch 6: 元教训 -->
  <g transform="translate(1120, 720)">
    <rect x="-170" y="-60" width="340" height="120" rx="10" fill="#90ffa8" fill-opacity="0.1" stroke="#90ffa8" stroke-opacity="0.5"/>
    <text x="0" y="-28" font-size="14" fill="#c8ffd4" text-anchor="middle" font-weight="700">架构教训</text>
    <text x="0" y="-6" font-size="11" fill="#a0d0b0" text-anchor="middle">可编程性 ≠ 默认正确性</text>
    <text x="0" y="12" font-size="11" fill="#a0d0b0" text-anchor="middle">PSX 不可配置但永远对</text>
    <text x="0" y="30" font-size="11" fill="#a0d0b0" text-anchor="middle">N64 可配置但默认坑</text>
    <text x="0" y="48" font-size="11" fill="#a0d0b0" text-anchor="middle">→ C / k8s / LLM API 同律</text>
  </g>

  <!-- title -->
  <text x="700" y="50" font-size="22" fill="#f5f5fa" text-anchor="middle" font-weight="700">PSX 爆炸 vs N64 爆炸 · 思维导图</text>
  <text x="700" y="78" font-size="13" fill="#8a90b8" text-anchor="middle">phoboslab.org · Additive Blending on the Nintendo 64 · 2026-05-04</text>
  <text x="700" y="860" font-size="12" fill="#5a5f80" text-anchor="middle">xiejiayun.github.io · 好文共赏</text>
</svg>
