<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a18"/>
      <stop offset="55%" stop-color="#13112a"/>
      <stop offset="100%" stop-color="#1c1735"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.82" cy="0.18" r="0.55">
      <stop offset="0%" stop-color="#f5d27a" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f5d27a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#lamp)"/>

  <!-- horizontal frame -->
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#3a3260" stroke-width="1.5" rx="6"/>
  <rect x="74" y="74" width="1052" height="482" fill="none" stroke="#2a2447" stroke-width="1" rx="3"/>

  <!-- top label: 好文共赏 -->
  <g transform="translate(94,118)">
    <rect x="-4" y="-30" width="172" height="44" fill="#f5d27a" rx="3"/>
    <text x="80" y="2" font-family="Noto Sans CJK SC, sans-serif" font-size="22" font-weight="700" fill="#0c0a18" text-anchor="middle">好文共赏</text>
    <text x="186" y="0" font-family="Georgia, serif" font-size="18" fill="#bdb3e0" font-style="italic">/ Editor's Pick · 2026-05-18</text>
  </g>

  <!-- main title (CN) -->
  <g transform="translate(94,225)">
    <text x="0" y="0" font-family="Noto Serif CJK SC, serif" font-size="56" font-weight="700" fill="#f6f3ff" letter-spacing="2">禁欲计算</text>
    <text x="0" y="76" font-family="Georgia, serif" font-size="38" fill="#bda6f0" font-style="italic">Ascetic Computing</text>
  </g>

  <!-- subtitle -->
  <g transform="translate(94,395)">
    <text x="0" y="0" font-family="Noto Sans CJK SC, sans-serif" font-size="22" fill="#cabfee">
      Dave Gauer 把 Thoreau / Flaubert / Lindy 拼进一份配置文件
    </text>
    <text x="0" y="36" font-family="Noto Sans CJK SC, sans-serif" font-size="22" fill="#cabfee">
      为了禁欲，他给那一行配置写下：「我选择不要这一行」
    </text>
  </g>

  <!-- code comment line -->
  <g transform="translate(94,485)" font-family="JetBrains Mono, Menlo, monospace">
    <rect x="-2" y="-22" width="980" height="36" fill="#16142e" stroke="#3a3260" stroke-width="1" rx="4"/>
    <text x="14" y="2" font-size="18" fill="#8d80c3"># </text>
    <text x="36" y="2" font-size="18" fill="#e6dfff">I opted to do without this for </text>
    <text x="332" y="2" font-size="18" fill="#f5d27a" font-style="italic">ascetic</text>
    <text x="408" y="2" font-size="18" fill="#e6dfff"> reasons.</text>
  </g>

  <!-- tags -->
  <g transform="translate(94,538)" font-family="Noto Sans CJK SC, sans-serif" font-size="15">
    <rect x="0" y="-18" width="86" height="26" fill="none" stroke="#7c6cc4" rx="13"/>
    <text x="43" y="-1" fill="#cabfee" text-anchor="middle">Lindy 效应</text>
    <rect x="96" y="-18" width="86" height="26" fill="none" stroke="#7c6cc4" rx="13"/>
    <text x="139" y="-1" fill="#cabfee" text-anchor="middle">注意力主权</text>
    <rect x="192" y="-18" width="86" height="26" fill="none" stroke="#7c6cc4" rx="13"/>
    <text x="235" y="-1" fill="#cabfee" text-anchor="middle">OpenBSD/vim</text>
    <rect x="288" y="-18" width="86" height="26" fill="none" stroke="#7c6cc4" rx="13"/>
    <text x="331" y="-1" fill="#cabfee" text-anchor="middle">反 FOMO</text>
    <rect x="384" y="-18" width="110" height="26" fill="none" stroke="#7c6cc4" rx="13"/>
    <text x="439" y="-1" fill="#cabfee" text-anchor="middle">约束 = 创造力</text>
  </g>

  <!-- right side decorative geyser/garden glyph -->
  <g transform="translate(960,260)" fill="none" stroke="#7c6cc4" stroke-width="1.4" opacity="0.85">
    <!-- garden of dormant computers -->
    <rect x="-60" y="-60" width="48" height="36" rx="3"/>
    <rect x="-4" y="-60" width="48" height="36" rx="3"/>
    <rect x="52" y="-60" width="48" height="36" rx="3"/>
    <rect x="-60" y="-12" width="48" height="36" rx="3"/>
    <rect x="-4" y="-12" width="48" height="36" rx="3" stroke="#f5d27a"/>
    <circle cx="20" cy="6" r="3" fill="#f5d27a" stroke="none"/>
    <rect x="52" y="-12" width="48" height="36" rx="3"/>
    <rect x="-60" y="36" width="48" height="36" rx="3"/>
    <rect x="-4" y="36" width="48" height="36" rx="3"/>
    <rect x="52" y="36" width="48" height="36" rx="3"/>
    <text x="20" y="100" font-family="Noto Sans CJK SC, sans-serif" font-size="13" fill="#7c6cc4" text-anchor="middle" stroke="none">休眠中的园圃</text>
    <text x="20" y="118" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#7c6cc4" text-anchor="middle" stroke="none">electronic garden</text>
  </g>

  <!-- byline -->
  <text x="1140" y="586" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#7c6cc4" text-anchor="end">
    原文：ratfactor.com · 评分 8.7/10 · 综合多模评审
  </text>
</svg>
