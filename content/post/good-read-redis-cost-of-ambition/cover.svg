<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#5a1f1f"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#dc382c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#dc382c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Red glow behind pendulum -->
  <circle cx="600" cy="380" r="220" fill="url(#redGlow)"/>

  <!-- Top label -->
  <text x="80" y="80" font-family="ui-serif,Georgia,serif" font-size="22" fill="#9ca3af" letter-spacing="3">好文共赏 · EDITOR'S PICK</text>
  <line x1="80" y1="100" x2="280" y2="100" stroke="#dc382c" stroke-width="2"/>

  <!-- Title -->
  <text x="80" y="170" font-family="ui-sans-serif,system-ui,sans-serif" font-size="56" font-weight="800" fill="#f3f4f6">Redis 的野心代价</text>
  <text x="80" y="225" font-family="ui-sans-serif,system-ui,sans-serif" font-size="26" font-weight="500" fill="#d1d5db">当一个"远程字典服务器"想成为一切，</text>
  <text x="80" y="262" font-family="ui-sans-serif,system-ui,sans-serif" font-size="26" font-weight="500" fill="#d1d5db">它就什么都不是了</text>

  <!-- Pendulum diagram - overloaded swing -->
  <g transform="translate(600,300)">
    <!-- ceiling -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#4b5563" stroke-width="3"/>
    <!-- pivot -->
    <circle cx="0" cy="0" r="6" fill="#9ca3af"/>
    <!-- rope -->
    <line x1="0" y1="0" x2="120" y2="180" stroke="#6b7280" stroke-width="2"/>
    <!-- weight (overloaded with labels) -->
    <g transform="translate(120,180)">
      <circle cx="0" cy="0" r="58" fill="#dc382c" opacity="0.85"/>
      <circle cx="0" cy="0" r="58" fill="none" stroke="#fca5a5" stroke-width="2"/>
      <text x="0" y="-22" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#fff" font-weight="700">JSON · Streams</text>
      <text x="0" y="-6" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#fff" font-weight="700">Search · Graph</text>
      <text x="0" y="10" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#fff" font-weight="700">TimeSeries</text>
      <text x="0" y="26" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#fff" font-weight="700">Vector · AI</text>
      <text x="0" y="42" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#fff" font-weight="700">RESP3 · Raft</text>
    </g>
    <!-- shadow alt pendulum (where it should be) -->
    <line x1="0" y1="0" x2="-100" y2="190" stroke="#4b5563" stroke-width="2" stroke-dasharray="4,4"/>
    <g transform="translate(-100,190)" opacity="0.7">
      <circle cx="0" cy="0" r="36" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="3,3"/>
      <text x="0" y="-4" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#9ca3af" font-weight="600">Valkey</text>
      <text x="0" y="12" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="11" fill="#9ca3af" font-weight="600">2011 Redis</text>
    </g>
  </g>

  <!-- Bottom byline -->
  <text x="80" y="555" font-family="ui-sans-serif,system-ui" font-size="20" fill="#9ca3af">Charles Leifer · 2026-05-12 · charlesleifer.com</text>
  <text x="80" y="585" font-family="ui-sans-serif,system-ui" font-size="16" fill="#6b7280">Opus 9.0 / Sonnet 8.5 / Gemini 8.7 · 综合 8.7/10</text>

  <!-- Right keyword tags -->
  <g font-family="ui-sans-serif,system-ui" font-size="14" fill="#d1d5db">
    <rect x="930" y="540" width="100" height="28" rx="14" fill="#1f2937" stroke="#374151"/>
    <text x="980" y="559" text-anchor="middle">系统设计</text>
    <rect x="1040" y="540" width="100" height="28" rx="14" fill="#1f2937" stroke="#374151"/>
    <text x="1090" y="559" text-anchor="middle">开源治理</text>
    <rect x="930" y="575" width="100" height="28" rx="14" fill="#1f2937" stroke="#374151"/>
    <text x="980" y="594" text-anchor="middle">Redis</text>
    <rect x="1040" y="575" width="100" height="28" rx="14" fill="#1f2937" stroke="#374151"/>
    <text x="1090" y="594" text-anchor="middle">Valkey</text>
  </g>
</svg>
