<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#02050d"/>
      <stop offset="35%" stop-color="#0c1e3e"/>
      <stop offset="60%" stop-color="#3b3157"/>
      <stop offset="78%" stop-color="#a7536a"/>
      <stop offset="90%" stop-color="#f0a37d"/>
      <stop offset="100%" stop-color="#fbe1bb"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff5d6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffd194" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8a3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planetGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#85b3ff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#a2c8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#dde9ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.65">
    <circle cx="60"  cy="40"  r="1.1"/>
    <circle cx="140" cy="90"  r="0.8"/>
    <circle cx="240" cy="40"  r="1.3"/>
    <circle cx="320" cy="120" r="0.7"/>
    <circle cx="430" cy="60"  r="1.0"/>
    <circle cx="540" cy="100" r="0.9"/>
    <circle cx="640" cy="35"  r="1.2"/>
    <circle cx="760" cy="80"  r="0.7"/>
    <circle cx="880" cy="50"  r="1.0"/>
    <circle cx="990" cy="110" r="0.9"/>
    <circle cx="1100" cy="55" r="1.1"/>
    <circle cx="80"  cy="180" r="0.6"/>
    <circle cx="380" cy="200" r="0.7"/>
    <circle cx="700" cy="170" r="0.6"/>
    <circle cx="1050" cy="200" r="0.8"/>
  </g>

  <!-- sun glow -->
  <ellipse cx="900" cy="490" rx="280" ry="180" fill="url(#sun)"/>
  <circle cx="900" cy="490" r="40" fill="#fff7df"/>

  <!-- atmosphere arc around planet -->
  <g transform="translate(0,160)">
    <ellipse cx="600" cy="700" rx="780" ry="110" fill="url(#planetGlow)" filter="url(#blur1)"/>
    <ellipse cx="600" cy="710" rx="760" ry="80" fill="#dceaff" opacity="0.18"/>
  </g>

  <!-- planet shell -->
  <path d="M -200 630 Q 600 470 1400 630 L 1400 700 L -200 700 Z" fill="#0a1227"/>
  <path d="M -200 632 Q 600 472 1400 632 L 1400 700 L -200 700 Z" fill="none" stroke="#3b5d99" stroke-width="1.5" opacity="0.5"/>

  <!-- title bar -->
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Helvetica,Arial" fill="#ffffff">
    <text x="60" y="220" font-size="34" font-weight="300" letter-spacing="6" opacity="0.85">好 文 共 赏</text>
    <text x="60" y="245" font-size="15" font-weight="300" letter-spacing="3" fill="#dde9ff" opacity="0.75">EDITOR'S PICK · 2026-05-14</text>

    <text x="60" y="335" font-size="52" font-weight="700">把天空写进 GPU</text>
    <text x="60" y="395" font-size="26" font-weight="400" fill="#e7ddff" opacity="0.95">Maxime Heckel 的大气散射 Shader 一万字深读</text>

    <text x="60" y="465" font-size="16" font-weight="400" fill="#fbe1bb" opacity="0.8">Rayleigh · Mie · Ozone · Raymarching · LUT · WebGL</text>
    <text x="60" y="492" font-size="14" font-weight="300" fill="#dde9ff" opacity="0.7">多模评分 9.13 / 10  ·  Opus 9.3 · Sonnet 9.0 · Gemini 9.1</text>
  </g>

  <!-- subtle frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#7991c4" stroke-width="0.5" opacity="0.25"/>
</svg>
