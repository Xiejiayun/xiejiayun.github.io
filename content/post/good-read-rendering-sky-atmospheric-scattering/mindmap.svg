<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1230"/>
      <stop offset="100%" stop-color="#06091c"/>
    </linearGradient>
    <style>
      .root  { fill:#1a2451; stroke:#7fa1ff; stroke-width:2; }
      .b1    { fill:#1f2d4a; stroke:#5fb6ff; stroke-width:1.5; }
      .b2    { fill:#2a2046; stroke:#e08ffa; stroke-width:1.5; }
      .b3    { fill:#382034; stroke:#ff8aaa; stroke-width:1.5; }
      .b4    { fill:#1f3835; stroke:#5ee5b8; stroke-width:1.5; }
      .b5    { fill:#38311c; stroke:#ffc46d; stroke-width:1.5; }
      .leaf  { fill:#0e1837; stroke-width:1; }
      .l1    { stroke:#5fb6ff; }
      .l2    { stroke:#e08ffa; }
      .l3    { stroke:#ff8aaa; }
      .l4    { stroke:#5ee5b8; }
      .l5    { stroke:#ffc46d; }
      text   { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",Helvetica,Arial; fill:#ffffff; }
      .ttl   { font-size:20px; font-weight:700; }
      .sub   { font-size:14px; font-weight:600; }
      .li    { font-size:12px; }
      .cap   { font-size:24px; font-weight:700; letter-spacing:4px; opacity:0.85; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>
  <text x="50" y="60" class="cap">RENDERING THE SKY · 思维导图</text>
  <text x="50" y="86" style="font-size:14px;fill:#9bb3ff;opacity:0.75">Maxime Heckel · 2026-05-12 · blog.maximeheckel.com</text>

  <!-- root -->
  <ellipse cx="800" cy="550" rx="170" ry="60" class="root"/>
  <text x="800" y="540" text-anchor="middle" class="ttl">大气散射渲染</text>
  <text x="800" y="565" text-anchor="middle" class="sub">Atmospheric Scattering</text>
  <text x="800" y="585" text-anchor="middle" class="li" style="fill:#9bb3ff">Raymarching + 物理光学 + GPU</text>

  <!-- branch 1: 物理基础 -->
  <line x1="640" y1="500" x2="320" y2="240" class="l1" stroke-width="2.5"/>
  <rect x="180" y="190" width="280" height="80" rx="14" class="b1"/>
  <text x="320" y="220" text-anchor="middle" class="sub" style="fill:#5fb6ff">① 物理基础</text>
  <text x="320" y="245" text-anchor="middle" class="li">光与大气体积的相互作用</text>
  <text x="320" y="262" text-anchor="middle" class="li" style="fill:#9bb3ff">Beer's Law · Optical Depth</text>

  <g class="l1">
    <line x1="320" y1="270" x2="220" y2="330" stroke-width="1.2"/>
    <line x1="320" y1="270" x2="320" y2="345" stroke-width="1.2"/>
    <line x1="320" y1="270" x2="420" y2="330" stroke-width="1.2"/>
  </g>
  <rect x="100" y="320" width="240" height="44" rx="8" class="leaf l1"/>
  <text x="220" y="346" text-anchor="middle" class="li">Rayleigh：蓝光散射最强</text>
  <rect x="200" y="350" width="240" height="44" rx="8" class="leaf l1"/>
  <text x="320" y="376" text-anchor="middle" class="li">Mie：粉尘前向散射，夕阳光晕</text>
  <rect x="300" y="320" width="240" height="44" rx="8" class="leaf l1"/>
  <text x="420" y="346" text-anchor="middle" class="li">Ozone：选择性吸收绿光</text>

  <!-- branch 2: 算法骨架 -->
  <line x1="640" y1="555" x2="280" y2="555" class="l2" stroke-width="2.5"/>
  <rect x="60" y="510" width="220" height="90" rx="14" class="b2"/>
  <text x="170" y="540" text-anchor="middle" class="sub" style="fill:#e08ffa">② 算法骨架</text>
  <text x="170" y="565" text-anchor="middle" class="li">Raymarching 体积采样</text>
  <text x="170" y="585" text-anchor="middle" class="li" style="fill:#9bb3ff">Optical depth + Phase fn</text>

  <g class="l2">
    <line x1="170" y1="600" x2="100" y2="660" stroke-width="1.2"/>
    <line x1="170" y1="600" x2="170" y2="660" stroke-width="1.2"/>
    <line x1="170" y1="600" x2="240" y2="660" stroke-width="1.2"/>
  </g>
  <rect x="-10" y="660" width="220" height="44" rx="8" class="leaf l2"/>
  <text x="100" y="686" text-anchor="middle" class="li">PRIMARY_STEPS 主循环</text>
  <rect x="60" y="710" width="220" height="44" rx="8" class="leaf l2"/>
  <text x="170" y="736" text-anchor="middle" class="li">LIGHTMARCH 嵌套向太阳</text>
  <rect x="130" y="660" width="220" height="44" rx="8" class="leaf l2"/>
  <text x="240" y="686" text-anchor="middle" class="li">ACES Tone Mapping 后期</text>

  <!-- branch 3: 工程整合 -->
  <line x1="800" y1="610" x2="800" y2="900" class="l3" stroke-width="2.5"/>
  <rect x="660" y="900" width="280" height="80" rx="14" class="b3"/>
  <text x="800" y="930" text-anchor="middle" class="sub" style="fill:#ff8aaa">③ 工程整合</text>
  <text x="800" y="955" text-anchor="middle" class="li">React Three Fiber 后处理</text>
  <text x="800" y="972" text-anchor="middle" class="li" style="fill:#ffb3c6">屏幕空间 → 世界空间</text>

  <g class="l3">
    <line x1="800" y1="980" x2="660" y2="1040" stroke-width="1.2"/>
    <line x1="800" y1="980" x2="800" y2="1055" stroke-width="1.2"/>
    <line x1="800" y1="980" x2="940" y2="1040" stroke-width="1.2"/>
  </g>
  <rect x="540" y="1030" width="240" height="44" rx="8" class="leaf l3"/>
  <text x="660" y="1056" text-anchor="middle" class="li">Depth Buffer 限定 rayEnd</text>
  <rect x="680" y="1060" width="240" height="44" rx="8" class="leaf l3"/>
  <text x="800" y="1086" text-anchor="middle" class="li">Logarithmic Depth Buffer</text>
  <rect x="820" y="1030" width="240" height="44" rx="8" class="leaf l3"/>
  <text x="940" y="1056" text-anchor="middle" class="li">Aerial Perspective 空气透视</text>

  <!-- branch 4: 行星 & 几何 -->
  <line x1="960" y1="500" x2="1280" y2="240" class="l4" stroke-width="2.5"/>
  <rect x="1140" y="190" width="280" height="80" rx="14" class="b4"/>
  <text x="1280" y="220" text-anchor="middle" class="sub" style="fill:#5ee5b8">④ 行星尺度</text>
  <text x="1280" y="245" text-anchor="middle" class="li">球壳大气 + raySphereIntersect</text>
  <text x="1280" y="262" text-anchor="middle" class="li" style="fill:#9ce8d0">从地表到轨道连续过渡</text>

  <g class="l4">
    <line x1="1280" y1="270" x2="1180" y2="330" stroke-width="1.2"/>
    <line x1="1280" y1="270" x2="1280" y2="345" stroke-width="1.2"/>
    <line x1="1280" y1="270" x2="1380" y2="330" stroke-width="1.2"/>
  </g>
  <rect x="1060" y="320" width="240" height="44" rx="8" class="leaf l4"/>
  <text x="1180" y="346" text-anchor="middle" class="li">两次球体相交（行星 + 大气）</text>
  <rect x="1160" y="350" width="240" height="44" rx="8" class="leaf l4"/>
  <text x="1280" y="376" text-anchor="middle" class="li">日食：角度判定 sunVisibility</text>
  <rect x="1260" y="320" width="240" height="44" rx="8" class="leaf l4"/>
  <text x="1380" y="346" text-anchor="middle" class="li">换 9 个常数 = 火星天空</text>

  <!-- branch 5: LUT 优化 -->
  <line x1="960" y1="555" x2="1320" y2="555" class="l5" stroke-width="2.5"/>
  <rect x="1320" y="510" width="240" height="90" rx="14" class="b5"/>
  <text x="1440" y="540" text-anchor="middle" class="sub" style="fill:#ffc46d">⑤ LUT 流水线</text>
  <text x="1440" y="565" text-anchor="middle" class="li">Sébastien Hillaire 2020</text>
  <text x="1440" y="585" text-anchor="middle" class="li" style="fill:#ffe1ad">嵌套 march → 纹理查找</text>

  <g class="l5">
    <line x1="1440" y1="600" x2="1370" y2="660" stroke-width="1.2"/>
    <line x1="1440" y1="600" x2="1440" y2="660" stroke-width="1.2"/>
    <line x1="1440" y1="600" x2="1510" y2="660" stroke-width="1.2"/>
  </g>
  <rect x="1260" y="660" width="220" height="44" rx="8" class="leaf l5"/>
  <text x="1370" y="686" text-anchor="middle" class="li">Transmittance LUT 250×64</text>
  <rect x="1330" y="710" width="220" height="44" rx="8" class="leaf l5"/>
  <text x="1440" y="736" text-anchor="middle" class="li">Sky-View LUT 天空背景</text>
  <rect x="1400" y="660" width="220" height="44" rx="8" class="leaf l5"/>
  <text x="1510" y="686" text-anchor="middle" class="li">Aerial Perspective LUT</text>

  <!-- footer note -->
  <text x="50" y="1070" style="font-size:12px;fill:#7d92c4;opacity:0.6">基于 Maxime Heckel "On Rendering the Sky, Sunsets, and Planets" 重新整理 · 仅供学习参考</text>
</svg>
