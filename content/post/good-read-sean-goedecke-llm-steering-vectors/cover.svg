<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1c"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="vec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- diagonal grid -->
  <g opacity="0.07" stroke="#94a3b8" stroke-width="1">
    <path d="M0,80 L1200,-50"/>
    <path d="M0,180 L1200,50"/>
    <path d="M0,280 L1200,150"/>
    <path d="M0,380 L1200,250"/>
    <path d="M0,480 L1200,350"/>
    <path d="M0,580 L1200,450"/>
    <path d="M0,680 L1200,550"/>
  </g>

  <!-- top label -->
  <rect x="60" y="50" width="220" height="40" rx="20" fill="#f59e0b" opacity="0.18" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="170" y="77" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#fbbf24">好文共赏 · Editor's Pick</text>

  <!-- title -->
  <text x="60" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">把"金门大桥 Claude"</text>
  <text x="60" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">的开关递给你</text>

  <!-- subtitle -->
  <text x="60" y="300" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Sean Goedecke 谈：DeepSeek V4 Flash 之后，</text>
  <text x="60" y="335" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">LLM Steering 为什么重新有趣了</text>

  <!-- bottom layered "activations" -->
  <g transform="translate(60,420)" filter="url(#glow)">
    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#22d3ee">
      <text x="0" y="0">layer 24  ──  +0.32  ▍▍▍▍▍▍▍▍▍▍▍▎</text>
      <text x="0" y="22">layer 25  ──  +0.41  ▍▍▍▍▍▍▍▍▍▍▍▍▍▍</text>
      <text x="0" y="44">layer 26  ──  +0.78  ▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍</text>
      <text x="0" y="66">layer 27  ──  +0.55  ▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍▍</text>
      <text x="0" y="88">layer 28  ──  +0.21  ▍▍▍▍▍▍▍</text>
    </g>
  </g>

  <!-- right-side dial -->
  <g transform="translate(990,330)">
    <circle r="115" fill="none" stroke="#334155" stroke-width="14"/>
    <circle r="115" fill="none" stroke="url(#gold)" stroke-width="14"
            stroke-dasharray="540 800" transform="rotate(-220)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="ui-sans-serif" font-size="18" fill="#94a3b8">verbosity</text>
    <text x="0" y="30" text-anchor="middle" font-family="ui-sans-serif" font-size="48" font-weight="800" fill="#fbbf24">+0.78</text>
    <text x="0" y="60" text-anchor="middle" font-family="ui-sans-serif" font-size="14" fill="#94a3b8">steering vector</text>
  </g>

  <!-- footer -->
  <text x="60" y="585" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#64748b">seangoedecke.com · 2026-05-16  ·  导读 by xiejiayun.github.io</text>
</svg>
