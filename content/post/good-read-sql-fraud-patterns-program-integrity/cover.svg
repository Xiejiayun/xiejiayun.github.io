<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16223b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- grid -->
  <g opacity="0.08" stroke="#5eead4" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- tag pill -->
  <g transform="translate(60,60)">
    <rect width="180" height="40" rx="20" fill="#5eead4" opacity="0.15" stroke="#5eead4" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5eead4" letter-spacing="2">好文共赏</text>
  </g>

  <!-- title -->
  <g transform="translate(60,150)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">SQL 才是反欺诈的母语</text>
    <text x="0" y="76" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">六张窗口函数，一颗 haversine</text>
    <text x="0" y="116" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">一条滚动均线 = 一个反欺诈最小可行架构</text>
  </g>

  <!-- six patterns -->
  <g transform="translate(60,360)" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="18" fill="#e2e8f0">
    <g>
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
      <text x="85" y="28" text-anchor="middle" fill="#5eead4" font-weight="700">1. Velocity</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">速率</text>
    </g>
    <g transform="translate(190,0)">
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
      <text x="85" y="28" text-anchor="middle" fill="#60a5fa" font-weight="700">2. Travel</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">不可能行程</text>
    </g>
    <g transform="translate(380,0)">
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
      <text x="85" y="28" text-anchor="middle" fill="#5eead4" font-weight="700">3. Amount</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">金额异常</text>
    </g>
    <g transform="translate(570,0)">
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
      <text x="85" y="28" text-anchor="middle" fill="#60a5fa" font-weight="700">4. Merchant</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">商户异常</text>
    </g>
    <g transform="translate(760,0)">
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
      <text x="85" y="28" text-anchor="middle" fill="#5eead4" font-weight="700">5. Off-hours</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">时段异常</text>
    </g>
    <g transform="translate(950,0)">
      <rect x="0" y="0" width="170" height="60" rx="10" fill="#1e293b" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>
      <text x="85" y="28" text-anchor="middle" fill="#fbbf24" font-weight="700">6. Windows</text>
      <text x="85" y="48" text-anchor="middle" fill="#94a3b8" font-size="12">装弹床</text>
    </g>
  </g>

  <!-- SQL snippet -->
  <g transform="translate(60,460)" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="14" fill="#5eead4" opacity="0.7">
    <text x="0" y="0">SELECT cardholder_id, count(*) OVER (</text>
    <text x="20" y="22">PARTITION BY cardholder_id ORDER BY ts</text>
    <text x="20" y="44">RANGE BETWEEN INTERVAL '5 minutes' PRECEDING AND CURRENT ROW</text>
    <text x="0" y="66">) AS tx_in_last_5min  --  HN 319pts / Fixel Smith / 2026-05</text>
  </g>

  <!-- bottom branding -->
  <g transform="translate(60,580)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#94a3b8">analytics.fixelsmith.com · Six SQL patterns I use to catch transaction fraud</text>
  </g>
  <g transform="translate(1140,580)" text-anchor="end">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#5eead4">xiejiayun.github.io</text>
  </g>
</svg>
