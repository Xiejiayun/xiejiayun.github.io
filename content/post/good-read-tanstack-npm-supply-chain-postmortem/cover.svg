<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="好文共赏：TanStack npm 供应链事件复盘">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.45">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- header label -->
  <g transform="translate(70, 70)">
    <rect x="0" y="0" width="200" height="34" rx="17" fill="#1f2937" stroke="#facc15" stroke-width="1.5"/>
    <text x="100" y="22" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#facc15" text-anchor="middle" font-weight="600">📚 好文共赏</text>
  </g>

  <!-- title -->
  <text x="70" y="180" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="44" fill="#f3f4f6" font-weight="700">TanStack npm 投毒事件复盘</text>
  <text x="70" y="232" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#9ca3af" font-weight="400">三条独立漏洞如何被串成一条供应链刀锋</text>

  <!-- horizontal accent line -->
  <line x1="70" y1="260" x2="430" y2="260" stroke="url(#redline)" stroke-width="4"/>

  <!-- three blades -->
  <g transform="translate(70, 305)" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" filter="url(#glow)">
    <g>
      <circle cx="20" cy="20" r="20" fill="#ef4444"/>
      <text x="20" y="27" font-size="20" fill="#0d1117" text-anchor="middle" font-weight="800">1</text>
      <text x="55" y="16" font-size="20" fill="#fca5a5" font-weight="600">pull_request_target</text>
      <text x="55" y="38" font-size="15" fill="#9ca3af">Pwn Request：fork 代码在 base 上下文执行</text>
    </g>
    <g transform="translate(0, 70)">
      <circle cx="20" cy="20" r="20" fill="#f97316"/>
      <text x="20" y="27" font-size="20" fill="#0d1117" text-anchor="middle" font-weight="800">2</text>
      <text x="55" y="16" font-size="20" fill="#fdba74" font-weight="600">GHA Cache Poisoning</text>
      <text x="55" y="38" font-size="15" fill="#9ca3af">fork↔base 信任边界共享的依赖缓存被预测投毒</text>
    </g>
    <g transform="translate(0, 140)">
      <circle cx="20" cy="20" r="20" fill="#facc15"/>
      <text x="20" y="27" font-size="20" fill="#0d1117" text-anchor="middle" font-weight="800">3</text>
      <text x="55" y="16" font-size="20" fill="#fde68a" font-weight="600">OIDC Token Memory Extraction</text>
      <text x="55" y="38" font-size="15" fill="#9ca3af">从 Runner.Worker 内存抠 token，绕过 publish step</text>
    </g>
  </g>

  <!-- right info card -->
  <g transform="translate(770, 305)">
    <rect x="0" y="0" width="360" height="245" rx="12" fill="#0b1220" stroke="#374151" stroke-width="1"/>
    <text x="20" y="34" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9ca3af">EVENT</text>
    <text x="20" y="58" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="18" fill="#f3f4f6" font-weight="600">42 packages · 84 versions</text>
    <text x="20" y="78" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="14" fill="#9ca3af">2026-05-11 19:20–19:26 UTC</text>

    <line x1="20" y1="98" x2="340" y2="98" stroke="#1f2937"/>

    <text x="20" y="124" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9ca3af">DETECTION</text>
    <text x="20" y="148" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="18" fill="#f3f4f6" font-weight="600">~20 min by external researcher</text>
    <text x="20" y="168" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="14" fill="#9ca3af">StepSecurity · ashishkurmi</text>

    <line x1="20" y1="188" x2="340" y2="188" stroke="#1f2937"/>

    <text x="20" y="214" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9ca3af">POSTMORTEM</text>
    <text x="20" y="234" font-family="-apple-system, 'PingFang SC', sans-serif" font-size="14" fill="#facc15">published &lt;24h after incident</text>
  </g>

  <!-- footer line -->
  <line x1="70" y1="580" x2="1130" y2="580" stroke="#1f2937" stroke-width="1"/>
  <text x="70" y="610" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#6b7280">
    tanstack.com / blog / npm-supply-chain-compromise-postmortem · 多模评分 9.20/10
  </text>
</svg>
