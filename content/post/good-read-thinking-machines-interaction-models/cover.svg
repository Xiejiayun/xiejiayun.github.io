<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#101635"/>
      <stop offset="100%" stop-color="#1a1148"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="streamA" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="streamB" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M0 90 L1200 90 M0 180 L1200 180 M0 270 L1200 270 M0 360 L1200 360 M0 450 L1200 450 M0 540 L1200 540"/>
    <path d="M100 0 L100 630 M250 0 L250 630 M400 0 L400 630 M550 0 L550 630 M700 0 L700 630 M850 0 L850 630 M1000 0 L1000 630 M1150 0 L1150 630"/>
  </g>

  <!-- 200ms micro-turn stream visualization -->
  <g filter="url(#glow)">
    <!-- user stream (cyan) - chunky 200ms blocks -->
    <g>
      <rect x="60" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.85"/>
      <rect x="108" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.7"/>
      <rect x="156" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.9"/>
      <rect x="204" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.55"/>
      <rect x="252" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.85"/>
      <rect x="300" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.4"/>
      <rect x="348" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.7"/>
      <rect x="396" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.85"/>
      <rect x="444" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.6"/>
      <rect x="492" y="195" width="40" height="22" rx="3" fill="#22d3ee" opacity="0.9"/>
    </g>
    <!-- model stream (purple) - micro-turns -->
    <g>
      <rect x="60" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.5"/>
      <rect x="108" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.75"/>
      <rect x="156" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.4"/>
      <rect x="204" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.85"/>
      <rect x="252" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.6"/>
      <rect x="300" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.9"/>
      <rect x="348" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.75"/>
      <rect x="396" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.55"/>
      <rect x="444" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.95"/>
      <rect x="492" y="230" width="40" height="22" rx="3" fill="#a855f7" opacity="0.7"/>
    </g>
  </g>

  <!-- labels for streams -->
  <text x="60" y="183" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" font-weight="600">USER · 200ms × 10</text>
  <text x="60" y="271" fill="#a855f7" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" font-weight="600">MODEL · 200ms × 10</text>

  <!-- big title -->
  <text x="60" y="370" fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" letter-spacing="-1">Interaction Models</text>
  <text x="60" y="416" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="500">Thinking Machines Lab · 2026-05-11</text>

  <!-- subtitle Chinese -->
  <text x="60" y="475" fill="#e2e8f0" font-family="ui-sans-serif, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">把"轮次"砍成 200 毫秒：</text>
  <text x="60" y="513" fill="#e2e8f0" font-family="ui-sans-serif, 'PingFang SC', 'Hiragino Sans GB', sans-serif" font-size="28" font-weight="700">Mira Murati 团队首次发声</text>

  <!-- badge -->
  <g>
    <rect x="60" y="55" width="178" height="38" rx="19" fill="url(#accent)"/>
    <text x="149" y="80" fill="#0a0e27" font-family="ui-sans-serif, 'PingFang SC', sans-serif" font-size="18" font-weight="800" text-anchor="middle">好文共赏</text>
  </g>
  <text x="252" y="80" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="15">EDITORS PICK · 9.1 / 10</text>

  <!-- right-side decorative architecture sketch -->
  <g transform="translate(760, 130)" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">
    <!-- interaction model box -->
    <rect x="0" y="40" width="340" height="80" rx="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
    <text x="170" y="72" text-anchor="middle" fill="#22d3ee" font-weight="700" font-size="17">Interaction Model</text>
    <text x="170" y="98" text-anchor="middle" fill="#94a3b8" font-size="12">12B active · always-on · 200ms</text>

    <!-- arrow down -->
    <path d="M170 130 L170 165" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="186" y="152" fill="#cbd5e1" font-size="12">delegate</text>

    <!-- background model box -->
    <rect x="0" y="175" width="340" height="80" rx="12" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.9"/>
    <text x="170" y="207" text-anchor="middle" fill="#a855f7" font-weight="700" font-size="17">Background Model</text>
    <text x="170" y="233" text-anchor="middle" fill="#94a3b8" font-size="12">heavy reasoning · tool use · async</text>

    <!-- streams in / out -->
    <text x="0" y="20" fill="#22d3ee" font-size="11" font-weight="600">▼ audio · video · text</text>
    <text x="200" y="20" fill="#a855f7" font-size="11" font-weight="600">▲ speech · UI · actions</text>

    <!-- modalities arrows -->
    <path d="M40 25 L40 40" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M120 25 L120 40" stroke="#22d3ee" stroke-width="1.5"/>
    <path d="M210 25 L210 40" stroke="#a855f7" stroke-width="1.5"/>
    <path d="M290 25 L290 40" stroke="#a855f7" stroke-width="1.5"/>
  </g>

  <!-- footer URL & xie -->
  <text x="60" y="588" fill="#64748b" font-family="ui-monospace, monospace" font-size="13">thinkingmachines.ai/blog/interaction-models · xiejiayun.github.io</text>
</svg>
