<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100" font-family="ui-sans-serif, system-ui, 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#181438"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="50" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700">Interaction Models · Mind Map</text>
  <text x="800" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">Thinking Machines Lab · TML-Interaction-Small · 2026-05-11</text>

  <!-- Core node -->
  <g transform="translate(800, 550)">
    <circle r="115" fill="url(#core)" filter="url(#glow)"/>
    <circle r="115" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
    <text y="-10" text-anchor="middle" fill="#0a0e27" font-size="22" font-weight="800">Interaction</text>
    <text y="20" text-anchor="middle" fill="#0a0e27" font-size="22" font-weight="800">Model</text>
    <text y="48" text-anchor="middle" fill="#0a0e27" font-size="13" font-weight="600">276B MoE · 12B active</text>
  </g>

  <!-- Branches -->
  <!-- Top-left: Problem -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.7"><path d="M715 480 Q500 380 280 280"/></g>
  <g transform="translate(80, 200)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="18" font-weight="800">① 协作瓶颈</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• 当前模型只会"轮流说话"</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• VAD 比模型本身蠢得多</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• Autonomous 把人挤出了 loop</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 用 email 解决吵架的尴尬</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">Hayek + Scott + Clark &amp; Brennan</text>
  </g>

  <!-- Top: Architecture -->
  <g stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7"><path d="M800 435 Q800 350 800 270"/></g>
  <g transform="translate(640, 100)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="20" y="34" fill="#a855f7" font-size="18" font-weight="800">② 双模型架构</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• Interaction：永远在场的快模型</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• Background：异步推理 / 工具调用</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• rich context package 传递</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 结果以流的方式回灌</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">类比：前台秘书 + 后台研究员</text>
  </g>

  <!-- Top-right: Micro-turns -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.7"><path d="M885 480 Q1100 380 1320 280"/></g>
  <g transform="translate(1200, 200)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="20" y="34" fill="#22d3ee" font-size="18" font-weight="800">③ 200ms 微轮次</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• Token 流而非 turn boundary</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• 抛弃 VAD，模型自己定边界</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• 可同时听 + 说（直播翻译）</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 视觉打断 = 自然产物</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">"interactivity must be in the model"</text>
  </g>

  <!-- Right: Engineering tricks -->
  <g stroke="#f59e0b" stroke-width="2.5" fill="none" opacity="0.7"><path d="M915 550 Q1100 550 1320 550"/></g>
  <g transform="translate(1200, 465)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="20" y="34" fill="#f59e0b" font-size="18" font-weight="800">④ 工程细节</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• dMel：音频直接 embedding</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• 40×40 patch + hMLP（图像）</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• streaming sessions（SGLang）</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• gather+gemv MoE kernel</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">NVLS 通信 · Split-KV 一致顺序</text>
  </g>

  <!-- Bottom-right: Benchmarks -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" opacity="0.7"><path d="M885 625 Q1100 720 1320 820"/></g>
  <g transform="translate(1200, 730)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="18" font-weight="800">⑤ Benchmark 王座</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• Turn-taking 0.40s vs GPT-RT 1.18s</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• FD-bench V1.5 · 77.8 vs 46.8</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• Audio MultiChallenge 43.4 vs 37.6</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 新维度：TimeSpeak · CueSpeak</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">视觉主动：当前没有模型能做</text>
  </g>

  <!-- Bottom: Sutton -->
  <g stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7"><path d="M800 665 Q800 750 800 830"/></g>
  <g transform="translate(640, 830)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#a855f7" stroke-width="2"/>
    <text x="20" y="34" fill="#a855f7" font-size="18" font-weight="800">⑥ Bitter Lesson v2</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• Harness 是 hand-crafted</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• 让 interactivity scale with size</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• "更大的模型 = 更好的交互者"</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 不是 wrapper，是基座</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">回应 Sutton 2019 经典论断</text>
  </g>

  <!-- Bottom-left: HCI -->
  <g stroke="#f43f5e" stroke-width="2.5" fill="none" opacity="0.7"><path d="M715 625 Q500 720 280 820"/></g>
  <g transform="translate(80, 730)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#f43f5e" stroke-width="2"/>
    <text x="20" y="34" fill="#f43f5e" font-size="18" font-weight="800">⑦ 交互范式之争</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• 异步 Agent vs 实时协作</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• Claude Code &amp; Codex 的反方向</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• Sutton·Hayek·Scott 三人在场</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• 不止于"语音", 是 "在场"</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">回到"face-to-face"的 AI 体验</text>
  </g>

  <!-- Left: Competition -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" opacity="0.7"><path d="M685 550 Q500 550 280 550"/></g>
  <g transform="translate(80, 465)">
    <rect width="320" height="170" rx="14" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="34" fill="#10b981" font-size="18" font-weight="800">⑧ 现有玩家</text>
    <text x="20" y="68" fill="#e2e8f0" font-size="13">• Moshi（Kyutai）：开源前辈</text>
    <text x="20" y="92" fill="#e2e8f0" font-size="13">• PersonaPlex / Nemotron-VC</text>
    <text x="20" y="116" fill="#e2e8f0" font-size="13">• GPT-realtime · Gemini-Live</text>
    <text x="20" y="140" fill="#e2e8f0" font-size="13">• TML 第一次把它做大 + 加视觉</text>
    <text x="20" y="162" fill="#94a3b8" font-size="11">从研究 demo → 生产规模</text>
  </g>

  <!-- Bottom note -->
  <text x="800" y="1060" text-anchor="middle" fill="#475569" font-size="12">导读编辑：xiejiayun.github.io · 2026-05-14</text>
</svg>
