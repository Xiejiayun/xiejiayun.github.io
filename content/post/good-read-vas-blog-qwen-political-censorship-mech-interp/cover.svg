<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#160b22"/>
      <stop offset="100%" stop-color="#2a0a1c"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3860" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff3860" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff3860" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7be39c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7be39c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7be39c" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="60" y="92" fill="#ff5577" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="22" font-weight="700" letter-spacing="6">好文共赏 · GOOD READ</text>

  <text x="60" y="172" fill="#f4f6ff" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="50" font-weight="800">把审查电路从权重里挖出来</text>
  <text x="60" y="232" fill="#f4f6ff" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="36" font-weight="500">一份关于 Qwen 3.5 政治内容过滤的机制可解释性研究</text>

