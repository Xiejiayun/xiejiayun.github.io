        <rect x="130" y="0" width="22" height="40" rx="3"/>
        <rect x="156" y="0" width="22" height="40" rx="3"/>
        <rect x="182" y="0" width="22" height="40" rx="3"/>
        <rect x="208" y="0" width="22" height="40" rx="3"/>
        <rect x="234" y="0" width="22" height="40" rx="3"/>
        <rect x="260" y="0" width="22" height="40" rx="3"/>
      </g>
      <!-- L11–L20 writers: 红色 -->
      <g fill="#ff3860">
        <rect x="286" y="0" width="22" height="40" rx="3"/>
        <rect x="312" y="0" width="22" height="40" rx="3"/>
        <rect x="338" y="0" width="22" height="40" rx="3"/>
        <rect x="364" y="0" width="22" height="40" rx="3"/>
        <rect x="390" y="0" width="22" height="40" rx="3"/>
        <rect x="416" y="0" width="22" height="40" rx="3"/>
        <rect x="442" y="0" width="22" height="40" rx="3"/>
        <rect x="468" y="0" width="22" height="40" rx="3"/>
        <rect x="494" y="0" width="22" height="40" rx="3"/>
        <rect x="520" y="0" width="22" height="40" rx="3"/>
      </g>
      <!-- L20–L31 readers: 黄色 -->
      <g fill="#ffb347">
        <rect x="546" y="0" width="22" height="40" rx="3"/>
        <rect x="572" y="0" width="22" height="40" rx="3"/>
        <rect x="598" y="0" width="22" height="40" rx="3"/>
        <rect x="624" y="0" width="22" height="40" rx="3"/>
        <rect x="650" y="0" width="22" height="40" rx="3"/>
        <rect x="676" y="0" width="22" height="40" rx="3"/>
        <rect x="702" y="0" width="22" height="40" rx="3"/>
