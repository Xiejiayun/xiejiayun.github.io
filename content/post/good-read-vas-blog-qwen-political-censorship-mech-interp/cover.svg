    </g>

    <!-- tap 24 标线 -->
    <line x1="624" y1="-30" x2="624" y2="80" stroke="#7be39c" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="630" y="-32" fill="#7be39c" font-family="monospace" font-size="13">tap 24 ⇒ 抱歉，我不能…</text>
  </g>

  <!-- 三个 axes 标签 -->
  <g transform="translate(60,440)" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="20" font-weight="600">
    <text x="0"   y="0" fill="#ff5577">d_prc</text>
    <text x="0"   y="22" fill="#9aa4c0" font-size="13">是否 PRC 敏感内容</text>

    <text x="220" y="0" fill="#ffb347">d_refuse</text>
    <text x="220" y="22" fill="#9aa4c0" font-size="13">是否拒绝回答</text>

    <text x="440" y="0" fill="#7be39c">d_style</text>
    <text x="440" y="22" fill="#9aa4c0" font-size="13">偏转 / 宣传</text>
  </g>

  <!-- 底部 byline -->
  <g transform="translate(60,550)">
    <text x="0" y="0" fill="#7a8299" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="16">原文：vas-blog · 主评 Opus 9.4 · 副评 Sonnet 9.2 · 综合 9.2 / 10</text>
    <text x="0" y="28" fill="#5f6680" font-family="'Noto Sans CJK SC','PingFang SC',sans-serif" font-size="14">writers / readers · 三轴诊断 · tap 24 的中文 verdict · 47 个实验、200 条提示、1056 条 rollout</text>
