<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.4">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- scanline texture (demoscene feel) -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- top badge -->
  <g transform="translate(56,52)">
    <rect width="220" height="38" rx="19" fill="#0f172a" stroke="#475569"/>
    <text x="110" y="25" font-family="-apple-system,Segoe UI,sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">好文共赏 · Editor's Pick</text>
  </g>
  <text x="1144" y="76" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#64748b" text-anchor="end">2026-05-19 · xiejiayun.github.io</text>

  <!-- main title -->
  <text x="56" y="160" font-family="-apple-system,Segoe UI,sans-serif" font-size="44" font-weight="800" fill="#f8fafc">那些被 vibecode 出来的</text>
  <text x="56" y="212" font-family="-apple-system,Segoe UI,sans-serif" font-size="44" font-weight="800" fill="url(#accent)">Photoshop 在哪？</text>
  <text x="56" y="252" font-family="-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">—— gizmo64k 把"指控"本身送上了被告席</text>

  <!-- big quote -->
  <g transform="translate(56,300)">
    <text x="0" y="0" font-family="Georgia,serif" font-size="32" fill="url(#cool)" font-weight="700">"The accusation is the real vibecoded content."</text>
    <text x="0" y="38" font-family="-apple-system,Segoe UI,sans-serif" font-size="18" fill="#94a3b8">— 指控本身才是真正没经过验证的 vibecode</text>
  </g>

  <!-- 3 level boxes -->
  <g transform="translate(56,400)" font-family="-apple-system,Segoe UI,sans-serif">
    <g>
      <rect width="345" height="170" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="172" y="36" font-size="14" fill="#94a3b8" text-anchor="middle">LEVEL 1 · TYPING</text>
      <text x="172" y="74" font-size="22" font-weight="700" fill="#f8fafc" text-anchor="middle">打字 / 语法 / 模板</text>
      <text x="172" y="116" font-size="14" fill="#64748b" text-anchor="middle">leetcode、记 STL、调 segfault</text>
      <text x="172" y="142" font-size="16" font-weight="600" fill="url(#accent)" text-anchor="middle">AI 几乎完全代工 ↓</text>
    </g>
    <g transform="translate(360,0)">
      <rect width="345" height="170" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="172" y="36" font-size="14" fill="#94a3b8" text-anchor="middle">LEVEL 2 · VERIFYING</text>
      <text x="172" y="74" font-size="22" font-weight="700" fill="#f8fafc" text-anchor="middle">harness / 测试 / 反射</text>
      <text x="172" y="116" font-size="14" fill="#64748b" text-anchor="middle">90 次几乎对，1 次真正对</text>
      <text x="172" y="142" font-size="16" font-weight="600" fill="url(#cool)" text-anchor="middle">AI 几乎不影响 →</text>
    </g>
    <g transform="translate(720,0)">
      <rect width="345" height="170" rx="14" fill="#0f172a" stroke="#334155"/>
      <text x="172" y="36" font-size="14" fill="#94a3b8" text-anchor="middle">LEVEL 3 · DECIDING</text>
      <text x="172" y="74" font-size="22" font-weight="700" fill="#f8fafc" text-anchor="middle">架构 / 决断 / 不可逆</text>
      <text x="172" y="116" font-size="14" fill="#64748b" text-anchor="middle">哪条 trade-off 能撑十年</text>
      <text x="172" y="142" font-size="16" font-weight="600" fill="#a78bfa" text-anchor="middle">AI 完全够不到 →</text>
    </g>
  </g>
</svg>
