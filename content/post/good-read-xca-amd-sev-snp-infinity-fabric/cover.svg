<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#1a0a14"/>
      <stop offset="100%" stop-color="#0f0a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#ff9f1c"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#7209b7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 顶角栅格 -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- 顶栏 -->
  <text x="60" y="55" fill="#888" font-family="Menlo, Consolas, monospace" font-size="14" letter-spacing="2">好文共赏 · EDITOR'S PICK · 2026-05-18</text>

  <!-- 主标题 -->
  <text x="60" y="170" fill="#ffffff" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="56" font-weight="800">把 AMD 机密计算</text>
  <text x="60" y="240" fill="url(#accent)" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="60" font-weight="800" filter="url(#glow)">"开盲盒"</text>

  <text x="60" y="305" fill="#cfd2ff" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="26" font-weight="500">ETH Zurich 用两记互联总线攻击，</text>
  <text x="60" y="340" fill="#cfd2ff" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="26" font-weight="500">把 SEV-SNP 的 PSP 当成了自己的钥匙</text>

  <!-- 图示：芯片 + 两条总线 -->
  <g transform="translate(760, 180)">
    <!-- 芯片外框 -->
    <rect x="0" y="0" width="380" height="260" rx="14" fill="none" stroke="#4cc9f0" stroke-width="2" opacity="0.55"/>
    <text x="14" y="22" fill="#4cc9f0" font-family="Menlo,monospace" font-size="13">AMD EPYC SoC (Zen 3/4/5)</text>

    <!-- chiplets -->
    <g font-family="Menlo,monospace" font-size="13">
      <rect x="20" y="44" width="100" height="58" rx="6" fill="#1f2440" stroke="#7c83fd" stroke-width="1.5"/>
      <text x="70" y="78" fill="#bfc6ff" text-anchor="middle">CCD (cores)</text>

      <rect x="140" y="44" width="100" height="58" rx="6" fill="#1f2440" stroke="#7c83fd" stroke-width="1.5"/>
      <text x="190" y="78" fill="#bfc6ff" text-anchor="middle">IOD</text>

      <rect x="260" y="44" width="100" height="58" rx="6" fill="#2a1830" stroke="#ff9f1c" stroke-width="2"/>
      <text x="310" y="73" fill="#ffcf73" text-anchor="middle">PSP</text>
      <text x="310" y="92" fill="#ffcf73" text-anchor="middle" font-size="11">(root of trust)</text>

      <rect x="20" y="170" width="120" height="58" rx="6" fill="#1f2440" stroke="#7c83fd" stroke-width="1.5"/>
      <text x="80" y="195" fill="#bfc6ff" text-anchor="middle">Mem Ctrl</text>
      <text x="80" y="213" fill="#bfc6ff" text-anchor="middle" font-size="11">+ RMP</text>

      <rect x="160" y="170" width="80" height="58" rx="6" fill="#1f2440" stroke="#7c83fd" stroke-width="1.5"/>
      <text x="200" y="200" fill="#bfc6ff" text-anchor="middle">IOMMU</text>

      <rect x="260" y="170" width="100" height="58" rx="6" fill="#1f2440" stroke="#7c83fd" stroke-width="1.5"/>
      <text x="310" y="200" fill="#bfc6ff" text-anchor="middle">DRAM</text>
    </g>

    <!-- Two fabrics, attacker-controlled -->
    <g>
      <path d="M 70 102 Q 70 135 80 170" stroke="#ff4d6d" stroke-width="2.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M 310 102 Q 310 135 200 170" stroke="#ff4d6d" stroke-width="2.5" fill="none" stroke-dasharray="4,3"/>
      <path d="M 310 102 Q 360 135 310 170" stroke="#ff4d6d" stroke-width="2.5" fill="none" stroke-dasharray="4,3"/>
      <text x="190" y="145" fill="#ff4d6d" font-family="Menlo,monospace" font-size="12" text-anchor="middle">Infinity Fabric (HIJACKED)</text>
    </g>
  </g>

  <!-- 底部标签 -->
  <text x="60" y="495" fill="#9aa0c7" font-family="Menlo, Consolas, monospace" font-size="16">CVE-2025-54510 · CVE-2025-61971 · CVE-2025-61972</text>
  <text x="60" y="525" fill="#9aa0c7" font-family="Menlo, Consolas, monospace" font-size="16">USENIX Security 2026 · IEEE S&amp;P 2026 · ETH Zurich</text>

  <!-- 底部 hashtag -->
  <text x="60" y="585" fill="url(#cool)" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">#confidential-computing  #SEV-SNP  #Infinity-Fabric  #XCA  #PSP  #attestation</text>

  <!-- 角标 -->
  <g transform="translate(1080, 545)">
    <circle r="38" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text y="-6" fill="#ffcf73" font-family="Menlo,monospace" font-size="11" text-anchor="middle">XCA</text>
    <text y="13" fill="#ff4d6d" font-family="Menlo,monospace" font-size="14" font-weight="800" text-anchor="middle">9.1/10</text>
  </g>
</svg>
