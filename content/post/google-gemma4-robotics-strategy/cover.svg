<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="500" x2="1200" y2="500"/>
  </g>
  <!-- Dividing line -->
  <line x1="600" y1="80" x2="600" y2="450" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Left: Gemma crystal -->
  <polygon points="300,150 360,220 340,320 260,320 240,220" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="300,150 340,220 300,200 260,220" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="300" y="370" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="28" font-weight="bold">Gemma 4</text>
  <text x="300" y="395" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Open Models · On-Device</text>
  <text x="300" y="415" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Tool Calling · Multimodal</text>
  <!-- Right: Robot arm -->
  <g stroke="#34d399" stroke-width="2.5" fill="none">
    <line x1="850" y1="350" x2="850" y2="280"/>
    <line x1="850" y1="280" x2="920" y2="210"/>
    <line x1="920" y1="210" x2="950" y2="160"/>
    <circle cx="850" cy="280" r="6" fill="#34d399"/>
    <circle cx="920" cy="210" r="5" fill="#34d399"/>
    <!-- Gripper -->
    <line x1="950" y1="160" x2="940" y2="140"/>
    <line x1="950" y1="160" x2="960" y2="140"/>
  </g>
  <rect x="820" y="350" width="60" height="20" rx="3" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="900" y="370" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="28" font-weight="bold">Robotics</text>
  <text x="900" y="395" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Spatial Reasoning</text>
  <text x="900" y="415" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">Embodied Intelligence</text>
  <!-- Neural connections between sides -->
  <g stroke="#475569" stroke-width="1" opacity="0.5">
    <path d="M 380 250 Q 600 200 820 280" fill="none" stroke-dasharray="3,3"/>
    <path d="M 360 300 Q 600 350 850 300" fill="none" stroke-dasharray="3,3"/>
    <path d="M 350 200 Q 600 150 900 200" fill="none" stroke-dasharray="3,3"/>
  </g>
  <!-- Small neural dots -->
  <circle cx="500" cy="220" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="550" cy="280" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="650" cy="250" r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="700" cy="300" r="3" fill="#34d399" opacity="0.6"/>
  <!-- Title -->
  <text x="600" y="510" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="34" font-weight="bold">Google 双线出击</text>
  <text x="600" y="550" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="16">Open Models × Embodied AI</text>
  <!-- Labels -->
  <text x="300" y="100" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="13" opacity="0.7">Digital World</text>
  <text x="900" y="100" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13" opacity="0.7">Physical World</text>
</svg>