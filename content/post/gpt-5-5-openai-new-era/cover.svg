<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="30"/></filter>
    <radialGradient id="rg1" cx="50%" cy="50%"><stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>
  <!-- Glows -->
  <circle cx="600" cy="280" r="200" fill="#10b981" opacity="0.06" filter="url(#glow)"/>
  <circle cx="400" cy="350" r="150" fill="#8b5cf6" opacity="0.05" filter="url(#glow)"/>
  <circle cx="800" cy="350" r="150" fill="#06b6d4" opacity="0.05" filter="url(#glow)"/>
  <!-- Platform layers -->
  <!-- Layer 1: Model -->
  <rect x="350" y="180" width="500" height="70" rx="10" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="600" y="222" fill="#a78bfa" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">GPT-5.5 Model Layer</text>
  <!-- Layer 2: App -->
  <rect x="280" y="280" width="640" height="70" rx="10" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="322" fill="#34d399" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">Codex Super App</text>
  <!-- Layer 3: Platform -->
  <rect x="210" y="380" width="780" height="70" rx="10" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600" y="422" fill="#22d3ee" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">Multi-Cloud · AWS · Azure · GCP</text>
  <!-- Connecting lines -->
  <line x1="600" y1="250" x2="600" y2="280" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="600" y1="350" x2="600" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Title -->
  <text x="600" y="90" fill="white" font-family="monospace" font-size="52" font-weight="bold" text-anchor="middle">GPT-5.5</text>
  <text x="600" y="135" fill="#94a3b8" font-family="monospace" font-size="20" text-anchor="middle">OpenAI's Platform Empire Play</text>
  <!-- Bottom stats -->
  <rect x="100" y="500" width="220" height="60" rx="6" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="210" y="530" fill="#a78bfa" font-family="monospace" font-size="14" text-anchor="middle">10,000+ NVIDIA Users</text>
  <text x="210" y="548" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Internal Codex Adoption</text>
  <rect x="390" y="500" width="220" height="60" rx="6" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="500" y="530" fill="#34d399" font-family="monospace" font-size="14" text-anchor="middle">$50B AWS Deal</text>
  <text x="500" y="548" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Multi-Cloud Strategy</text>
  <rect x="680" y="500" width="220" height="60" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1"/>
  <text x="790" y="530" fill="#fb7185" font-family="monospace" font-size="14" text-anchor="middle">$25K Bug Bounty</text>
  <text x="790" y="548" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Bio Safety Program</text>
  <!-- Microsoft break indicator -->
  <line x1="950" y1="200" x2="1050" y2="200" stroke="#fb7185" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="1000" y="190" fill="#fb7185" font-family="monospace" font-size="11" text-anchor="middle">Microsoft</text>
  <text x="1000" y="220" fill="#fb7185" font-family="monospace" font-size="11" text-anchor="middle">Exclusive ✕</text>
</svg>
