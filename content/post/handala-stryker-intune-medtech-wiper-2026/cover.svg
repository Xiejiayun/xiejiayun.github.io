<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <!-- grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>
  <!-- device wipe icons -->
  <g transform="translate(80,420)" opacity="0.5">
    <g fill="none" stroke="#dc2626" stroke-width="1.5">
      <rect x="0" y="0" width="60" height="100" rx="6"/>
      <rect x="80" y="0" width="60" height="100" rx="6"/>
      <rect x="160" y="0" width="60" height="100" rx="6"/>
      <rect x="240" y="0" width="60" height="100" rx="6"/>
      <rect x="320" y="0" width="60" height="100" rx="6"/>
      <rect x="400" y="0" width="60" height="100" rx="6"/>
      <rect x="480" y="0" width="60" height="100" rx="6"/>
    </g>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" fill="#dc2626" text-anchor="middle">
      <text x="30" y="55">✕</text><text x="110" y="55">✕</text><text x="190" y="55">✕</text>
      <text x="270" y="55">✕</text><text x="350" y="55">✕</text><text x="430" y="55">✕</text>
      <text x="510" y="55">✕</text>
    </g>
  </g>
  <!-- central command -->
  <g transform="translate(880,360)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="20" fill="#ef4444" opacity="0.8"/>
    <text x="0" y="-100" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#fca5a5" text-anchor="middle">Intune MDM</text>
    <text x="0" y="115" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#fca5a5" text-anchor="middle">remote_wipe()</text>
  </g>
  <!-- title -->
  <g fill="#f1f5f9">
    <text x="60" y="110" font-size="20" fill="#94a3b8" letter-spacing="6">SECURITY · SUPPLY CHAIN</text>
    <text x="60" y="190" font-size="52" font-weight="800">Intune 变武器</text>
    <text x="60" y="260" font-size="32" font-weight="600" fill="#fecaca">79 国 · 200,000 台设备</text>
    <text x="60" y="320" font-size="22" fill="#cbd5e1">一条 MDM 指令把 Stryker 医疗设备清零</text>
    <text x="60" y="358" font-size="22" fill="#cbd5e1">Handala / Void Manticore · 2026.03</text>
  </g>
  <rect x="60" y="240" width="6" height="60" fill="#ef4444"/>
  <rect x="0" y="585" width="1200" height="2" fill="url(#glow1)"/>
  <text x="60" y="608" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#64748b">XIEJIAYUN.GITHUB.IO · 2026-05-18</text>
</svg>
