<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="pathA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="pathB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="pathC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="40" y1="0" x2="40" y2="630" /><line x1="80" y1="0" x2="80" y2="630" /><line x1="120" y1="0" x2="120" y2="630" /><line x1="160" y1="0" x2="160" y2="630" /><line x1="200" y1="0" x2="200" y2="630" /><line x1="240" y1="0" x2="240" y2="630" /><line x1="280" y1="0" x2="280" y2="630" /><line x1="320" y1="0" x2="320" y2="630" /><line x1="360" y1="0" x2="360" y2="630" /><line x1="400" y1="0" x2="400" y2="630" /><line x1="440" y1="0" x2="440" y2="630" /><line x1="480" y1="0" x2="480" y2="630" /><line x1="520" y1="0" x2="520" y2="630" /><line x1="560" y1="0" x2="560" y2="630" /><line x1="600" y1="0" x2="600" y2="630" /><line x1="640" y1="0" x2="640" y2="630" /><line x1="680" y1="0" x2="680" y2="630" /><line x1="720" y1="0" x2="720" y2="630" /><line x1="760" y1="0" x2="760" y2="630" /><line x1="800" y1="0" x2="800" y2="630" /><line x1="840" y1="0" x2="840" y2="630" /><line x1="880" y1="0" x2="880" y2="630" /><line x1="920" y1="0" x2="920" y2="630" /><line x1="960" y1="0" x2="960" y2="630" /><line x1="1000" y1="0" x2="1000" y2="630" /><line x1="1040" y1="0" x2="1040" y2="630" /><line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1120" y1="0" x2="1120" y2="630" /><line x1="1160" y1="0" x2="1160" y2="630" /><line x1="1200" y1="0" x2="1200" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="0" /><line x1="0" y1="40" x2="1200" y2="40" /><line x1="0" y1="80" x2="1200" y2="80" /><line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="160" x2="1200" y2="160" /><line x1="0" y1="200" x2="1200" y2="200" /><line x1="0" y1="240" x2="1200" y2="240" /><line x1="0" y1="280" x2="1200" y2="280" /><line x1="0" y1="320" x2="1200" y2="320" /><line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="400" x2="1200" y2="400" /><line x1="0" y1="440" x2="1200" y2="440" /><line x1="0" y1="480" x2="1200" y2="480" /><line x1="0" y1="520" x2="1200" y2="520" /><line x1="0" y1="560" x2="1200" y2="560" /><line x1="0" y1="600" x2="1200" y2="600" />
  </g>
  <!-- Origin point -->
  <circle cx="200" cy="380" r="8" fill="#e94560" filter="url(#glow)" opacity="0.9"/>
  <circle cx="200" cy="380" r="3" fill="#fff"/>
  <!-- Three diverging paths -->
  <path d="M200,380 C350,380 400,200 550,180" stroke="url(#pathA)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8"/>
  <path d="M200,380 C350,380 450,370 600,360" stroke="url(#pathB)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8"/>
  <path d="M200,380 C350,380 400,520 550,540" stroke="url(#pathC)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8"/>
  <!-- Chip icon A - FPGA -->
  <g transform="translate(550,140)">
    <rect x="-30" y="-30" width="60" height="60" rx="4" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
    <rect x="-18" y="-18" width="36" height="36" rx="2" fill="#ff6b6b" opacity="0.15"/>
    <line x1="-30" y1="-15" x2="-40" y2="-15" stroke="#ff6b6b" stroke-width="1.5"/><line x1="-30" y1="0" x2="-40" y2="0" stroke="#ff6b6b" stroke-width="1.5"/><line x1="-30" y1="15" x2="-40" y2="15" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="30" y1="-15" x2="40" y2="-15" stroke="#ff6b6b" stroke-width="1.5"/><line x1="30" y1="0" x2="40" y2="0" stroke="#ff6b6b" stroke-width="1.5"/><line x1="30" y1="15" x2="40" y2="15" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="-15" y1="-30" x2="-15" y2="-40" stroke="#ff6b6b" stroke-width="1.5"/><line x1="0" y1="-30" x2="0" y2="-40" stroke="#ff6b6b" stroke-width="1.5"/><line x1="15" y1="-30" x2="15" y2="-40" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="-15" y1="30" x2="-15" y2="40" stroke="#ff6b6b" stroke-width="1.5"/><line x1="0" y1="30" x2="0" y2="40" stroke="#ff6b6b" stroke-width="1.5"/><line x1="15" y1="30" x2="15" y2="40" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="0" y="60" text-anchor="middle" fill="#ff6b6b" font-family="sans-serif" font-size="11" opacity="0.9">FPGA</text>
  </g>
  <!-- Chip icon B - Custom -->
  <g transform="translate(620,320)">
    <rect x="-30" y="-30" width="60" height="60" rx="4" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.9"/>
    <rect x="-18" y="-18" width="36" height="36" rx="2" fill="#4fc3f7" opacity="0.15"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#4fc3f7"/>
    <line x1="-30" y1="-15" x2="-40" y2="-15" stroke="#4fc3f7" stroke-width="1.5"/><line x1="-30" y1="0" x2="-40" y2="0" stroke="#4fc3f7" stroke-width="1.5"/><line x1="-30" y1="15" x2="-40" y2="15" stroke="#4fc3f7" stroke-width="1.5"/>
    <line x1="30" y1="-15" x2="40" y2="-15" stroke="#4fc3f7" stroke-width="1.5"/><line x1="30" y1="0" x2="40" y2="0" stroke="#4fc3f7" stroke-width="1.5"/><line x1="30" y1="15" x2="40" y2="15" stroke="#4fc3f7" stroke-width="1.5"/>
    <line x1="-15" y1="-30" x2="-15" y2="-40" stroke="#4fc3f7" stroke-width="1.5"/><line x1="0" y1="-30" x2="0" y2="-40" stroke="#4fc3f7" stroke-width="1.5"/><line x1="15" y1="-30" x2="15" y2="-40" stroke="#4fc3f7" stroke-width="1.5"/>
    <line x1="-15" y1="30" x2="-15" y2="40" stroke="#4fc3f7" stroke-width="1.5"/><line x1="0" y1="30" x2="0" y2="40" stroke="#4fc3f7" stroke-width="1.5"/><line x1="15" y1="30" x2="15" y2="40" stroke="#4fc3f7" stroke-width="1.5"/>
    <text x="0" y="60" text-anchor="middle" fill="#4fc3f7" font-family="sans-serif" font-size="11" opacity="0.9">定制处理器</text>
  </g>
  <!-- Chip icon C - Hybrid -->
  <g transform="translate(550,500)">
    <rect x="-30" y="-30" width="60" height="60" rx="4" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.9"/>
    <rect x="-18" y="-18" width="16" height="36" rx="1" fill="#ff6b6b" opacity="0.2"/>
    <rect x="2" y="-18" width="16" height="36" rx="1" fill="#4fc3f7" opacity="0.2"/>
    <line x1="-30" y1="-15" x2="-40" y2="-15" stroke="#a855f7" stroke-width="1.5"/><line x1="-30" y1="0" x2="-40" y2="0" stroke="#a855f7" stroke-width="1.5"/><line x1="-30" y1="15" x2="-40" y2="15" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="30" y1="-15" x2="40" y2="-15" stroke="#a855f7" stroke-width="1.5"/><line x1="30" y1="0" x2="40" y2="0" stroke="#a855f7" stroke-width="1.5"/><line x1="30" y1="15" x2="40" y2="15" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="-15" y1="-30" x2="-15" y2="-40" stroke="#a855f7" stroke-width="1.5"/><line x1="0" y1="-30" x2="0" y2="-40" stroke="#a855f7" stroke-width="1.5"/><line x1="15" y1="-30" x2="15" y2="-40" stroke="#a855f7" stroke-width="1.5"/>
    <line x1="-15" y1="30" x2="-15" y2="40" stroke="#a855f7" stroke-width="1.5"/><line x1="0" y1="30" x2="0" y2="40" stroke="#a855f7" stroke-width="1.5"/><line x1="15" y1="30" x2="15" y2="40" stroke="#a855f7" stroke-width="1.5"/>
    <text x="0" y="60" text-anchor="middle" fill="#a855f7" font-family="sans-serif" font-size="11" opacity="0.9">混合架构</text>
  </g>
  <!-- Title -->
  <text x="600" y="75" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold">硬件仿真的三条路线之争</text>
  <text x="600" y="110" text-anchor="middle" fill="#8892b0" font-family="sans-serif" font-size="16">当芯片验证成本吞噬设计预算</text>
</svg>