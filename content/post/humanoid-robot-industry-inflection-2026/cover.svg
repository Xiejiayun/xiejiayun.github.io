<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Robot silhouette -->
  <g transform="translate(600,280)" opacity="0.8">
    <!-- Head -->
    <rect x="-30" y="-150" width="60" height="50" rx="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-12" cy="-130" r="5" fill="#00d4ff"/>
    <circle cx="12" cy="-130" r="5" fill="#00d4ff"/>
    <!-- Neck -->
    <rect x="-8" y="-100" width="16" height="15" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <!-- Torso -->
    <rect x="-45" y="-85" width="90" height="100" rx="5" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <!-- Arms -->
    <line x1="-45" y1="-70" x2="-80" y2="-20" stroke="#00d4ff" stroke-width="2"/>
    <line x1="-80" y1="-20" x2="-75" y2="30" stroke="#00d4ff" stroke-width="2"/>
    <line x1="45" y1="-70" x2="80" y2="-20" stroke="#00d4ff" stroke-width="2"/>
    <line x1="80" y1="-20" x2="75" y2="30" stroke="#00d4ff" stroke-width="2"/>
    <!-- Legs -->
    <line x1="-20" y1="15" x2="-25" y2="80" stroke="#00d4ff" stroke-width="2"/>
    <line x1="-25" y1="80" x2="-30" y2="140" stroke="#00d4ff" stroke-width="2"/>
    <line x1="20" y1="15" x2="25" y2="80" stroke="#00d4ff" stroke-width="2"/>
    <line x1="25" y1="80" x2="30" y2="140" stroke="#00d4ff" stroke-width="2"/>
    <!-- Neural network overlay -->
    <circle cx="0" cy="-40" r="8" fill="#7b2ff7" opacity="0.6"/>
    <circle cx="-25" cy="-60" r="5" fill="#7b2ff7" opacity="0.4"/>
    <circle cx="25" cy="-60" r="5" fill="#7b2ff7" opacity="0.4"/>
    <circle cx="-20" cy="-20" r="5" fill="#7b2ff7" opacity="0.4"/>
    <circle cx="20" cy="-20" r="5" fill="#7b2ff7" opacity="0.4"/>
    <line x1="0" y1="-40" x2="-25" y2="-60" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="25" y2="-60" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="-20" y2="-20" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="20" y2="-20" stroke="#7b2ff7" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Glow effect -->
  <circle cx="600" cy="240" r="100" fill="#00d4ff" opacity="0.03"/>
  <circle cx="600" cy="240" r="200" fill="#7b2ff7" opacity="0.02"/>
  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">人形机器人产业化拐点</text>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff">当AI学会了推理，机器人学会了思考</text>
</svg>