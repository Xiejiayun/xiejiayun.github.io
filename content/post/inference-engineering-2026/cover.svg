<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Speed lines -->
  <g opacity="0.15">
    <line x1="750" y1="200" x2="1100" y2="200" stroke="#34d399" stroke-width="2"/>
    <line x1="800" y1="240" x2="1050" y2="240" stroke="#34d399" stroke-width="1.5"/>
    <line x1="770" y1="280" x2="1080" y2="280" stroke="#06b6d4" stroke-width="1"/>
    <line x1="820" y1="320" x2="1100" y2="320" stroke="#06b6d4" stroke-width="2"/>
    <line x1="780" y1="360" x2="1060" y2="360" stroke="#34d399" stroke-width="1"/>
  </g>
  <!-- Tokens flowing -->
  <g font-family="monospace" font-size="11" opacity="0.2">
    <text x="760" y="205" fill="#34d399">tok</text>
    <text x="850" y="245" fill="#06b6d4">tok</text>
    <text x="920" y="285" fill="#34d399">tok</text>
    <text x="880" y="325" fill="#06b6d4">tok</text>
    <text x="960" y="365" fill="#34d399">tok</text>
  </g>
  <!-- Arrow pointing right (speed) -->
  <polygon points="1100,280 1070,250 1070,270 1020,270 1020,290 1070,290 1070,310" fill="#34d399" opacity="0.2"/>
  <!-- Title -->
  <text x="100" y="280" font-family="sans-serif" font-size="42" fill="#f8fafc" font-weight="bold">推理工程崛起</text>
  <text x="100" y="335" font-family="sans-serif" font-size="24" fill="#94a3b8">2026年最被低估的AI职业赛道</text>
  <rect x="100" y="365" width="160" height="3" fill="url(#flow)" rx="1"/>
  <rect x="100" y="400" width="90" height="28" rx="14" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="145" y="418" font-family="sans-serif" font-size="12" fill="#34d399" text-anchor="middle">AI推理</text>
  <rect x="210" y="400" width="100" height="28" rx="14" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
  <text x="260" y="418" font-family="sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">LLM优化</text>
</svg>
