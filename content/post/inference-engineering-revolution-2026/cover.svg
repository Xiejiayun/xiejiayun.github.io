<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Chip layers -->
  <rect x="350" y="120" width="500" height="80" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="165" font-family="monospace" font-size="14" fill="#fbbf24" text-anchor="middle">PREFILL ACCELERATOR (SambaNova RDU)</text>
  <rect x="350" y="220" width="500" height="80" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="2"/>
  <text x="600" y="265" font-family="monospace" font-size="14" fill="#34d399" text-anchor="middle">DECODE ENGINE (Intel Gaudi)</text>
  <rect x="350" y="320" width="500" height="80" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="2"/>
  <text x="600" y="355" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle">KV CACHE (Probabilistic Language Tries)</text>
  <text x="600" y="375" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Beyond Shannon Limit</text>
  <!-- Photonic interconnects -->
  <line x1="200" y1="160" x2="340" y2="160" stroke="#22d3ee" stroke-width="2" opacity="0.8"/>
  <line x1="200" y1="260" x2="340" y2="260" stroke="#22d3ee" stroke-width="2" opacity="0.8"/>
  <line x1="200" y1="360" x2="340" y2="360" stroke="#22d3ee" stroke-width="2" opacity="0.8"/>
  <circle cx="190" cy="160" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="190" cy="260" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="190" cy="360" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="265" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" transform="rotate(-90,130,265)">SILICON PHOTONICS</text>
  <!-- Text -->
  <text x="600" y="480" font-family="monospace" font-size="28" fill="#e2e8f0" text-anchor="middle" font-weight="bold">推理工程革命</text>
  <text x="600" y="520" font-family="monospace" font-size="16" fill="#fbbf24" text-anchor="middle">异构计算 × KV缓存突破 × 硅光子互连</text>
  <text x="600" y="555" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">Inference Engineering Revolution 2026</text>
</svg>