<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326ce5"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#326ce5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d2ff">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Pod shape (old - uniform) -->
  <g transform="translate(120,220)">
    <rect x="0" y="0" width="320" height="200" rx="16" fill="none" stroke="#326ce5" stroke-width="2" opacity="0.5"/>
    <text x="160" y="-12" text-anchor="middle" fill="#667" font-family="monospace" font-size="13">BEFORE: 逐容器分配</text>
    <!-- containers all same -->
    <rect x="20" y="30" width="80" height="140" rx="8" fill="#326ce5" opacity="0.4" stroke="#326ce5" stroke-width="1.5"/>
    <text x="60" y="95" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">Main</text>
    <text x="60" y="112" text-anchor="middle" fill="#00d2ff" font-size="9" font-family="monospace">4 CPU ✓</text>
    <rect x="120" y="30" width="80" height="140" rx="8" fill="#326ce5" opacity="0.4" stroke="#326ce5" stroke-width="1.5"/>
    <text x="160" y="95" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">Sidecar</text>
    <text x="160" y="112" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="monospace">2 CPU ✗</text>
    <rect x="220" y="30" width="80" height="140" rx="8" fill="#326ce5" opacity="0.4" stroke="#326ce5" stroke-width="1.5"/>
    <text x="260" y="95" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">Log</text>
    <text x="260" y="112" text-anchor="middle" fill="#ff6b6b" font-size="9" font-family="monospace">2 CPU ✗</text>
  </g>
  <!-- Arrow -->
  <g filter="url(#glow)">
    <path d="M500,320 L560,320" stroke="#00d2ff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <polygon id="arrowP" points="560,314 575,320 560,326" fill="#00d2ff"/>
  </g>
  <!-- Pod shape (new - differentiated) -->
  <g transform="translate(600,220)">
    <rect x="0" y="0" width="420" height="200" rx="16" fill="none" stroke="#00d2ff" stroke-width="2.5" filter="url(#glow)"/>
    <text x="210" y="-12" text-anchor="middle" fill="#00d2ff" font-family="monospace" font-size="13">AFTER: Pod 级差异化</text>
    <!-- Main container - large, highlighted -->
    <rect x="20" y="25" width="160" height="150" rx="10" fill="#326ce5" opacity="0.6" stroke="#00d2ff" stroke-width="2"/>
    <text x="100" y="90" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">Main App</text>
    <text x="100" y="112" text-anchor="middle" fill="#00d2ff" font-size="11" font-family="monospace">4 独占 CPU</text>
    <text x="100" y="128" text-anchor="middle" fill="#00d2ff" font-size="10" font-family="monospace">NUMA 对齐 ✓</text>
    <!-- Sidecars - smaller, purple -->
    <rect x="200" y="25" width="95" height="65" rx="8" fill="#7c3aed" opacity="0.4" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="247" y="55" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">Sidecar</text>
    <text x="247" y="72" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="monospace">共享池 ✓</text>
    <rect x="310" y="25" width="90" height="65" rx="8" fill="#7c3aed" opacity="0.4" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="355" y="55" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">Log</text>
    <text x="355" y="72" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="monospace">共享池 ✓</text>
    <!-- NUMA bar -->
    <rect x="200" y="110" width="200" height="55" rx="8" fill="#1b2838" stroke="#326ce5" stroke-width="1" stroke-dasharray="4"/>
    <text x="300" y="135" text-anchor="middle" fill="#667" font-size="10" font-family="monospace">NUMA Node 0</text>
    <text x="300" y="152" text-anchor="middle" fill="#326ce5" font-size="9" font-family="monospace">共享 CPU Pool</text>
  </g>
  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold" font-family="sans-serif">K8s 1.36 Pod 级资源管理</text>
  <text x="600" y="108" text-anchor="middle" fill="#00d2ff" font-size="18" font-family="sans-serif">Sidecar 泛滥时代的差异化资源编排</text>
  <!-- Version badge -->
  <rect x="30" y="560" width="120" height="36" rx="18" fill="#326ce5" opacity="0.8"/>
  <text x="90" y="583" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">v1.36 Alpha</text>
  <!-- K8s wheel icon simplified -->
  <g transform="translate(1130,580)" opacity="0.15">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#326ce5" stroke-width="4"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#326ce5" stroke-width="4"/>
    <g stroke="#326ce5" stroke-width="4">
      <line x1="0" y1="-35" x2="0" y2="-12"/><line x1="0" y1="12" x2="0" y2="35"/>
      <line x1="-35" y1="0" x2="-12" y2="0"/><line x1="12" y1="0" x2="35" y2="0"/>
      <line x1="-25" y1="-25" x2="-8" y2="-8"/><line x1="8" y1="8" x2="25" y2="25"/>
      <line x1="25" y1="-25" x2="8" y2="-8"/><line x1="-8" y1="8" x2="-25" y2="25"/>
    </g>
  </g>
</svg>