<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Transformer blocks -->
  <rect x="80" y="120" width="100" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="145" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle">MHA</text>
  <text x="130" y="165" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">2017-2023</text>
  <rect x="220" y="120" width="100" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="270" y="145" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle">GQA / MQA</text>
  <text x="270" y="165" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">2023-2025</text>
  <rect x="360" y="120" width="100" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="410" y="145" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle">MLA / NSA</text>
  <text x="410" y="165" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">2025-2026</text>
  <rect x="500" y="120" width="100" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="145" fill="#34d399" font-family="monospace" font-size="10" text-anchor="middle">Hybrid?</text>
  <text x="550" y="165" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">2026 H2→</text>
  <!-- Arrows -->
  <line x1="180" y1="150" x2="218" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="150" x2="358" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="150" x2="498" y2="150" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Bottom: MoE + inference scaling -->
  <rect x="140" y="240" width="160" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="220" y="262" fill="#fbbf24" font-family="monospace" font-size="11" text-anchor="middle">MoE 稀疏激活</text>
  <text x="220" y="278" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">DeepSeek / Qwen3 / gpt-oss</text>
  <rect x="380" y="240" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="470" y="262" fill="#fb7185" font-family="monospace" font-size="11" text-anchor="middle">推理时扩展 (TTS)</text>
  <text x="470" y="278" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">Chain-of-Thought / Tree Search</text>
  <!-- Connection lines -->
  <line x1="300" y1="265" x2="378" y2="265" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="270" y1="180" x2="220" y2="238" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="410" y1="180" x2="470" y2="238" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Model names scattered -->
  <text x="650" y="140" fill="#a78bfa" opacity="0.3" font-family="monospace" font-size="10">Gemma 4</text>
  <text x="640" y="160" fill="#22d3ee" opacity="0.3" font-family="monospace" font-size="10">Claude 4.7</text>
  <text x="650" y="180" fill="#34d399" opacity="0.3" font-family="monospace" font-size="10">gpt-oss</text>
  <text x="640" y="200" fill="#fbbf24" opacity="0.3" font-family="monospace" font-size="10">Muse Spark</text>
  <text x="650" y="220" fill="#fb7185" opacity="0.3" font-family="monospace" font-size="10">Qwen3</text>
  <!-- Title -->
  <text x="400" y="45" fill="#e2e8f0" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">2026 LLM架构演进全景</text>
  <text x="400" y="72" fill="#94a3b8" font-family="sans-serif" font-size="14" text-anchor="middle">从注意力变体爆发到推理时扩展的新范式</text>
  <!-- Bottom label -->
  <text x="400" y="340" fill="#475569" font-family="sans-serif" font-size="11" text-anchor="middle">七年演进：参数规模扩展 → 稀疏激活 → 注意力优化 → 推理时计算</text>
</svg>