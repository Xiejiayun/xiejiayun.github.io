<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Neural network nodes -->
  <g opacity="0.5">
    <circle cx="200" cy="200" r="8" fill="#a78bfa"/><circle cx="200" cy="280" r="8" fill="#a78bfa"/><circle cx="200" cy="360" r="8" fill="#a78bfa"/>
    <circle cx="400" cy="160" r="8" fill="#a78bfa"/><circle cx="400" cy="240" r="8" fill="#a78bfa"/><circle cx="400" cy="320" r="8" fill="#a78bfa"/><circle cx="400" cy="400" r="8" fill="#a78bfa"/>
    <circle cx="600" cy="200" r="12" fill="#34d399"/><circle cx="600" cy="280" r="12" fill="#34d399"/><circle cx="600" cy="360" r="12" fill="#34d399"/>
    <circle cx="800" cy="160" r="8" fill="#34d399"/><circle cx="800" cy="240" r="8" fill="#34d399"/><circle cx="800" cy="320" r="8" fill="#34d399"/><circle cx="800" cy="400" r="8" fill="#34d399"/>
    <circle cx="1000" cy="200" r="8" fill="#a78bfa"/><circle cx="1000" cy="280" r="8" fill="#a78bfa"/><circle cx="1000" cy="360" r="8" fill="#a78bfa"/>
  </g>
  <!-- Connections -->
  <g stroke="#a78bfa" stroke-width="0.5" opacity="0.2">
    <line x1="200" y1="200" x2="400" y2="160"/><line x1="200" y1="200" x2="400" y2="240"/>
    <line x1="200" y1="280" x2="400" y2="240"/><line x1="200" y1="280" x2="400" y2="320"/>
    <line x1="200" y1="360" x2="400" y2="320"/><line x1="200" y1="360" x2="400" y2="400"/>
    <line x1="400" y1="160" x2="600" y2="200"/><line x1="400" y1="240" x2="600" y2="280"/>
    <line x1="400" y1="320" x2="600" y2="280"/><line x1="400" y1="400" x2="600" y2="360"/>
  </g>
  <g stroke="#34d399" stroke-width="1" opacity="0.3">
    <line x1="600" y1="200" x2="800" y2="160"/><line x1="600" y1="200" x2="800" y2="240"/>
    <line x1="600" y1="280" x2="800" y2="240"/><line x1="600" y1="280" x2="800" y2="320"/>
    <line x1="600" y1="360" x2="800" y2="320"/><line x1="600" y1="360" x2="800" y2="400"/>
    <line x1="800" y1="160" x2="1000" y2="200"/><line x1="800" y1="240" x2="1000" y2="280"/>
    <line x1="800" y1="320" x2="1000" y2="280"/><line x1="800" y1="400" x2="1000" y2="360"/>
  </g>
  <!-- Latent space glow -->
  <ellipse cx="600" cy="280" rx="120" ry="120" fill="none" stroke="#34d399" stroke-width="1" opacity="0.15"/>
  <ellipse cx="600" cy="280" rx="80" ry="80" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="520" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">LATENT REASONING</text>
  <text x="600" y="560" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Beyond Chain of Thought · Spectral Phase Transitions</text>
</svg>