<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#101626"/>
      <stop offset="100%" stop-color="#1a0f1f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Faint grid -->
  <g stroke="#1f2a3d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- Hidden text under text concept: tiny text rows -->
  <g font-family="monospace" font-size="11" fill="#334155" opacity="0.55">
    <text x="80" y="100">The quarterly report shows strong customer growth across all regions...</text>
    <text x="80" y="125">...thanks again for your continued partnership, looking forward to next...</text>
    <text x="80" y="150">Our team appreciates the detailed feedback, the proposal will be revised...</text>
    <text x="80" y="525">Please review the attached summary at your earliest convenience...</text>
    <text x="80" y="550">Best regards, The XYZ Operations Team. p.s. enjoy the spring weather.</text>
  </g>
  <!-- Hidden bits revealing -->
  <g font-family="monospace" font-size="9" fill="#06b6d4" opacity="0.65">
    <text x="92" y="100">01100001 01010111 11001010 00110101...</text>
    <text x="92" y="125">11010110 01110011 00101010 10110001...</text>
    <text x="92" y="150">10110101 11000110 00011110 01010101...</text>
  </g>
  <!-- Main visual: lock with embedded paragraph -->
  <g transform="translate(600 320)">
    <circle r="180" fill="none" stroke="#1f2a3d" stroke-width="1"/>
    <circle r="135" fill="none" stroke="#27374d" stroke-width="1"/>
    <!-- LLM cube -->
    <g transform="translate(-120 -50)" filter="url(#g)">
      <rect x="0" y="0" width="100" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <text x="50" y="55" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#e2e8f0" text-anchor="middle">LLM</text>
      <text x="50" y="80" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">decoder</text>
    </g>
    <!-- Arrow -->
    <g stroke="url(#acc)" stroke-width="2" fill="none">
      <path d="M -10 0 Q 30 0 60 0" />
      <polygon points="60,-5 70,0 60,5" fill="#06b6d4"/>
    </g>
    <!-- Output paragraph with hidden bits -->
    <g transform="translate(30 -50)">
      <rect x="0" y="0" width="180" height="100" rx="8" fill="#0f1729" stroke="#334155" stroke-width="1"/>
      <text x="12" y="22" font-family="monospace" font-size="9" fill="#cbd5e1">Dear partner, we hope</text>
      <text x="12" y="36" font-family="monospace" font-size="9" fill="#cbd5e1">this quarterly review</text>
      <text x="12" y="50" font-family="monospace" font-size="9" fill="#06b6d4">finds you well — our</text>
      <text x="12" y="64" font-family="monospace" font-size="9" fill="#cbd5e1">team has prepared an</text>
      <text x="12" y="78" font-family="monospace" font-size="9" fill="#06b6d4">analysis attached for</text>
      <text x="12" y="92" font-family="monospace" font-size="9" fill="#cbd5e1">your review.</text>
    </g>
    <!-- Secret payload underneath -->
    <g transform="translate(-100 100)">
      <text x="0" y="0" font-family="monospace" font-size="13" fill="#f87171" opacity="0.85">[ hidden payload: 6KB at 4 bits/token ]</text>
    </g>
  </g>
  <!-- Title -->
  <g>
    <text x="60" y="245" font-family="'Source Han Sans CN','PingFang SC','Microsoft YaHei',sans-serif" font-size="44" font-weight="800" fill="#f8fafc">LLM 文本隐写术</text>
    <text x="60" y="290" font-family="'Source Han Sans CN','PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="500" fill="#94a3b8">把秘密消息藏进看似无害的英文段落里</text>
  </g>
  <!-- Right hand text -->
  <g>
    <text x="1140" y="245" font-family="'Source Han Sans CN','PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#64748b" text-anchor="end">2026 · DLP / 内容审核 / AI 安全</text>
    <text x="1140" y="265" font-family="monospace" font-size="11" fill="#475569" text-anchor="end">~4 bits per token · undetectable</text>
  </g>
  <!-- Tagline bottom -->
  <text x="600" y="585" font-family="'Source Han Sans CN','PingFang SC',sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle" opacity="0.9">当输出本身看不出问题，风险藏在概率分布的几何结构里</text>
</svg>
