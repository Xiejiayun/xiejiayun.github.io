<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0b1f2a"/>
    </linearGradient>
    <linearGradient id="laser" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f472b6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- silicon wafer pattern (destination) -->
  <g transform="translate(700,380)">
    <rect x="0" y="0" width="430" height="160" fill="none" stroke="#475569" stroke-width="1.5" rx="6"/>
    <text x="215" y="-12" fill="#94a3b8" font-size="13" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">Silicon Photonic Wafer (SOI)</text>
    <!-- waveguides -->
    <g stroke="#67e8f9" stroke-width="2" fill="none" opacity="0.65">
      <path d="M 20 30 L 410 30"/>
      <path d="M 20 60 L 220 60 Q 250 60 250 90 L 250 130"/>
      <path d="M 20 90 L 180 90 Q 220 90 220 120"/>
      <path d="M 20 120 L 140 120 Q 180 120 180 90"/>
    </g>
    <!-- placed III-V chiplets -->
    <g fill="#f472b6" opacity="0.8">
      <rect x="50" y="20" width="20" height="20" rx="2"/>
      <rect x="130" y="20" width="20" height="20" rx="2"/>
      <rect x="220" y="20" width="20" height="20" rx="2"/>
      <rect x="310" y="20" width="20" height="20" rx="2"/>
    </g>
    <text x="60" y="65" fill="#fda4af" font-size="10" font-family="ui-monospace,Menlo,monospace">DFB</text>
    <text x="140" y="65" fill="#fda4af" font-size="10" font-family="ui-monospace,Menlo,monospace">EOM</text>
    <text x="230" y="65" fill="#fda4af" font-size="10" font-family="ui-monospace,Menlo,monospace">SPAD</text>
    <text x="320" y="65" fill="#fda4af" font-size="10" font-family="ui-monospace,Menlo,monospace">DFB</text>
  </g>
  <!-- PDMS stamp -->
  <g transform="translate(700,240)">
    <rect x="0" y="-80" width="200" height="60" fill="none" stroke="#a78bfa" stroke-width="2" rx="4"/>
    <text x="100" y="-90" fill="#c4b5fd" font-size="13" font-family="ui-monospace,Menlo,monospace" text-anchor="middle">PDMS Stamp</text>
    <!-- transferring chiplet downward -->
    <g fill="#f472b6" opacity="0.9">
      <rect x="60" y="-15" width="20" height="20" rx="2"/>
      <rect x="120" y="-15" width="20" height="20" rx="2"/>
    </g>
    <!-- transfer arrow -->
    <g stroke="#a78bfa" stroke-width="2" fill="none">
      <line x1="100" y1="20" x2="100" y2="120"/>
      <path d="M 94 114 L 100 122 L 106 114" fill="#a78bfa"/>
    </g>
    <text x="115" y="80" fill="#c4b5fd" font-size="13" font-family="ui-monospace,Menlo,monospace">pick + place</text>
  </g>
  <!-- laser beam decorative -->
  <line x1="0" y1="540" x2="1200" y2="540" stroke="url(#laser)" stroke-width="2" opacity="0.5"/>
  <!-- title -->
  <g fill="#f1f5f9">
    <text x="60" y="110" font-size="20" fill="#94a3b8" letter-spacing="6">SEMICONDUCTOR · PROCESS</text>
    <text x="60" y="190" font-size="46" font-weight="800">在硅光晶圆上"印"激光器</text>
    <text x="60" y="252" font-size="30" font-weight="600" fill="#f9a8d4">微转移印刷 MTP</text>
    <text x="60" y="320" font-size="22" fill="#cbd5e1">III-V 激光器 / LiNbO₃ 调制器 / SPAD</text>
    <text x="60" y="360" font-size="22" fill="#cbd5e1">→ 硅光 SOI · 低温 · 高吞吐 · CMOS 兼容</text>
    <text x="60" y="430" font-size="20" fill="#e2e8f0">Ghent U. + imec · IEEE JLT 2026-04</text>
  </g>
  <rect x="60" y="270" width="6" height="60" fill="#f472b6"/>
  <text x="60" y="608" font-size="14" font-family="ui-monospace,Menlo,monospace" fill="#64748b">XIEJIAYUN.GITHUB.IO · 2026-05-18</text>
</svg>
