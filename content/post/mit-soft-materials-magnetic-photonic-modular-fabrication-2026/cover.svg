  <circle cx="940" cy="420" r="110" fill="url(#light)" opacity="0.6"/>
  <!-- waveguide pattern (hydrogel-on-skin) -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 880 460 Q 920 440 960 460 T 1040 460"/>
    <path d="M 880 480 Q 920 460 960 480 T 1040 480"/>
    <path d="M 880 500 Q 920 480 960 500 T 1040 500"/>
  </g>
  <!-- title -->
  <g fill="#f1f5f9">
    <text x="60" y="110" font-size="20" fill="#94a3b8" letter-spacing="6">ROBOTICS · SOFT MATERIALS</text>
    <text x="60" y="190" font-size="50" font-weight="800">跳过人形赛道</text>
    <text x="60" y="260" font-size="32" font-weight="600" fill="#67e8f9">MIT 三项软体材料突破</text>
    <text x="60" y="335" font-size="22" fill="#cbd5e1">磁控水凝胶 / 光致离子凝胶 / 机器人化建筑</text>
