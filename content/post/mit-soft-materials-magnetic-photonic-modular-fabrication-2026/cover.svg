  <!-- magnetic field arrow -->
  <g stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.6" transform="translate(680,240)">
    <path d="M 0 0 Q 50 -20 100 0 T 200 0"/>
    <path d="M 195 -6 L 205 0 L 195 6" fill="#a78bfa"/>
  </g>
