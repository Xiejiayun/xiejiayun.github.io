      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- magno-bot lollipops -->
  <g transform="translate(820,140)">
    <g opacity="0.85">
      <circle cx="0" cy="0" r="36" fill="url(#gel)"/>
      <line x1="0" y1="36" x2="0" y2="110" stroke="#67e8f9" stroke-width="3" opacity="0.7"/>
      <circle cx="0" cy="0" r="36" fill="none" stroke="#22d3ee" stroke-width="2"/>
    </g>
    <g transform="translate(80,40)" opacity="0.7">
      <circle cx="0" cy="0" r="28" fill="url(#gel)"/>
      <line x1="0" y1="28" x2="0" y2="90" stroke="#67e8f9" stroke-width="2.5" opacity="0.7"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#22d3ee" stroke-width="2"/>
    </g>
    <g transform="translate(-80,30)" opacity="0.7">
      <circle cx="0" cy="0" r="30" fill="url(#gel)"/>
      <line x1="0" y1="30" x2="0" y2="100" stroke="#67e8f9" stroke-width="2.5" opacity="0.7"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#22d3ee" stroke-width="2"/>
    </g>
    <g transform="translate(160,90)" opacity="0.55">
