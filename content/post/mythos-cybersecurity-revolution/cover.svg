<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <!-- Grid lines -->
  <g stroke="#1a3a5c" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Shield -->
  <path d="M600 120 L720 180 L720 340 C720 420 600 500 600 500 C600 500 480 420 480 340 L480 180 Z" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glow1)"/>
  <path d="M600 150 L700 200 L700 330 C700 400 600 470 600 470 C600 470 500 400 500 330 L500 200 Z" fill="#0a1628" fill-opacity="0.8"/>
  <!-- Binary streams -->
  <g fill="#00e5ff" opacity="0.6" font-family="monospace" font-size="14">
    <text x="520" y="220">01101001</text><text x="520" y="240">10110100</text>
    <text x="520" y="260">01001011</text><text x="520" y="280">11010010</text>
    <text x="520" y="300">00101101</text><text x="520" y="320">10010110</text>
    <text x="520" y="340">01101001</text><text x="520" y="360">10110011</text>
    <text x="620" y="250" fill="#ff4444" opacity="0.9">VULN</text>
    <text x="560" y="310" fill="#ff4444" opacity="0.9">CVE</text>
  </g>
  <!-- Magnifying glass -->
  <circle cx="640" cy="290" r="50" fill="none" stroke="#4fc3f7" stroke-width="2.5" filter="url(#glow1)"/>
  <line x1="675" y1="325" x2="710" y2="360" stroke="#4fc3f7" stroke-width="3" filter="url(#glow1)"/>
  <!-- Scanning lines -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.4">
    <line x1="200" y1="250" x2="480" y2="250"/><line x1="200" y1="280" x2="480" y2="280"/>
    <line x1="200" y1="310" x2="480" y2="310"/><line x1="200" y1="340" x2="480" y2="340"/>
    <line x1="720" y1="250" x2="1000" y2="250"/><line x1="720" y1="280" x2="1000" y2="280"/>
    <line x1="720" y1="310" x2="1000" y2="310"/><line x1="720" y1="340" x2="1000" y2="340"/>
  </g>
  <!-- Alert dots -->
  <circle cx="350" cy="250" r="5" fill="#ff4444" filter="url(#glow1)"/>
  <circle cx="870" cy="280" r="5" fill="#ff4444" filter="url(#glow1)"/>
  <circle cx="420" cy="310" r="5" fill="#ff4444" filter="url(#glow1)"/>
  <circle cx="920" cy="340" r="5" fill="#ff4444" filter="url(#glow1)"/>
