<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#0e1726"/>
      <stop offset="100%" stop-color="#03060c"/>
    </radialGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <g transform="translate(400 250)" opacity="0.95">
    <!-- concentric rings of colored points -->
    <g id="ring"></g>
  </g>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" fill="#e8eef7">
    <text x="40" y="60" font-size="30" font-weight="700">Native-Color LiDAR</text>
    <text x="40" y="92" font-size="18" fill="#9fb2cc">Per-point  XYZ + Reflectivity + RGB</text>
    <text x="40" y="395" font-size="13" fill="#6f88a8">Ouster REV8 OS · Perception stack, rebuilt for physical AI</text>
  </g>
  <!-- programmatic dots via static placement -->
  <g transform="translate(400 250)">
    <!-- ring radii and color palette mixed -->
    <!-- generated points -->
