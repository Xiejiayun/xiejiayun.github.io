<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bgm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bgm)"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="800" fill="#1a3057">TPP Coverage paper — 论证 / 实验 / 推论 思维导图</text>
  <text x="700" y="78" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#5e7196">arXiv:2605.08541 · Kricheli et al. · Syracuse + Amazon AGI Foundations</text>

  <!-- Central node: PROBLEM -->
  <g filter="url(#shadow)">
    <circle cx="700" cy="450" r="100" fill="#ff6b6b" opacity="0.95"/>
    <text x="700" y="445" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">scaling-law</text>
    <text x="700" y="468" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">不可识别问题</text>
  </g>

  <!-- Branch 1: Symptom (top-left) -->
  <g>
    <line x1="630" y1="380" x2="320" y2="180" stroke="#5fb3ff" stroke-width="2"/>
    <g filter="url(#shadow)">
      <rect x="100" y="120" width="380" height="140" rx="14" fill="#5fb3ff" opacity="0.92"/>
      <text x="290" y="155" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">症状</text>
      <text x="120" y="184" font-family="sans-serif" font-size="13" fill="#fff">· Besiroglu 2024: 复现 Chinchilla 2/3 失败</text>
      <text x="120" y="206" font-family="sans-serif" font-size="13" fill="#fff">· Porian 2025: 小食谱差异挪动系数一个量级</text>
      <text x="120" y="228" font-family="sans-serif" font-size="13" fill="#fff">· DataDecide: 8 种 SL 都打不过单尺度 baseline</text>
      <text x="120" y="250" font-family="sans-serif" font-size="13" fill="#fff">· Volkova 2026: 跨优化器拟合高度相关</text>
    </g>
  </g>

  <!-- Branch 2: Diagnosis (top-right) -->
  <g>
    <line x1="770" y1="380" x2="1080" y2="180" stroke="#7c4dff" stroke-width="2"/>
    <g filter="url(#shadow)">
      <rect x="920" y="120" width="380" height="140" rx="14" fill="#7c4dff" opacity="0.92"/>
      <text x="1110" y="155" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">诊断（Section 3）</text>
      <text x="940" y="184" font-family="sans-serif" font-size="13" fill="#fff">· D=kN ⇒ Jacobian 两列 j_A、j_B 共线</text>
      <text x="940" y="206" font-family="monospace" font-size="13" fill="#fff">· Prop 1: κ(JᵀJ) = Θ(ε⁻²), ε = |α − β|</text>
      <text x="940" y="228" font-family="monospace" font-size="13" fill="#fff">· Cor 1: CI(A)/CI(ψ) = Θ(ε⁻¹)</text>
      <text x="940" y="250" font-family="sans-serif" font-size="13" fill="#fff">· 同一论证覆盖 4 种 law</text>
    </g>
  </g>

  <!-- Branch 3: Remedy (bottom-left) -->
  <g>
    <line x1="630" y1="520" x2="320" y2="720" stroke="#26a69a" stroke-width="2"/>
    <g filter="url(#shadow)">
      <rect x="100" y="640" width="380" height="160" rx="14" fill="#26a69a" opacity="0.92"/>
      <text x="290" y="675" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">补救（Section 3.2）</text>
      <text x="120" y="704" font-family="monospace" font-size="13" fill="#fff">· Prop 2: V_K ≥ τ_K （充要条件）</text>
      <text x="120" y="726" font-family="sans-serif" font-size="13" fill="#fff">· a-priori 可计算的 design check</text>
      <text x="120" y="748" font-family="sans-serif" font-size="13" fill="#fff">· K=2 + 两端散开 ≈ 最优</text>
      <text x="120" y="770" font-family="sans-serif" font-size="13" fill="#fff">· Def 2: 单 ray 仍可识别 ψ = A + Bk⁻ᵅ</text>
      <text x="120" y="792" font-family="sans-serif" font-size="13" fill="#fff">· Thm 1: holdout RMSE ordering</text>
    </g>
  </g>

  <!-- Branch 4: Empirical (bottom-right) -->
  <g>
    <line x1="770" y1="520" x2="1080" y2="720" stroke="#ff9800" stroke-width="2"/>
    <g filter="url(#shadow)">
      <rect x="920" y="640" width="380" height="160" rx="14" fill="#ff9800" opacity="0.92"/>
      <text x="1110" y="675" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fff">实证（Section 4）</text>
      <text x="940" y="704" font-family="sans-serif" font-size="13" fill="#fff">· 1,900 LLMs · 5.04-76.5M params</text>
      <text x="940" y="726" font-family="sans-serif" font-size="13" fill="#fff">· 5 corpora × 4 laws × 30 seeds</text>
      <text x="940" y="748" font-family="sans-serif" font-size="13" fill="#fff">· 14 sizes × 12 D values (NC grid)</text>
      <text x="940" y="770" font-family="sans-serif" font-size="13" fill="#fff">· NC 胜率: 97.3% [96.4, 98.0]</text>
      <text x="940" y="792" font-family="sans-serif" font-size="13" fill="#fff">· Kaplan + CO 在 RedPajama 上 R²=0.51</text>
    </g>
  </g>

  <!-- Branch 5: Numbers Box -->
  <g>
    <line x1="700" y1="350" x2="700" y2="298" stroke="#888" stroke-width="2"/>
    <g filter="url(#shadow)">
      <rect x="500" y="298" width="400" height="80" rx="10" fill="#1a3057" opacity="0.94"/>
      <text x="700" y="324" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffd166">ε(Chinchilla) = 0.06 → CI 膨胀 17×</text>
      <text x="700" y="346" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffd166">ε(Kaplan)    = 0.019 → CI 膨胀 53×</text>
      <text x="700" y="368" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffd166">ε(Droppo-E)  = ~0.06-0.10 → 10-20×</text>
    </g>
  </g>

  <!-- Downstream implications row -->
  <g transform="translate(0, 830)">
    <text x="700" y="0" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1a3057">↓ 下游影响</text>
    <g font-family="sans-serif" font-size="12" fill="#5e7196">
      <text x="120" y="30">重做 Chinchilla 系数</text>
      <text x="320" y="30">训前 V_K ≥ τ_K 自检 SOP</text>
      <text x="560" y="30">过往单 ray SL 论文加星号</text>
      <text x="820" y="30">optimal design 优化的新工作</text>
      <text x="1100" y="30">MoE / SSM 跨架构 ε 比较</text>
    </g>
  </g>

  <!-- Bottom right credit -->
  <text x="1380" y="888" text-anchor="end" font-family="monospace" font-size="10" fill="#5e7196" opacity="0.7">xiejiayun.github.io · 好文共赏</text>
</svg>
