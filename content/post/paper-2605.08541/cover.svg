<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1d35"/>
      <stop offset="100%" stop-color="#1a3057"/>
    </linearGradient>
    <linearGradient id="ray" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffa500" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fb3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#79f0c6" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle background grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Title -->
  <text x="60" y="100" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="48" font-weight="800" fill="#ffffff">Tokens-per-Parameter Coverage</text>
  <text x="60" y="148" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="28" font-weight="500" fill="#aac9ff">is Critical for Robust LLM Scaling Law Extrapolation</text>

  <!-- arXiv tag -->
  <rect x="60" y="180" width="170" height="36" rx="6" fill="#ff6b6b" fill-opacity="0.18" stroke="#ff6b6b" stroke-width="1"/>
  <text x="78" y="205" font-family="monospace" font-size="20" fill="#ffcccc">arXiv:2605.08541</text>

  <!-- Subtitle bilingual -->
  <text x="60" y="260" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="22" fill="#e6f0ff">When training grids live on a single ray</text>
  <text x="60" y="290" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="22" fill="#e6f0ff" font-weight="500">D = kN, scaling-law coefficients are statistically unidentifiable.</text>

  <!-- Two-panel visualization: Collinear vs Non-collinear -->
  <!-- Left panel: Collinear ray -->
  <g transform="translate(80, 360)">
    <text x="0" y="-10" font-family="monospace" font-size="14" fill="#ff9696" font-weight="700">Collinear (CO):  κ(JᵀJ) = Θ(ε⁻²)</text>
    <!-- axes -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
    <line x1="0" y1="200" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
    <text x="-30" y="100" font-family="serif" font-size="22" fill="#fff" font-style="italic">D</text>
    <text x="280" y="226" font-family="serif" font-size="22" fill="#fff" font-style="italic">N</text>
    <!-- The single ray -->
    <line x1="0" y1="200" x2="270" y2="20" stroke="url(#ray)" stroke-width="3"/>
    <!-- Training points on the ray -->
    <circle cx="40" cy="174" r="6" fill="#ff6b6b"/>
    <circle cx="80" cy="147" r="6" fill="#ff6b6b"/>
    <circle cx="120" cy="120" r="6" fill="#ff6b6b"/>
    <circle cx="160" cy="93" r="6" fill="#ff6b6b"/>
    <circle cx="200" cy="67" r="6" fill="#ff6b6b"/>
    <circle cx="240" cy="40" r="6" fill="#ff6b6b"/>
    <!-- IsoFLOP curves cutting across (dashed) -->
    <path d="M 50 200 Q 80 100 200 30" fill="none" stroke="#ffd1d1" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,3"/>
    <path d="M 100 200 Q 140 130 240 60" fill="none" stroke="#ffd1d1" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="160" y="25" font-family="monospace" font-size="11" fill="#ffd1d1">isoFLOP probe</text>
    <!-- Annotation -->
    <text x="0" y="240" font-family="monospace" font-size="13" fill="#ff9696">CI inflation: ~17× (Chinchilla) ~53× (Kaplan)</text>
  </g>

  <!-- Right panel: Non-collinear grid -->
  <g transform="translate(700, 360)">
    <text x="0" y="-10" font-family="monospace" font-size="14" fill="#79f0c6" font-weight="700">Non-collinear (NC):  V_K ≥ τ_K ✓</text>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
    <line x1="0" y1="200" x2="280" y2="200" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
    <text x="-30" y="100" font-family="serif" font-size="22" fill="#fff" font-style="italic">D</text>
    <text x="280" y="226" font-family="serif" font-size="22" fill="#fff" font-style="italic">N</text>
    <!-- 2D grid of points -->
    <g fill="url(#gridGrad)">
      <circle cx="40" cy="180" r="5"/>
      <circle cx="40" cy="140" r="5"/>
      <circle cx="40" cy="100" r="5"/>
      <circle cx="40" cy="60" r="5"/>
      <circle cx="80" cy="180" r="5"/>
      <circle cx="80" cy="140" r="5"/>
      <circle cx="80" cy="100" r="5"/>
      <circle cx="80" cy="60" r="5"/>
      <circle cx="120" cy="180" r="5"/>
      <circle cx="120" cy="140" r="5"/>
      <circle cx="120" cy="100" r="5"/>
      <circle cx="120" cy="60" r="5"/>
      <circle cx="160" cy="180" r="5"/>
      <circle cx="160" cy="140" r="5"/>
      <circle cx="160" cy="100" r="5"/>
      <circle cx="160" cy="60" r="5"/>
      <circle cx="200" cy="180" r="5"/>
      <circle cx="200" cy="140" r="5"/>
      <circle cx="200" cy="100" r="5"/>
      <circle cx="200" cy="60" r="5"/>
      <circle cx="240" cy="180" r="5"/>
      <circle cx="240" cy="140" r="5"/>
      <circle cx="240" cy="100" r="5"/>
      <circle cx="240" cy="60" r="5"/>
    </g>
    <text x="0" y="240" font-family="monospace" font-size="13" fill="#79f0c6">Holdout win rate: 97.3% (1460/1500)</text>
  </g>

  <!-- Bottom strip with key numbers -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="1080" height="50" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="20" y="32" font-family="monospace" font-size="16" fill="#ffd166">ε := |α − β|</text>
    <text x="180" y="32" font-family="monospace" font-size="16" fill="#a8e6cf">·  4 laws proven</text>
    <text x="340" y="32" font-family="monospace" font-size="16" fill="#a8e6cf">·  1,900 LLMs trained</text>
    <text x="540" y="32" font-family="monospace" font-size="16" fill="#a8e6cf">·  5 corpora</text>
    <text x="680" y="32" font-family="monospace" font-size="16" fill="#a8e6cf">·  30 seeds</text>
    <text x="800" y="32" font-family="monospace" font-size="16" fill="#a8e6cf">·  Holdout R²: 0.837 → 0.932</text>
  </g>
</svg>
