<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5a6373"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bgGrad)"/>

  <!-- title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2540">
    Scaling Laws from Sequential Feature Recovery — Architecture Mindmap
  </text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#5a6373">
    arXiv:2605.14567 · Wortsman-Zurich, Tabanelli, Dandi, Krzakala, Loureiro (ENS + EPFL, 2026)
  </text>

  <!-- center node -->
  <g filter="url(#shadow)">
    <rect x="490" y="345" width="220" height="80" rx="14" fill="#1f2540"/>
    <text x="600" y="377" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Sequential Feature</text>
    <text x="600" y="398" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Recovery Mechanism</text>
  </g>

  <!-- Branch 1: SETUP (top-left, blue) -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="320" height="200" rx="12" fill="#e8f1ff" stroke="#2f6ad1" stroke-width="2"/>
    <rect x="60" y="100" width="320" height="32" rx="12" fill="#2f6ad1"/>
    <text x="220" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">① Compositional Setup</text>
    <text x="80" y="153" font-size="12" fill="#1f2540">• Gaussian input  x ∈ ℝᵈ</text>
    <text x="80" y="173" font-size="12" fill="#1f2540">• Hermite tensor lift  F(He_q(x)) ∈ ℝᴰ</text>
    <text x="80" y="193" font-size="12" fill="#1f2540">  with D = (d+q−1 choose q) ≍ dᵠ</text>
    <text x="80" y="215" font-size="12" fill="#1f2540">• Layer 1: h⁽¹⁾_i = ⟨A⁽¹⁾_i, F⟩ , i ∈ [d₁]</text>
    <text x="80" y="235" font-size="12" fill="#1f2540">  with d₁ = dᵉᵖˢ</text>
    <text x="80" y="255" font-size="12" fill="#1f2540">• Layer 2:  h⁽²⁾ = Σ λᵢ He₂(h⁽¹⁾ᵢ)/√2</text>
    <text x="80" y="275" font-size="12" fill="#1f2540">• Power-law weights: λᵢ = Z_γ·zᵢ·i⁻ᵞ</text>
  </g>
  <line x1="380" y1="200" x2="490" y2="370" stroke="#2f6ad1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch 2: SPECTRAL ALGORITHM (top-right, orange) -->
  <g filter="url(#shadow)">
    <rect x="820" y="100" width="320" height="200" rx="12" fill="#fff3e6" stroke="#d97a1d" stroke-width="2"/>
    <rect x="820" y="100" width="320" height="32" rx="12" fill="#d97a1d"/>
    <text x="980" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">② Hierarchical Spectral Algorithm</text>
    <text x="840" y="153" font-size="12" fill="#1f2540">• Empirical second-moment estimator:</text>
    <text x="840" y="173" font-size="12" fill="#1f2540">  Ĉ = (1/n) Σμ yμ · He₂(Fμ)  ∈ ℝᴰˣᴰ</text>
    <text x="840" y="195" font-size="12" fill="#1f2540">• Signal+noise decomposition:</text>
    <text x="840" y="213" font-size="12" fill="#1f2540">  Ĉ ≃ ν₁ A⁽¹⁾ᵀA⁽²⁾A⁽¹⁾ + √(dᵠ/n)·W</text>
    <text x="840" y="235" font-size="12" fill="#1f2540">• Top d₁ eigenvectors recover A⁽¹⁾</text>
    <text x="840" y="257" font-size="12" fill="#1f2540">• Pipeline: layer-1 PCA → layer-2 fit</text>
    <text x="840" y="277" font-size="12" fill="#1f2540">  → 1-D ridge regression on ĥ⁽²⁾</text>
  </g>
  <line x1="820" y1="200" x2="710" y2="370" stroke="#d97a1d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch 3: MAIN THEOREMS (bottom-left, green) -->
  <g filter="url(#shadow)">
    <rect x="60" y="470" width="320" height="240" rx="12" fill="#e7f6ec" stroke="#2a8a4a" stroke-width="2"/>
    <rect x="60" y="470" width="320" height="32" rx="12" fill="#2a8a4a"/>
    <text x="220" y="491" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">③ Main Theorems (matching bounds)</text>
    <text x="80" y="523" font-size="12" fill="#1f2540">Thm 3.1 · Weak Recovery</text>
    <text x="80" y="541" font-size="11.5" fill="#1f2540">  |⟨ûₖ/‖ûₖ‖, A⁽¹⁾ₖ/‖A⁽¹⁾ₖ‖⟩|</text>
    <text x="80" y="559" font-size="11.5" fill="#1f2540">  = 1 − O(dᵠk²ᵞ/(n·Z²_γ))</text>
    <text x="80" y="582" font-size="12" fill="#1f2540">Per-feature threshold:</text>
    <text x="80" y="600" font-size="11.5" fill="#1f2540">  nᵢ ≍ dᵠ · i²ᵞ / Z²_γ</text>
    <text x="80" y="623" font-size="12" fill="#1f2540">Thm 3.2 · Aggregate Scaling</text>
    <text x="80" y="641" font-size="11.5" fill="#1f2540">  mₙ = (Z²_γ·D / n)^(1/(2γ))</text>
    <text x="80" y="664" font-size="12" fill="#1f2540">  MSE(n) ≍ (n/dᵠ)^(−1+1/(2γ))</text>
    <text x="80" y="687" font-size="11" fill="#5a6373">  (Smooth power-law from sharp transitions)</text>
  </g>
  <line x1="380" y1="570" x2="490" y2="395" stroke="#2a8a4a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch 4: TECHNICAL NOVELTY (bottom-right, purple) -->
  <g filter="url(#shadow)">
    <rect x="820" y="470" width="320" height="240" rx="12" fill="#f1eaff" stroke="#7141c0" stroke-width="2"/>
    <rect x="820" y="470" width="320" height="32" rx="12" fill="#7141c0"/>
    <text x="980" y="491" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">④ Technical Novelty</text>
    <text x="840" y="523" font-size="12" fill="#1f2540">Standard Davis–Kahan bound</text>
    <text x="840" y="541" font-size="11.5" fill="#1f2540">  needs spectral gap λₖ − λⱼ ≫ ‖Δ‖_op</text>
    <text x="840" y="559" font-size="11.5" fill="#1f2540">  BUT gaps shrink under power law i⁻ᵞ</text>
    <text x="840" y="582" font-size="12" fill="#1f2540">Resolvent / Neumann expansion:</text>
    <text x="840" y="600" font-size="11" fill="#1f2540">  ûₖ = uₖ + Σⱼ≠ₖ uⱼᵀΔuⱼ/(λₖ−λⱼ)·uⱼ</text>
    <text x="840" y="618" font-size="11" fill="#1f2540">    + (1/λₖ)·P_Ker·Δ·uₖ + o(‖Δ‖²)</text>
    <text x="840" y="641" font-size="12" fill="#1f2540">⇒ matching upper + lower bounds</text>
    <text x="840" y="660" font-size="11.5" fill="#1f2540">  on individual eigenvector recovery</text>
    <text x="840" y="687" font-size="11" fill="#5a6373">  (technique of independent interest)</text>
  </g>
  <line x1="820" y1="570" x2="710" y2="395" stroke="#7141c0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- bottom slogan -->
  <text x="600" y="745" text-anchor="middle" font-size="12" font-style="italic" fill="#5a6373">
    sharp per-feature spectral transitions + power-law spectrum  →  smooth aggregate scaling law
  </text>
</svg>
