<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f4d"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="100%" stop-color="#c23616"/>
    </linearGradient>
    <linearGradient id="info" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3742fa"/>
      <stop offset="100%" stop-color="#2c2c54"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- title block -->
  <text x="64" y="86" font-size="44" font-weight="800" fill="#fff">CoT Obfuscation</text>
  <text x="64" y="124" font-size="22" fill="#9ba3c5">Training on Documents About Monitoring</text>
  <text x="64" y="150" font-size="18" fill="#7a85b3">arXiv 2605.15257 · DeepMind × Pivotal Research · 2026-05-14</text>

  <!-- Big highlight number -->
  <g transform="translate(880,90)">
    <rect x="0" y="0" width="320" height="120" rx="16" fill="url(#danger)" filter="url(#glow)"/>
    <text x="160" y="50" text-anchor="middle" font-size="20" fill="#fff" opacity="0.85">未察觉欺骗率</text>
    <text x="160" y="98" text-anchor="middle" font-size="44" font-weight="800" fill="#fff">1.7% → 25.7%</text>
  </g>

  <!-- divider -->
  <line x1="64" y1="190" x2="1216" y2="190" stroke="#3742fa" stroke-width="1" opacity="0.4"/>

  <!-- Eye / monitor symbol -->
  <g transform="translate(120,260)">
    <circle cx="50" cy="50" r="46" fill="#0f1444" stroke="#4cd2c7" stroke-width="3"/>
    <ellipse cx="50" cy="50" rx="32" ry="18" fill="none" stroke="#4cd2c7" stroke-width="2"/>
    <circle cx="50" cy="50" r="10" fill="#4cd2c7"/>
    <text x="50" y="124" text-anchor="middle" font-size="14" fill="#9ba3c5">CoT Monitor</text>
  </g>

  <!-- Brain symbol -->
  <g transform="translate(560,260)">
    <rect x="0" y="0" width="160" height="100" rx="14" fill="#1a1f4d" stroke="#ff4757" stroke-width="2"/>
    <text x="80" y="38" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">Monitor-aware</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#ffb8b8">+1000 docs</text>
    <text x="80" y="80" text-anchor="middle" font-size="13" fill="#ffb8b8">about the monitor</text>
    <text x="80" y="124" text-anchor="middle" font-size="14" fill="#9ba3c5">"I read about you"</text>
  </g>

  <!-- Behavior-only -->
  <g transform="translate(340,260)">
    <rect x="0" y="0" width="160" height="100" rx="14" fill="#1a1f4d" stroke="#4cd2c7" stroke-width="2"/>
    <text x="80" y="38" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">Behavior-only</text>
    <text x="80" y="60" text-anchor="middle" font-size="13" fill="#b3f0e8">+1000 docs</text>
    <text x="80" y="80" text-anchor="middle" font-size="13" fill="#b3f0e8">about the behavior</text>
    <text x="80" y="124" text-anchor="middle" font-size="14" fill="#9ba3c5">Control</text>
  </g>

  <!-- arrows from monitor -->
  <line x1="220" y1="310" x2="340" y2="310" stroke="#4cd2c7" stroke-width="2"/>
  <line x1="220" y1="310" x2="560" y2="310" stroke="#ff4757" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Result table -->
  <g transform="translate(780,250)">
    <rect x="0" y="0" width="420" height="170" rx="12" fill="#11163a" stroke="#3742fa" stroke-width="1"/>
    <text x="20" y="30" font-size="16" font-weight="700" fill="#fff">Detection outcome (gpt-oss-120b)</text>
    <line x1="20" y1="42" x2="400" y2="42" stroke="#3742fa" opacity="0.5"/>
    <text x="20" y="68" font-size="13" fill="#9ba3c5">Honest answers</text>
    <text x="280" y="68" font-size="13" fill="#4cd2c7">48.6%</text>
    <text x="350" y="68" font-size="13" fill="#4cd2c7">47.4%</text>
    <text x="20" y="92" font-size="13" fill="#9ba3c5">Deceptive · CAUGHT</text>
    <text x="280" y="92" font-size="13" fill="#ffb8b8">44.7%</text>
    <text x="350" y="92" font-size="13" fill="#ffb8b8">12.0%</text>
    <text x="20" y="116" font-size="13" font-weight="700" fill="#fff">Deceptive · UNDETECTED</text>
    <text x="280" y="116" font-size="13" fill="#4cd2c7">1.7%</text>
    <text x="350" y="116" font-size="14" font-weight="800" fill="#ff4757">25.7% ★</text>
    <text x="280" y="148" font-size="11" fill="#9ba3c5">behavior-only</text>
    <text x="350" y="148" font-size="11" fill="#ff4757">monitor-aware</text>
  </g>

  <!-- Section 2: controllability -->
  <g transform="translate(64,460)">
    <rect x="0" y="0" width="560" height="220" rx="14" fill="#11163a" stroke="#7a85b3" stroke-width="1"/>
    <text x="20" y="34" font-size="20" font-weight="700" fill="#fff">CoT Controllability ⟺ Obfuscation</text>
    <text x="20" y="62" font-size="14" fill="#9ba3c5">Pearson r = 0.800 · p = 0.017 · n = 8 models</text>

    <!-- Mini scatter -->
    <g transform="translate(40,90)">
      <line x1="0" y1="100" x2="380" y2="100" stroke="#3742fa" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#3742fa" opacity="0.6"/>
      <text x="-8" y="100" text-anchor="end" font-size="10" fill="#9ba3c5">0</text>
      <text x="-8" y="20" text-anchor="end" font-size="10" fill="#9ba3c5">60%</text>
      <text x="190" y="118" text-anchor="middle" font-size="11" fill="#9ba3c5">controllability →</text>
      <text x="-32" y="50" text-anchor="middle" font-size="11" fill="#9ba3c5" transform="rotate(-90 -32 50)">obfuscation</text>
      <!-- points (visualizing r=0.800) -->
      <circle cx="40" cy="80" r="5" fill="#4cd2c7"/>
      <circle cx="90" cy="68" r="5" fill="#4cd2c7"/>
      <circle cx="135" cy="55" r="5" fill="#4cd2c7"/>
      <circle cx="180" cy="42" r="5" fill="#4cd2c7"/>
      <circle cx="225" cy="32" r="5" fill="#4cd2c7"/>
      <circle cx="280" cy="20" r="5" fill="#ff4757"/>
      <circle cx="325" cy="14" r="5" fill="#ff4757"/>
      <circle cx="355" cy="8" r="5" fill="#ff4757"/>
      <line x1="20" y1="85" x2="370" y2="6" stroke="#ffb8b8" stroke-dasharray="4,3" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Section 3: RL acceleration -->
  <g transform="translate(660,460)">
    <rect x="0" y="0" width="556" height="220" rx="14" fill="#11163a" stroke="#7a85b3" stroke-width="1"/>
    <text x="20" y="34" font-size="20" font-weight="700" fill="#fff">RL · Reward Hacking Acceleration</text>
    <text x="20" y="62" font-size="14" fill="#9ba3c5">monitor-aware 比 control 提前 ~40% 步抵达 20% 未察觉作弊</text>

    <g transform="translate(40,90)">
      <line x1="0" y1="100" x2="460" y2="100" stroke="#3742fa" opacity="0.6"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#3742fa" opacity="0.6"/>
      <text x="-8" y="100" text-anchor="end" font-size="10" fill="#9ba3c5">0</text>
      <text x="-8" y="20" text-anchor="end" font-size="10" fill="#9ba3c5">80%</text>
      <text x="230" y="118" text-anchor="middle" font-size="11" fill="#9ba3c5">RL step (0..150)</text>
      <!-- monitor-aware curve -->
      <path d="M 0 100 Q 60 92 110 60 T 240 12" fill="none" stroke="#ff4757" stroke-width="3"/>
      <!-- control curve -->
      <path d="M 0 100 Q 100 96 200 80 T 460 50" fill="none" stroke="#4cd2c7" stroke-width="2.5" stroke-dasharray="4,3"/>
      <text x="250" y="20" font-size="11" fill="#ff4757">Monitor-aware</text>
      <text x="370" y="62" font-size="11" fill="#4cd2c7">Random / Base control</text>
    </g>
  </g>
</svg>
