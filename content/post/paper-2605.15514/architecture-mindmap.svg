<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#eef1f8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#4a5568"/>
    </marker>
    <marker id="arrowRed" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#c53030"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1a202c">RoPE 失败模式思维导图 · arXiv 2605.15514</text>
  <text x="700" y="78" text-anchor="middle" font-size="14" fill="#718096">把 RoPE product 当作正态随机变量 → 4 个可证明的失败模式 → 全 LLM 实测崩塌</text>

  <!-- Center: RoPE Product node -->
  <g transform="translate(700, 410)">
    <ellipse cx="0" cy="0" rx="180" ry="80" fill="#fffbeb" stroke="#d97706" stroke-width="3"/>
    <text x="0" y="-30" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">RoPE Product S(m)</text>
    <text x="0" y="-5" text-anchor="middle" font-size="14" fill="#7c2d12">= Σ aₙ cos(mθₙ + φₙ)</text>
    <text x="0" y="20" text-anchor="middle" font-size="13" fill="#7c2d12">CLT ⇒ N(μ_M, σ²_M)</text>
    <text x="0" y="42" text-anchor="middle" font-size="11" fill="#9a3412" font-style="italic">μ ← low-freq decay, σ² ← high-freq</text>
  </g>

  <!-- Left top: Position Identification -->
  <g transform="translate(220, 200)">
    <rect x="-160" y="-50" width="320" height="100" rx="12" fill="#fee2e2" stroke="#c53030" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="16" font-weight="700" fill="#822727">①位置识别 Position</text>
    <text x="0" y="3" text-anchor="middle" font-size="12" fill="#9b2c2c">距离 m 不同 → S 应不同</text>
    <text x="0" y="25" text-anchor="middle" font-size="12" fill="#9b2c2c">locality bias：近 &gt; 远</text>
  </g>

  <!-- Right top: Token Identification -->
  <g transform="translate(1180, 200)">
    <rect x="-160" y="-50" width="320" height="100" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">② Token 识别 Token</text>
    <text x="0" y="3" text-anchor="middle" font-size="12" fill="#1e40af">key 不同 → S 应不同</text>
    <text x="0" y="25" text-anchor="middle" font-size="12" fill="#1e40af">语义排序应稳定</text>
  </g>

  <!-- arrows from center to objectives -->
  <line x1="540" y1="370" x2="370" y2="220" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 4"/>
  <line x1="860" y1="370" x2="1030" y2="220" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4 4"/>

  <!-- Position Inversion (Theorem 1) -->
  <g transform="translate(140, 530)">
    <rect x="-130" y="-50" width="260" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Failure 1: 位置反转</text>
    <text x="0" y="-8" text-anchor="middle" font-size="11" fill="#991b1b">Position Inversion</text>
    <text x="0" y="14" text-anchor="middle" font-size="11" fill="#7f1d1d">Theorem 1</text>
    <text x="0" y="36" text-anchor="middle" font-size="11" fill="#7f1d1d">Pr → 0.5 当 logM/logB→∞</text>
    <text x="0" y="55" text-anchor="middle" font-size="10" font-style="italic" fill="#991b1b">B↑ 时更糟</text>
  </g>

  <!-- Position Aliasing (Theorem 2) -->
  <g transform="translate(430, 720)">
    <rect x="-140" y="-50" width="280" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Failure 2: 位置混叠</text>
    <text x="0" y="-8" text-anchor="middle" font-size="11" fill="#991b1b">Position Aliasing</text>
    <text x="0" y="14" text-anchor="middle" font-size="11" fill="#7f1d1d">Theorem 2</text>
    <text x="0" y="36" text-anchor="middle" font-size="11" fill="#7f1d1d">Pr(存在 alias pair) → 1</text>
    <text x="0" y="55" text-anchor="middle" font-size="10" font-style="italic" fill="#991b1b">8K context → 75K+ pairs</text>
  </g>

  <!-- Token Inversion (Theorem 3) -->
  <g transform="translate(970, 720)">
    <rect x="-140" y="-50" width="280" height="120" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Failure 3: token 反转</text>
    <text x="0" y="-8" text-anchor="middle" font-size="11" fill="#1e40af">Token Inversion</text>
    <text x="0" y="14" text-anchor="middle" font-size="11" fill="#1e3a8a">Theorem 3</text>
    <text x="0" y="36" text-anchor="middle" font-size="11" fill="#1e3a8a">Pr → 0.5 当 M→Θ(B)</text>
    <text x="0" y="55" text-anchor="middle" font-size="10" font-style="italic" fill="#1e40af">B↑ 时变好（!）</text>
  </g>

  <!-- Token Aliasing (Theorem 4) -->
  <g transform="translate(1260, 530)">
    <rect x="-130" y="-50" width="260" height="120" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="0" y="-25" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Failure 4: token 混叠</text>
    <text x="0" y="-8" text-anchor="middle" font-size="11" fill="#1e40af">Token Aliasing</text>
    <text x="0" y="14" text-anchor="middle" font-size="11" fill="#1e3a8a">Theorem 4</text>
    <text x="0" y="36" text-anchor="middle" font-size="11" fill="#1e3a8a">≤ Θ(2⁻ᶠ √h M) positions</text>
    <text x="0" y="55" text-anchor="middle" font-size="10" font-style="italic" fill="#1e40af">BF16 → 5% 位置 alias</text>
  </g>

  <!-- arrows from center to failures -->
  <line x1="550" y1="450" x2="260" y2="510" stroke="#c53030" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="600" y1="490" x2="500" y2="680" stroke="#c53030" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="800" y1="490" x2="900" y2="680" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="850" y1="450" x2="1140" y2="510" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom: real-world impact -->
  <g transform="translate(700, 840)">
    <rect x="-540" y="-32" width="1080" height="58" rx="10" fill="#1a202c"/>
    <text x="0" y="-8" text-anchor="middle" font-size="16" font-weight="700" fill="#feca57">🚨 实测：Llama 3.1-8B · Mistral-7B · Qwen3-8B · DeepSeek-V3.1 · Kimi-K2.5 · gpt-oss-120B</text>
    <text x="0" y="14" text-anchor="middle" font-size="13" fill="#cbd5e0">在 4 选 1 整数 list indexing 任务上，全部在 4K-8K tokens 内塌方到随机猜 (25%)</text>
  </g>

  <!-- Side note: RoPE base trade-off -->
  <g transform="translate(700, 130)">
    <rect x="-160" y="-15" width="320" height="42" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="0" y="6" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">⚠️ RoPE base B 是 trade-off 旋钮</text>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#92400e">B↑：保 token 区分，丢 position 区分；反之亦然</text>
  </g>
</svg>
