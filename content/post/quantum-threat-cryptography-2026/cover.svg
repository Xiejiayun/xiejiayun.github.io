<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Quantum circuit lines -->
  <g stroke="#fb7185" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="180" x2="1000" y2="180"/>
    <line x1="200" y1="240" x2="1000" y2="240"/>
    <line x1="200" y1="300" x2="1000" y2="300"/>
    <line x1="200" y1="360" x2="1000" y2="360"/>
  </g>
  <!-- Quantum gates -->
  <g font-family="'Segoe UI',monospace" font-size="14" fill="#fb7185">
    <rect x="320" y="165" width="40" height="30" rx="3" fill="none" stroke="#fb7185" stroke-width="1.5"/>
    <text x="340" y="185" text-anchor="middle">H</text>
    <rect x="420" y="225" width="40" height="30" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="440" y="245" text-anchor="middle" fill="#a78bfa">X</text>
    <rect x="520" y="285" width="40" height="30" rx="3" fill="none" stroke="#fb7185" stroke-width="1.5"/>
    <text x="540" y="305" text-anchor="middle">T</text>
    <rect x="620" y="165" width="40" height="30" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="640" y="185" text-anchor="middle" fill="#a78bfa">H</text>
    <rect x="720" y="345" width="40" height="30" rx="3" fill="none" stroke="#fb7185" stroke-width="1.5"/>
    <text x="740" y="365" text-anchor="middle">S</text>
  </g>
  <!-- CNOT connections -->
  <g stroke="#a78bfa" stroke-width="1" opacity="0.6">
    <line x1="440" y1="195" x2="440" y2="225"/>
    <circle cx="440" cy="180" r="4" fill="#a78bfa"/>
    <line x1="640" y1="195" x2="640" y2="285"/>
    <circle cx="640" cy="300" r="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <!-- Lock breaking -->
  <g transform="translate(600, 420)" opacity="0.4">
    <rect x="-20" y="-15" width="40" height="30" rx="3" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M-10,-15 L-10,-28 A10,10 0 0,1 10,-28 L10,-15" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- crack -->
    <line x1="0" y1="-30" x2="5" y2="-20" stroke="#fb7185" stroke-width="2"/>
  </g>
  <text x="600" y="510" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">QUANTUM CRYPTANALYSIS</text>
  <text x="600" y="550" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">The Timeline Accelerates · Post-Quantum Migration</text>
</svg>