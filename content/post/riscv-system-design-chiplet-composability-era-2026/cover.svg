<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#0d1117"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6feb"/><stop offset="1" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#238636"/><stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9e6a03"/><stop offset="1" stop-color="#d29922"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8957e5"/><stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Substrate -->
  <rect x="60" y="90" width="680" height="250" rx="14" fill="none" stroke="#30363d" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="74" y="112" fill="#7d8590" font-family="monospace" font-size="12">Package Substrate · UCIe</text>

  <!-- Chiplets -->
  <g font-family="monospace" font-size="13" fill="#f0f6fc">
    <rect x="100" y="140" width="150" height="90" rx="10" fill="url(#g1)"/>
    <text x="118" y="170">CPU Die</text>
    <text x="118" y="190" font-size="11" fill="#cdd9e5">RV64 · RVA23</text>
    <text x="118" y="208" font-size="11" fill="#cdd9e5">V + H + Zicbom</text>

    <rect x="320" y="140" width="160" height="90" rx="10" fill="url(#g4)"/>
    <text x="338" y="170">AI Die</text>
    <text x="338" y="190" font-size="11" fill="#e6dcfd">Vector / bf16</text>
    <text x="338" y="208" font-size="11" fill="#e6dcfd">custom ext.</text>

    <rect x="550" y="140" width="150" height="90" rx="10" fill="url(#g2)"/>
    <text x="568" y="170">IO Die</text>
    <text x="568" y="190" font-size="11" fill="#d2f5d6">PCIe6 · CXL</text>
    <text x="568" y="208" font-size="11" fill="#d2f5d6">IOMMU · NIC</text>

    <rect x="210" y="250" width="160" height="70" rx="10" fill="url(#g3)"/>
    <text x="228" y="278">NoC + L3</text>
    <text x="228" y="298" font-size="11" fill="#fce8b2">CHI / TileLink</text>

    <rect x="430" y="250" width="170" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="446" y="278" fill="#f0f6fc">HBM3e Die</text>
    <text x="446" y="298" font-size="11" fill="#7d8590">memory stack</text>
  </g>

  <!-- UCIe links -->
  <g stroke="#58a6ff" stroke-width="2" fill="none" stroke-dasharray="4 3">
    <line x1="250" y1="185" x2="320" y2="185"/>
    <line x1="480" y1="185" x2="550" y2="185"/>
    <line x1="175" y1="230" x2="260" y2="250"/>
    <line x1="400" y1="230" x2="370" y2="250"/>
    <line x1="510" y1="230" x2="510" y2="250"/>
    <line x1="625" y1="230" x2="600" y2="250"/>
  </g>

  <!-- Title -->
  <text x="60" y="50" fill="#f0f6fc" font-family="-apple-system,Segoe UI,sans-serif" font-size="26" font-weight="700">
    RISC-V · RVA23 · Composable Silicon
  </text>
  <text x="60" y="74" fill="#7d8590" font-family="monospace" font-size="13">
    From open ISA → to chiplet-level system assembly · 2026
  </text>

  <text x="60" y="395" fill="#7d8590" font-family="monospace" font-size="11">UCIe links shown dashed · each die may come from a different fab / node</text>
</svg>
