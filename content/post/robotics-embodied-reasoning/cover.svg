<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/><stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Robot silhouette -->
  <g transform="translate(600,280)" filter="url(#glow3)">
    <!-- Head -->
    <rect x="-35" y="-130" width="70" height="55" rx="10" fill="none" stroke="#4488ff" stroke-width="2"/>
    <circle cx="-12" cy="-105" r="8" fill="#ff4444"/><circle cx="12" cy="-105" r="8" fill="#4488ff"/>
    <!-- Body -->
    <rect x="-45" y="-70" width="90" height="100" rx="5" fill="none" stroke="#4488ff" stroke-width="2"/>
    <!-- Neural network inside body -->
    <g fill="#4488ff" opacity="0.6">
      <circle cx="-20" cy="-50" r="4"/><circle cx="0" cy="-40" r="4"/><circle cx="20" cy="-50" r="4"/>
      <circle cx="-20" cy="-20" r="4"/><circle cx="0" cy="-10" r="4"/><circle cx="20" cy="-20" r="4"/>
      <circle cx="0" cy="15" r="5" fill="#ff8800"/>
    </g>
    <g stroke="#4488ff" stroke-width="0.8" opacity="0.4">
      <line x1="-20" y1="-50" x2="0" y2="-40"/><line x1="0" y1="-40" x2="20" y2="-50"/>
      <line x1="-20" y1="-50" x2="-20" y2="-20"/><line x1="20" y1="-50" x2="20" y2="-20"/>
      <line x1="-20" y1="-20" x2="0" y2="-10"/><line x1="20" y1="-20" x2="0" y2="-10"/>
      <line x1="0" y1="-10" x2="0" y2="15"/>
    </g>
    <!-- Arms -->
    <line x1="-45" y1="-60" x2="-80" y2="-20" stroke="#4488ff" stroke-width="2"/>
    <line x1="45" y1="-60" x2="80" y2="-20" stroke="#4488ff" stroke-width="2"/>
    <!-- Legs -->
    <line x1="-20" y1="30" x2="-30" y2="80" stroke="#4488ff" stroke-width="2"/>
    <line x1="20" y1="30" x2="30" y2="80" stroke="#4488ff" stroke-width="2"/>
  </g>
  <!-- Reasoning emanation -->
  <g stroke="#ff8800" stroke-width="1" opacity="0.3" fill="none">
    <circle cx="600" cy="180" r="60"/><circle cx="600" cy="180" r="90"/>
    <circle cx="600" cy="180" r="120"/>
  </g>
  <!-- Title -->
  <text x="600" y="540" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="42" font-weight="bold">具身智能黎明</text>
  <text x="600" y="575" text-anchor="middle" fill="#4488ff" font-family="Arial, sans-serif" font-size="18">EMBODIED REASONING · VLA · ROBOTICS 2026</text>
</svg>