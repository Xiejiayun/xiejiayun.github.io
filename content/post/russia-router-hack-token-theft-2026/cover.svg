<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a12"/>
  <!-- Network grid -->
  <g stroke="#1a3a5c" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="0" y2="630"/>
    <line x1="800" y1="0" x2="400" y2="630"/>
    <line x1="1200" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="630"/>
  </g>
  <!-- Router icon -->
  <rect x="520" y="230" width="160" height="90" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <g fill="#ef4444" opacity="0.8">
    <circle cx="550" cy="300" r="4"/>
    <circle cx="570" cy="300" r="4"/>
    <circle cx="590" cy="300" r="4"/>
  </g>
  <rect x="540" y="245" width="120" height="8" rx="2" fill="#334155"/>
  <rect x="540" y="258" width="120" height="8" rx="2" fill="#334155"/>
  <!-- Antenna -->
  <line x1="640" y1="230" x2="660" y2="190" stroke="#ef4444" stroke-width="2"/>
  <circle cx="660" cy="185" r="5" fill="#ef4444" opacity="0.6"/>
  <line x1="660" y1="230" x2="680" y2="195" stroke="#ef4444" stroke-width="2"/>
  <circle cx="680" cy="190" r="5" fill="#ef4444" opacity="0.6"/>
  <!-- Token streams being intercepted -->
  <g opacity="0.4">
    <circle cx="200" cy="275" r="30" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="200" y="280" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">User</text>
    <circle cx="1000" cy="275" r="40" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="1000" y="270" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">Microsoft</text>
    <text x="1000" y="285" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10">365</text>
  </g>
  <!-- Arrow from user to router -->
  <line x1="230" y1="275" x2="520" y2="275" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- Arrow from router to MS (broken) -->
  <line x1="680" y1="275" x2="960" y2="275" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.3"/>
  <!-- Stolen token arrow going down -->
  <path d="M 600 320 L 600 420 L 300 420" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.7"/>
  <polygon points="300,414 285,420 300,426" fill="#ef4444" opacity="0.7"/>
  <!-- Attacker -->
  <circle cx="240" cy="420" r="25" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="240" y="425" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">APT</text>
  <!-- Token label -->
  <text x="460" y="265" fill="#f59e0b" font-family="monospace" font-size="11" opacity="0.7">OAuth Token</text>
  <!-- Intercepted label -->
  <text x="550" y="390" fill="#ef4444" font-family="monospace" font-size="11" opacity="0.6">INTERCEPTED</text>
  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="bold" opacity="0.9">路由器攻击与 OAuth 令牌窃取</text>
  <text x="600" y="565" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="14" opacity="0.7">NATION-STATE HACKING VIA FORGOTTEN INFRASTRUCTURE</text>
</svg>