  <rect width="800" height="400" fill="url(#bg4)"/>
  <!-- Chiplet grid -->
  <rect x="280" y="120" width="60" height="60" rx="4" fill="#2563eb" opacity="0.7"/>
  <rect x="350" y="120" width="60" height="60" rx="4" fill="#7c3aed" opacity="0.7"/>
  <rect x="420" y="120" width="60" height="60" rx="4" fill="#2563eb" opacity="0.7"/>
  <rect x="280" y="190" width="60" height="60" rx="4" fill="#7c3aed" opacity="0.7"/>
  <rect x="350" y="190" width="60" height="60" rx="4" fill="#059669" opacity="0.7"/>
  <rect x="420" y="190" width="60" height="60" rx="4" fill="#7c3aed" opacity="0.7"/>
  <!-- Light beams for photonics -->
  <line x1="100" y1="150" x2="270" y2="150" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="220" x2="270" y2="220" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <line x1="490" y1="150" x2="700" y2="150" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
