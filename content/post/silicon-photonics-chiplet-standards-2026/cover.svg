  <text x="350" y="225" fill="#fff" font-family="monospace" font-size="9" text-anchor="middle">PHY</text>
  <text x="400" y="320" text-anchor="middle" fill="#fff" font-family="monospace" font-size="22" font-weight="bold">SILICON PHOTONICS × CHIPLET</text>
