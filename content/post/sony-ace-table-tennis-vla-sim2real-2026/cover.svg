<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c121e"/>
      <stop offset="100%" stop-color="#1a2138"/>
    </linearGradient>
    <linearGradient id="tableg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d3a8a"/>
      <stop offset="100%" stop-color="#0d1d4a"/>
    </linearGradient>
    <radialGradient id="ballg" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffd75e"/>
      <stop offset="100%" stop-color="#ff8a00"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Table -->
  <g>
    <polygon points="200,460 1000,460 1100,560 100,560" fill="url(#tableg)" stroke="#3a5cbf" stroke-width="2"/>
    <line x1="600" y1="460" x2="600" y2="560" stroke="#9fb6ff" stroke-width="3" stroke-dasharray="6,4"/>
  </g>

  <!-- Arms -->
  <g stroke="#7d8aa3" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M170,330 L240,400 L300,440"/>
    <circle cx="300" cy="440" r="14" fill="#0c121e" stroke="#7d8aa3"/>
  </g>
  <g stroke="#ff6a6a" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M1030,330 L960,400 L900,440"/>
    <rect x="880" y="425" width="35" height="6" fill="#ff6a6a" transform="rotate(20 897 428)"/>
  </g>

  <!-- Robot label -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace">
    <text x="930" y="280" fill="#ff8a8a" font-size="16" font-weight="bold">ACE</text>
    <text x="930" y="300" fill="#9ca3b5" font-size="11">VLA · 1.7B</text>
    <text x="930" y="315" fill="#9ca3b5" font-size="11">1kHz torque</text>

    <text x="220" y="280" fill="#a8b8d8" font-size="16" font-weight="bold">HUMAN</text>
    <text x="220" y="300" fill="#9ca3b5" font-size="11">Top-200 WR</text>
    <text x="220" y="315" fill="#9ca3b5" font-size="11">reaction 220ms</text>
  </g>

  <!-- Ball trajectory -->
  <g fill="none" stroke="#ffd75e" stroke-width="2" stroke-dasharray="3,3">
    <path d="M320,420 Q500,200 730,360 Q830,420 880,430"/>
  </g>
  <circle cx="730" cy="360" r="14" fill="url(#ballg)"/>

  <!-- Spin annotation -->
  <g font-family="ui-monospace, monospace" fill="#ffd75e" font-size="12">
    <text x="495" y="195">↻ topspin</text>
    <text x="495" y="210" font-size="10" fill="#a89860">Magnus 6th-order</text>
  </g>

  <!-- Title -->
  <g font-family="-apple-system, 'PingFang SC', sans-serif">
    <text x="60" y="80" fill="#e8ecf5" font-size="40" font-weight="800">乒乓桌上的图灵时刻</text>
    <text x="60" y="120" fill="#7a8197" font-size="18">Sony Ace · VLA · sim-to-real · cross-embodiment transfer</text>
    <text x="60" y="600" fill="#9ca3b5" font-size="14">"端到端神经控制" 在毫秒级闭环里第一次赢人类</text>
  </g>

  <!-- Score -->
  <g font-family="ui-monospace, monospace" transform="translate(515,30)">
    <rect width="170" height="40" rx="4" fill="#0c121e" stroke="#3a5cbf"/>
    <text x="20" y="27" fill="#a8b8d8" font-size="18">11</text>
    <text x="80" y="27" fill="#a8b8d8" font-size="14">:</text>
    <text x="100" y="27" fill="#ff8a8a" font-size="18" font-weight="bold">9</text>
    <text x="135" y="27" fill="#9ca3b5" font-size="10">12·2025</text>
  </g>
</svg>
