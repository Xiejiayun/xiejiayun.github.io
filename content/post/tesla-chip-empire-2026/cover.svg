<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Central chip -->
  <rect x="480" y="195" width="240" height="240" rx="12" fill="url(#chip)" opacity="0.9"/>
  <rect x="500" y="215" width="200" height="200" rx="8" fill="#0a0a1a" opacity="0.6"/>
  <!-- Chip pins -->
  <g fill="#e74c3c" opacity="0.8">
    <rect x="510" y="180" width="20" height="25" rx="2"/>
    <rect x="550" y="180" width="20" height="25" rx="2"/>
    <rect x="590" y="180" width="20" height="25" rx="2"/>
    <rect x="630" y="180" width="20" height="25" rx="2"/>
    <rect x="670" y="180" width="20" height="25" rx="2"/>
    <rect x="510" y="425" width="20" height="25" rx="2"/>
    <rect x="550" y="425" width="20" height="25" rx="2"/>
    <rect x="590" y="425" width="20" height="25" rx="2"/>
    <rect x="630" y="425" width="20" height="25" rx="2"/>
    <rect x="670" y="425" width="20" height="25" rx="2"/>
    <rect x="465" y="225" width="25" height="20" rx="2"/>
    <rect x="465" y="265" width="25" height="20" rx="2"/>
    <rect x="465" y="305" width="25" height="20" rx="2"/>
    <rect x="465" y="345" width="25" height="20" rx="2"/>
    <rect x="465" y="385" width="25" height="20" rx="2"/>
    <rect x="710" y="225" width="25" height="20" rx="2"/>
    <rect x="710" y="265" width="25" height="20" rx="2"/>
    <rect x="710" y="305" width="25" height="20" rx="2"/>
    <rect x="710" y="345" width="25" height="20" rx="2"/>
    <rect x="710" y="385" width="25" height="20" rx="2"/>
  </g>
  <!-- AI5 text on chip -->
  <text x="600" y="325" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="48" font-weight="bold">AI5</text>
  <!-- Connection lines -->
  <g stroke="#e74c3c" stroke-width="2" opacity="0.4">
    <line x1="150" y1="150" x2="480" y2="250"/>
    <line x1="150" y1="480" x2="480" y2="380"/>
    <line x1="1050" y1="150" x2="720" y2="250"/>
    <line x1="1050" y1="480" x2="720" y2="380"/>
  </g>
  <!-- Labels -->
  <text x="100" y="140" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="16" opacity="0.7">TSMC</text>
  <text x="100" y="480" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="16" opacity="0.7">Samsung</text>
  <text x="1100" y="140" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="16" opacity="0.7">Intel 14A</text>
  <text x="1100" y="480" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="16" opacity="0.7">TeraFab</text>
  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" opacity="0.9">Tesla 芯片帝国</text>
  <text x="600" y="595" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="14" opacity="0.7">FROM DESIGN TO FAB — VERTICAL INTEGRATION</text>
</svg>