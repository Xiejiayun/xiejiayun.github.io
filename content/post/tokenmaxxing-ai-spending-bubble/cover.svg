<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Burning tokens -->
  <circle cx="400" cy="300" r="50" fill="#f59e0b" opacity="0.15"/>
  <text x="400" y="310" text-anchor="middle" font-family="monospace" font-size="32" fill="#f59e0b" opacity="0.8">T</text>
  <circle cx="600" cy="250" r="60" fill="#ef4444" opacity="0.15"/>
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="36" fill="#ef4444" opacity="0.8">T</text>
  <circle cx="800" cy="300" r="50" fill="#f59e0b" opacity="0.15"/>
  <text x="800" y="310" text-anchor="middle" font-family="monospace" font-size="32" fill="#f59e0b" opacity="0.8">T</text>
  <!-- Flame effects -->
  <path d="M580 200 Q590 170 600 190 Q610 170 620 200" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <path d="M585 210 Q595 185 600 200 Q605 185 615 210" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <path d="M380 250 Q390 225 400 240 Q410 225 420 250" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <path d="M780 250 Q790 225 800 240 Q810 225 820 250" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  <!-- Upward arrow (spending) -->
  <line x1="200" y1="450" x2="200" y2="150" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
  <polygon points="195,160 200,140 205,160" fill="#ef4444" opacity="0.3"/>
  <text x="210" y="160" font-family="system-ui" font-size="12" fill="#ef4444" opacity="0.4">COST ↑</text>
  <!-- Downward arrow (value) -->
  <line x1="1000" y1="150" x2="1000" y2="450" stroke="#22c55e" stroke-width="2" opacity="0.3"/>
  <polygon points="995,440 1000,460 1005,440" fill="#22c55e" opacity="0.3"/>
  <text x="1010" y="455" font-family="system-ui" font-size="12" fill="#22c55e" opacity="0.4">VALUE ↓</text>
  <!-- Dollar signs floating -->
  <text x="300" y="200" font-family="system-ui" font-size="20" fill="#f59e0b" opacity="0.2">$</text>
  <text x="500" y="160" font-family="system-ui" font-size="24" fill="#ef4444" opacity="0.2">$</text>
  <text x="700" y="180" font-family="system-ui" font-size="18" fill="#f59e0b" opacity="0.2">$</text>
  <text x="900" y="200" font-family="system-ui" font-size="22" fill="#ef4444" opacity="0.2">$</text>
  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui" font-size="32" fill="white" font-weight="bold" opacity="0.9">TOKENMAXXING</text>
  <text x="600" y="570" text-anchor="middle" font-family="system-ui" font-size="18" fill="#ef4444" opacity="0.7">当烧Token成为KPI，AI泡沫的新变种</text>
</svg>