  <rect x="610" y="280" width="120" height="60" rx="4" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1"/>
  <text x="670" y="315" text-anchor="middle" font-family="monospace" font-size="11" fill="#ec4899" opacity="0.7">I/O</text>
  <rect x="470" y="360" width="260" height="50" rx="4" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
  <text x="600" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#06b6d4" opacity="0.7">INTERPOSER / CoWoS</text>
  <!-- Connection pins -->
  <line x1="480" y1="430" x2="480" y2="460" stroke="#10b981" stroke-width="1" opacity="0.3"/>
