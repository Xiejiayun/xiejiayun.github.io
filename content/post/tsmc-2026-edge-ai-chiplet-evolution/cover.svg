  <text x="610" y="235" text-anchor="middle" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.7">GPU</text>
  <rect x="650" y="200" width="80" height="60" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
