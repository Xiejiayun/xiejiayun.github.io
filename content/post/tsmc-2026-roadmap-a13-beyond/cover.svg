<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7a5af8;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
  </g>
  <!-- Wafer circle -->
  <circle cx="900" cy="315" r="220" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <circle cx="900" cy="315" r="180" fill="none" stroke="#7a5af8" stroke-width="0.5" opacity="0.4"/>
  <circle cx="900" cy="315" r="140" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <!-- Circuit traces -->
  <g stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M750 200 L850 200 L850 150 L950 150"/>
    <path d="M750 300 L800 300 L800 250 L900 250 L900 200 L1000 200"/>
    <path d="M750 400 L830 400 L830 350 L950 350 L950 300 L1050 300"/>
    <path d="M800 450 L900 450 L900 400 L1000 400"/>
  </g>
  <!-- Chip dies on wafer -->
  <g opacity="0.4">
    <rect x="830" y="200" width="30" height="25" fill="#7a5af8" rx="2"/>
    <rect x="870" y="230" width="30" height="25" fill="#22d3ee" rx="2"/>
    <rect x="910" y="200" width="30" height="25" fill="#7a5af8" rx="2"/>
    <rect x="850" y="270" width="30" height="25" fill="#22d3ee" rx="2"/>
    <rect x="890" y="300" width="30" height="25" fill="#7a5af8" rx="2"/>
    <rect x="930" y="270" width="30" height="25" fill="#22d3ee" rx="2"/>
    <rect x="870" y="340" width="30" height="25" fill="#7a5af8" rx="2"/>
    <rect x="910" y="370" width="30" height="25" fill="#22d3ee" rx="2"/>
    <rect x="950" y="340" width="30" height="25" fill="#7a5af8" rx="2"/>
  </g>
  <!-- Title -->
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">台积电2026路线图</text>
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="32" fill="#22d3ee">A13 / A12 / N2U 三箭齐发</text>
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">先进制程 · Chiplet · 背面供电 · 产业变革</text>
  <!-- Accent line -->
  <rect x="80" y="190" width="120" height="4" fill="url(#glow)" rx="2"/>
</svg>