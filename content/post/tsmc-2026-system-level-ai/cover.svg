  <text x="600" y="80" fill="white" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle">TSMC 2026</text>
  <text x="600" y="130" fill="#94a3b8" font-family="monospace" font-size="22" text-anchor="middle">From Chips to AI Systems</text>
  <!-- Process nodes -->
  <g>
    <rect x="100" y="560" width="80" height="40" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
    <text x="140" y="585" fill="#a78bfa" font-family="monospace" font-size="14" text-anchor="middle">N2U</text>
    <rect x="220" y="560" width="80" height="40" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1"/>
    <text x="260" y="585" fill="#34d399" font-family="monospace" font-size="14" text-anchor="middle">A16</text>
    <rect x="340" y="560" width="80" height="40" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
    <text x="380" y="585" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle">A12</text>
    <rect x="460" y="560" width="80" height="40" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="500" y="585" fill="#fbbf24" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">A13</text>
  </g>
  <text x="340" y="555" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Advanced Process Roadmap →</text>
