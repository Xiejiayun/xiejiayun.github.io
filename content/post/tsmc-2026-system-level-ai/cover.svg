  <rect x="650" y="310" width="400" height="50" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="850" y="340" fill="#a78bfa" font-family="monospace" font-size="14" text-anchor="middle">GPU / AI Accelerator Die (A13)</text>
  <rect x="650" y="380" width="400" height="40" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="850" y="405" fill="#34d399" font-family="monospace" font-size="13" text-anchor="middle">CoWoS Interposer</text>
  <rect x="650" y="440" width="400" height="40" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="850" y="465" fill="#fbbf24" font-family="monospace" font-size="13" text-anchor="middle">Organic Substrate + Power Rail</text>
