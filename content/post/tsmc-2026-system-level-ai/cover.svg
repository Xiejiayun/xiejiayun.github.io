  <text x="570" y="355" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">Integration</text>
  <!-- System-level diagram on right -->
  <!-- 3D stack visualization -->
  <rect x="650" y="250" width="400" height="40" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
