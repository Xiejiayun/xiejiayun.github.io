    <rect x="320" y="250" width="25" height="25" rx="2" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="0.5"/>
    <rect x="200" y="280" width="25" height="25" rx="2" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="0.5"/>
