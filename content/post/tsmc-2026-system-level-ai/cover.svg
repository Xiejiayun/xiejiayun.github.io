  </g>
  <!-- Arrow from wafer to system -->
  <line x1="520" y1="350" x2="620" y2="350" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>
