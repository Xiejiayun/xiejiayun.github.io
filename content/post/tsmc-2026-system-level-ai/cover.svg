  <line x1="750" y1="290" x2="750" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="950" y1="290" x2="950" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="750" y1="360" x2="750" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="950" y1="360" x2="950" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="750" y1="420" x2="750" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="950" y1="420" x2="950" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
