    <rect x="260" y="280" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="290" y="280" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="320" y="280" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="350" y="280" width="25" height="25" rx="2" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="0.5"/>
    <rect x="200" y="310" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="230" y="310" width="25" height="25" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
    <rect x="260" y="310" width="25" height="25" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
    <rect x="290" y="310" width="25" height="25" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
    <rect x="320" y="310" width="25" height="25" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
    <rect x="350" y="310" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="200" y="340" width="25" height="25" rx="2" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5"/>
    <rect x="230" y="340" width="25" height="25" rx="2" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
    <rect x="260" y="340" width="25" height="25" rx="2" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1"/>
