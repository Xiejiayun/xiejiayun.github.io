  <circle cx="300" cy="350" r="140" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <circle cx="300" cy="350" r="110" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Die grid on wafer -->
