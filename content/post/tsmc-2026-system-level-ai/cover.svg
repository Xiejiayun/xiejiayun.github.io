      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Wafer pattern -->
