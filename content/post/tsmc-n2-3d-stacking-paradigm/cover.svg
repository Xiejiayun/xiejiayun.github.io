<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#0f172a"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- 3D Stacked chips -->
  <rect x="300" y="240" width="200" height="30" rx="4" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">HBM Memory</text>
  <rect x="300" y="200" width="200" height="30" rx="4" fill="rgba(76,29,149,0.6)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Near-Memory Logic</text>
  <rect x="300" y="160" width="200" height="30" rx="4" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="180" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">Compute Die (N2)</text>
  <rect x="300" y="120" width="200" height="30" rx="4" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#22d3ee">AI Accelerator</text>
  <!-- TSV connections -->
  <line x1="340" y1="150" x2="340" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="400" y1="150" x2="400" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="460" y1="150" x2="460" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Labels -->
  <text x="540" y="195" font-family="monospace" font-size="9" fill="#94a3b8">TSV</text>
  <!-- Bracket -->
  <line x1="270" y1="120" x2="270" y2="270" stroke="#94a3b8" stroke-width="1"/>
  <text x="255" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8" transform="rotate(-90,255,200)">3D STACK</text>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0">半导体架构范式转移</text>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">TSMC N2 · GAA · 3D Stacking · Near-Memory Processing</text>
  <text x="400" y="340" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#a78bfa" opacity="0.3">N2</text>
</svg>