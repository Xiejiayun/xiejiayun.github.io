<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Shield / Lock icon -->
  <g transform="translate(600,250)">
    <!-- Shield outline -->
    <path d="M0,-120 L100,-80 L100,20 Q100,100 0,140 Q-100,100 -100,20 L-100,-80 Z" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="2"/>
    <!-- Inner enclave -->
    <rect x="-50" y="-50" width="100" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
    <text x="0" y="-15" font-family="monospace" font-size="12" fill="#34d399" text-anchor="middle">TEE</text>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle" opacity="0.7">ENCLAVE</text>
    <!-- AI brain inside -->
    <circle cx="0" cy="-30" r="8" fill="none" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <!-- Lock -->
    <rect x="-15" y="40" width="30" height="25" rx="3" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <path d="M-8,40 L-8,30 A8,8 0 0,1 8,30 L8,40" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <!-- Data flow arrows -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.3">
    <line x1="300" y1="200" x2="500" y2="220" stroke-dasharray="4,4"/>
    <line x1="700" y1="220" x2="900" y2="200" stroke-dasharray="4,4"/>
  </g>
  <!-- Labels -->
  <text x="250" y="190" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">E2E Encrypted</text>
  <text x="950" y="190" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">E2E Encrypted</text>
  <text x="600" y="500" font-family="'Segoe UI',Arial,sans-serif" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">PRIVATE AI INFERENCE</text>
  <text x="600" y="540" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">TEE Security · E2E Encryption · AI Privacy</text>
</svg>