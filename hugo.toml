baseurl = "https://xiejiayun.github.io/"
title = "Jiayun's Blog"
theme = "hugo-theme-cleanwhite"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
preserveTaxonomyNames = true
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[outputs]
home = ["HTML", "RSS"]

[params]
  header_image = "img/header.svg"
  SEOTitle = "Jiayun's Blog"
  description = "个人博客 - 技术、生活、思考"
  keyword = "博客, 技术, AI, 云原生"
  slogan = "探索与分享"

  image_404 = "img/404-bg.jpg"
  title_404 = "你来到了没有知识的荒原 :("
  omit_categories = false

  # Sidebar settings
  sidebar_about_description = "Developer & Blogger"
  sidebar_avatar = "img/avatar.png"

  featured_tags = true
  featured_condition_size = 1
  about_me = true
  custom_css = ["css/custom-dark.css"]

  # Dark mode
  auto_theme = true
  dark_mode_toggle = true

  # Giscus comments
  [params.giscus]
    data_repo = "xiejiayun/xiejiayun.github.io"
    data_repo_id = ""
    data_category = "General"
    data_category_id = ""
    data_mapping = "pathname"
    data_reactions_enabled = "1"
    data_emit_metadata = "0"
    data_theme = "light"
    data_lang = "zh-CN"
    crossorigin = "anonymous"

  [params.social]
  rss            = true
  github         = "https://github.com/xiejiayun"

  [[params.additional_menus]]
  title = "归档"
  href  = "/archive/"
  [[params.additional_menus]]
  title = "关于"
  href  = "/about/"

[markup]
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2
  [markup.highlight]
    style = "dracula"
    codeFences = true
    guessSyntax = true
    lineNos = true
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[mediaTypes]
  [mediaTypes.'font/woff']
    suffixes = ['woff']
  [mediaTypes.'font/woff2']
    suffixes = ['woff2']
