<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index,follow">
    <title>{{ .Title }}</title>
    {{ with .Description }}<meta name="description" content="{{ . }}">{{ end }}
    <link rel="canonical" href="{{ .Permalink }}">
    <style>
        :root {
            color-scheme: light dark;
        }

        html {
            background: #ffffff;
            color: #202124;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.72;
        }

        body {
            margin: 0;
        }

        .document {
            box-sizing: border-box;
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 20px 72px;
        }

        .content h1 {
            margin: 0 0 20px;
            color: #111827;
            font-size: 2rem;
            line-height: 1.25;
            font-weight: 700;
        }

        .content h2 {
            margin: 36px 0 12px;
            color: #111827;
            font-size: 1.25rem;
            line-height: 1.35;
            font-weight: 700;
        }

        .content p,
        .content li {
            font-size: 1rem;
        }

        .content ul {
            padding-left: 1.4rem;
        }

        .content a {
            color: #0b57d0;
        }

        .content hr {
            margin: 32px 0;
            border: 0;
            border-top: 1px solid #e5e7eb;
        }

        @media (max-width: 640px) {
            .document {
                padding: 32px 18px 56px;
            }

            .content h1 {
                font-size: 1.65rem;
            }
        }

        @media (prefers-color-scheme: dark) {
            html {
                background: #111827;
                color: #e5e7eb;
            }

            .content h1,
            .content h2 {
                color: #f9fafb;
            }

            .content a {
                color: #93c5fd;
            }

            .content hr {
                border-top-color: #374151;
            }
        }
    </style>
</head>
<body>
    <main class="document">
        <article class="content">
            {{ .Content }}
        </article>
    </main>
</body>
</html>
